name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Fix ownership so the SSH user can run git commands
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S chown -R $USER:$USER /data/migration-combinations

            cd /data/migration-combinations
            git config --global --add safe.directory /data/migration-combinations

            echo "Pulling latest changes..."
            git pull origin main

            echo "Stopping existing containers..."
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker compose down

            echo "Building new image..."
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker compose build --no-cache

            echo "Starting containers..."
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker compose up -d

            echo "Applying nginx config..."
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S cp /data/migration-combinations/nginx.conf /etc/nginx/sites-available/gemco
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S ln -sf /etc/nginx/sites-available/gemco /etc/nginx/sites-enabled/gemco
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S nginx -t && echo "${{ secrets.SSH_PASSWORD }}" | sudo -S nginx -s reload || true

            echo "Deployment complete!"
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker compose ps
