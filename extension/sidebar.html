<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Migration Viewer</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="header">
    <svg id="header-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2L3 6v8l7 4 7-4V6L10 2zm0 2.2l5 2.85V13l-5 2.85L5 13V7.05L10 4.2z"/></svg>
    <span id="header-title">Migration History</span>
    <button id="signout-btn" style="display:none">Sign out</button>
  </div>

  <div id="body">
    <div id="signin-section">
      <p>Browse your migrated conversations from Google Gemini and Claude.</p>
      <button id="signin-btn">Sign in with Microsoft</button>
    </div>
    <div id="loading" style="display:none">Loading conversations...</div>
    <div id="error-msg" style="display:none"></div>
    <div id="list-section" style="display:none"></div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
