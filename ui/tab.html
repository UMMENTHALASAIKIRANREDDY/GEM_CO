<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migration History</title>
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
    #header { background: #0129AC; color: white; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    #header h1 { font-size: 16px; font-weight: 600; }
    #content { padding: 16px; max-width: 900px; margin: 0 auto; }
    #signin-section { text-align: center; padding: 60px 20px; }
    #signin-btn { background: #0078d4; color: white; border: none; padding: 12px 24px; border-radius: 4px; font-size: 14px; cursor: pointer; }
    #signin-btn:hover { background: #106ebe; }
    .source-group { margin-bottom: 24px; }
    .source-title { font-size: 13px; font-weight: 600; color: #605e5c; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #e1dfdd; }
    .conv-item { background: white; border: 1px solid #e1dfdd; border-radius: 4px; padding: 12px 16px; margin-bottom: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .conv-item:hover { border-color: #0078d4; background: #f0f6ff; }
    .conv-title { font-size: 14px; color: #201f1e; }
    .conv-date { font-size: 12px; color: #a19f9d; white-space: nowrap; margin-left: 12px; }
    #viewer { position: fixed; top: 0; right: 0; width: 50%; height: 100vh; background: white; border-left: 2px solid #0078d4; overflow-y: auto; padding: 20px; display: none; z-index: 10; }
    #viewer-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: #605e5c; }
    #viewer-title { font-size: 18px; color: #0078d4; margin-bottom: 16px; margin-top: 4px; }
    #viewer-body { font-size: 14px; line-height: 1.6; }
    #loading { text-align: center; padding: 40px; color: #605e5c; }
    #error-msg { color: #d83b01; padding: 16px; background: #fff4ce; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="header">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="white"><path d="M10 2L3 6v8l7 4 7-4V6L10 2zm0 2.2l5 2.85V13l-5 2.85L5 13V7.05L10 4.2z"/></svg>
    <h1>CloudFuze Migration History</h1>
  </div>

  <div id="content">
    <div id="signin-section">
      <p style="margin-bottom:16px;color:#605e5c">Sign in with your Microsoft account to view migrated conversations.</p>
      <button id="signin-btn">Sign in with Microsoft</button>
    </div>
    <div id="loading" style="display:none">Loading conversations...</div>
    <div id="error-msg" style="display:none"></div>
    <div id="list-section" style="display:none"></div>
  </div>

  <div id="viewer">
    <button id="viewer-close" title="Close">&times;</button>
    <div id="viewer-title"></div>
    <div id="viewer-body"></div>
  </div>

  <script>
    const GRAPH = 'https://graph.microsoft.com/v1.0';
    let msalApp = null;
    let graphToken = null;

    async function init() {
      const cfg = await fetch('/api/tab-config').then(r => r.json());
      msalApp = new msal.PublicClientApplication({
        auth: {
          clientId: cfg.clientId,
          authority: 'https://login.microsoftonline.com/common',
          redirectUri: cfg.redirectUri,
        },
        cache: { cacheLocation: 'localStorage' },
      });
      await msalApp.initialize();

      const accounts = msalApp.getAllAccounts();
      if (accounts.length > 0) {
        await acquireToken(accounts[0]);
        loadConversations();
      }

      document.getElementById('signin-btn').onclick = signIn;
    }

    async function signIn() {
      try {
        const result = await msalApp.loginPopup({ scopes: ['Notes.Read', 'Files.Read'] });
        await acquireToken(result.account);
        loadConversations();
      } catch (e) {
        showError('Sign-in failed: ' + e.message);
      }
    }

    async function acquireToken(account) {
      const result = await msalApp.acquireTokenSilent({
        scopes: ['Notes.Read', 'Files.Read'],
        account,
      }).catch(() => msalApp.acquireTokenPopup({ scopes: ['Notes.Read', 'Files.Read'] }));
      graphToken = result.accessToken;
    }

    async function loadConversations() {
      document.getElementById('signin-section').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      try {
        const indexRes = await fetch(
          `${GRAPH}/me/drive/root:/GemCo/index.json:/content`,
          { headers: { Authorization: `Bearer ${graphToken}` } }
        );
        if (!indexRes.ok) {
          showError(indexRes.status === 404
            ? 'No migrated conversations found yet. Run a migration first.'
            : `Could not load index: ${indexRes.status}`);
          return;
        }
        const index = await indexRes.json();
        renderList(index.migrations || []);
      } catch (e) {
        showError('Error loading conversations: ' + e.message);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function renderList(migrations) {
      const section = document.getElementById('list-section');
      section.style.display = 'block';
      if (!migrations.length) {
        section.innerHTML = '<p style="color:#605e5c;padding:20px 0">No migrations found.</p>';
        return;
      }
      section.innerHTML = migrations.map(m => `
        <div class="source-group">
          <div class="source-title">${m.source} Conversations (${m.conversations.length})</div>
          ${(m.conversations || []).map(c => `
            <div class="conv-item" data-page-id="${escHtml(c.pageId)}" data-title="${escHtml(c.title)}">
              <span class="conv-title">${escHtml(c.title)}</span>
              <span class="conv-date">${c.migratedAt ? new Date(c.migratedAt).toLocaleDateString() : ''}</span>
            </div>
          `).join('')}
        </div>
      `).join('');

      section.querySelectorAll('.conv-item').forEach(el => {
        el.onclick = () => openConversation(el.dataset.pageId, el.dataset.title);
      });
    }

    async function openConversation(pageId, title) {
      const viewer = document.getElementById('viewer');
      const body = document.getElementById('viewer-body');
      document.getElementById('viewer-title').textContent = title;
      body.innerHTML = '<p style="color:#605e5c">Loading...</p>';
      viewer.style.display = 'block';

      try {
        const res = await fetch(`${GRAPH}/me/onenote/pages/${pageId}/content`, {
          headers: { Authorization: `Bearer ${graphToken}` },
        });
        if (!res.ok) throw new Error(`OneNote ${res.status}`);
        const html = await res.text();
        const match = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
        body.innerHTML = `<div style="font-size:14px;line-height:1.6;max-width:800px">${match ? match[1] : html}</div>`;
      } catch (e) {
        body.innerHTML = `<p style="color:#d83b01">Could not load content: ${e.message}</p>`;
      }
    }

    function showError(msg) {
      document.getElementById('signin-section').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function escHtml(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('viewer-close').onclick = () => {
      document.getElementById('viewer').style.display = 'none';
    };

    init().catch(console.error);
  </script>
</body>
</html>
