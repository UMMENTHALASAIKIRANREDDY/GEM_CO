/* ═══  CLAUDE→GEMINI: UPLOAD ZIP STEP    ═══ */
/* ══════════════════════════════════════════ */
const StepCL2GUpload=({cl2gUploadData,setCl2gUploadData,onNext,onBack,showToast,onUploadComplete})=>{
  const fileRef=useRef(null);
  const menuRef=useRef(null);
  const [uploading,setUploading]=useState(false);
  const [dragOver,setDragOver]=useState(false);
  const [uploads,setUploads]=useState([]);
  const [showMenu,setShowMenu]=useState(false);

  const loadUploads=async()=>{
    try{
      const r=await fetch('/api/cl2g/uploads');const d=await r.json();
      const list=Array.isArray(d)?d:[];
      setUploads(list);
      // Bug 1 fix: auto-select the most recent upload if nothing is selected yet
      if(!cl2gUploadData&&list.length>0){
        const u=list[0];
        setCl2gUploadData({uploadId:u._id,users:u.users||[],totalConversations:u.totalConversations||0,totalMemories:u.totalMemories||0,totalProjects:u.totalProjects||0,fileName:u.fileName});
      }
    }catch{}
  };
  useEffect(()=>{loadUploads()},[]);

  // Close menu when clicking outside
  useEffect(()=>{
    const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setShowMenu(false)};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  const uploadZip=async(file)=>{
    if(!file||!file.name.toLowerCase().endsWith('.zip')){showToast('Only ZIP files accepted.','error');return}
    setUploading(true);
    const fd=new FormData();fd.append('file',file);
    try{
      const r=await fetch('/api/cl2g/upload',{method:'POST',body:fd});
      const text=await r.text();
      let d;try{d=JSON.parse(text);}catch{throw new Error(`Upload failed (${r.status})`)}
      if(!r.ok)throw new Error(d.error||'Upload failed');
      setCl2gUploadData({uploadId:d.uploadId,users:d.users||[],totalConversations:d.totalConversations||0,totalMemories:d.totalMemories||0,totalProjects:d.totalProjects||0,fileName:file.name});
      if(onUploadComplete)(onUploadComplete((d.users||[]).length));
      await loadUploads();
      showToast(`Uploaded — ${d.totalConversations} conversations, ${d.users?.length||0} users found.`);
    }catch(e){showToast(e.message,'error')}
    finally{setUploading(false)}
  };

  const deleteUpload=async(id,e)=>{
    e.stopPropagation();
    try{
      await fetch(`/api/cl2g/uploads/${id}`,{method:'DELETE'});
      if(cl2gUploadData?.uploadId===id)setCl2gUploadData(null);
      setUploads(p=>p.filter(u=>u._id!==id));
      showToast('Upload deleted.');
    }catch(err){showToast(err.message,'error')}
  };

  const selectUpload=doc=>{
    setCl2gUploadData({uploadId:doc._id,users:doc.users||[],totalConversations:doc.totalConversations||0,totalMemories:doc.totalMemories||0,totalProjects:doc.totalProjects||0,fileName:doc.fileName});
    setShowMenu(false);
  };

  return(
    <div className="fade-up">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Upload Claude Export</div>
          <div style={{fontSize:13,color:C.muted}}>Download your Claude data export (ZIP) and upload it here.</div>
        </div>
        {/* Previous uploads hamburger */}
        <div ref={menuRef} style={{position:'relative',flexShrink:0}}>
          <button onClick={()=>{setShowMenu(p=>!p);loadUploads()}} title="Previous uploads"
            style={{width:36,height:36,borderRadius:8,border:`1px solid ${C.border}`,background:'white',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:C.muted,transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.color=C.primary}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted}}>
            <IcoMenu s={16}/>
          </button>
          {showMenu&&(
            <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',width:320,background:'white',border:`1px solid ${C.border}`,borderRadius:10,boxShadow:'0 8px 30px rgba(0,0,0,.12)',zIndex:100,overflow:'hidden'}}>
              <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.bg}`,fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>Previous Uploads</div>
              {uploads.length===0
                ?<div style={{padding:'20px 14px',fontSize:13,color:C.muted,textAlign:'center'}}>No uploads yet</div>
                :uploads.map((u,i)=>{
                  const isActive=cl2gUploadData?.uploadId===u._id;
                  return(
                    <div key={u._id} onClick={()=>selectUpload(u)}
                      style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',cursor:'pointer',borderBottom:i<uploads.length-1?`1px solid ${C.bg}`:'none',background:isActive?C.tint:'white',transition:'background .15s'}}
                      onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background=C.bg}}
                      onMouseLeave={e=>{e.currentTarget.style.background=isActive?C.tint:'white'}}>
                      <IcoZip s={20} c={isActive?C.primary:C.primaryL}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',display:'flex',alignItems:'center',gap:6}}>
                          <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{u.fileName}</span>
                          {isActive&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:10,background:C.primary,color:'white',flexShrink:0}}>active</span>}
                        </div>
                        <div style={{fontSize:11,color:C.muted}}>{u.totalConversations} convs · {u.users?.length||0} users · {new Date(u.uploadTime).toLocaleDateString()}</div>
                      </div>
                      <button onClick={e=>deleteUpload(u._id,e)} title="Delete"
                        style={{padding:'4px 6px',border:'none',background:'none',cursor:'pointer',color:C.muted,borderRadius:4,flexShrink:0,display:'flex',alignItems:'center',transition:'all .15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.background='#FEF2F2';e.currentTarget.style.color=C.error}}
                        onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color=C.muted}}>
                        <IcoTrash s={13}/>
                      </button>
                    </div>
                  );
                })
              }
            </div>
          )}
        </div>
      </div>

      <div onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)uploadZip(f)}}
        onClick={()=>!uploading&&fileRef.current.click()}
        style={{border:`2px dashed ${dragOver?C.primary:C.border}`,borderRadius:12,padding:'36px',textAlign:'center',cursor:'pointer',background:dragOver?C.tint:'white',transition:'all .2s',marginBottom:16}}>
        <input ref={fileRef} type="file" accept=".zip" style={{display:'none'}} onChange={e=>{if(e.target.files[0])uploadZip(e.target.files[0]);e.target.value=''}}/>
        {uploading
          ?<><Spinner s={28}/><div style={{fontSize:13,color:C.muted,marginTop:10}}>Uploading & parsing ZIP…</div></>
          :<><IcoZip s={28} c={dragOver?C.primary:C.muted}/><div style={{fontSize:13,color:C.muted,marginTop:8}}>Drag & drop your Claude export ZIP here</div><div style={{fontSize:11,color:C.primaryL,marginTop:4}}>or click to browse</div></>}
      </div>

      {cl2gUploadData&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:C.tint,borderRadius:8,border:`1px solid ${C.primary}30`,marginBottom:16}}>
          <IcoZip s={18} c={C.primary}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:C.primary,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cl2gUploadData.fileName}</div>
            <div style={{fontSize:11,color:C.muted}}>{cl2gUploadData.totalConversations} conversations · {cl2gUploadData.users?.length||0} users{cl2gUploadData.totalMemories>0?` · ${cl2gUploadData.totalMemories} memory`:''}{cl2gUploadData.totalProjects>0?` · ${cl2gUploadData.totalProjects} project${cl2gUploadData.totalProjects>1?'s':''}`:''}</div>
          </div>
          <Check s={16} c={C.success}/>
        </div>
      )}

      <div style={{display:'flex',gap:10}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={onNext} disabled={!cl2gUploadData} style={{flex:1,justifyContent:'center'}}>Continue →</Btn>
      </div>
    </div>
  );
};

/* ═══  CLAUDE→GEMINI: USER MAPPING STEP   ═══ */
/* ═══════════════════════════════════════════ */
const StepCL2GMap=({cl2gUploadData,googleUsers,cl2gMappings,setCl2gMappings,cl2gSelectedUuids,setCl2gSelectedUuids,onNext,onBack,showToast})=>{
  const csvRef=useRef(null);
  const [search,setSearch]=useState('');
  const [csvUploading,setCsvUploading]=useState(false);
  const [csvEmails,setCsvEmails]=useState(null); // null = cloud users; array = CSV-sourced emails
  const users=cl2gUploadData?.users||[];
  // Always keep a current ref so auto-map effect never reads a stale closure
  const cl2gMappingsRef=useRef(cl2gMappings);
  cl2gMappingsRef.current=cl2gMappings;

  // Load saved mappings + CSV from DB on mount
  useEffect(()=>{
    fetch('/api/cl2g/user-mappings').then(r=>r.ok?r.json():null).then(doc=>{
      if(doc?.mappings)setCl2gMappings(prev=>({...prev,...doc.mappings}));
      if(doc?.csvEmails){
        setCsvEmails(doc.csvEmails);
        if(doc.csvEmails.length>0)setCl2gSelectedUuids(new Set(doc.csvEmails.filter(uuid=>doc.mappings?.[uuid])));
      }
    }).catch(()=>{});
  },[]);

  // Auto-map by email local-part — each Google email used at most once
  useEffect(()=>{
    if(!users.length||!googleUsers.length)return;
    const byLocal={};
    googleUsers.forEach(u=>{const em=(u.email||'').toLowerCase();const loc=em.split('@')[0];if(loc)byLocal[loc]=em});
    const m={};const used=new Set();
    users.forEach(u=>{
      const existing=(cl2gMappingsRef.current[u.uuid]||'').toLowerCase();
      if(existing&&!used.has(existing)){m[u.uuid]=existing;used.add(existing);}
      else{const loc=(u.email_address||'').toLowerCase().split('@')[0];const dest=byLocal[loc]||'';
        if(dest&&!used.has(dest)){m[u.uuid]=dest;used.add(dest);}else m[u.uuid]='';}
    });
    setCl2gMappings(m);
    // Auto-select only mapped users
    setCl2gSelectedUuids(new Set(Object.entries(m).filter(([,v])=>v).map(([k])=>k)));
  },[users,googleUsers]);

  const persistMappings=(mappings,csv)=>{
    fetch('/api/cl2g/user-mappings',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mappings,csvEmails:csv||null})}).catch(()=>{});
  };

  const handleMappingChange=(uuid,val)=>{
    const m={...cl2gMappings,[uuid]:val};
    setCl2gMappings(m);
    persistMappings(m,csvEmails);
  };

  const downloadCsv=()=>{
    if(!users.length){showToast('No source users found.','error');return;}
    const availableG=(googleUsers||[]).map(u=>(u.email||u.primaryEmail||'').toLowerCase()).filter(Boolean);
    const usedDest=new Set(Object.values(cl2gMappings).filter(Boolean));
    const unusedG=availableG.filter(e=>!usedDest.has(e));
    let unusedIdx=0;
    const sorted=[...users].sort((a,b)=>{const ma=!!cl2gMappings[a.uuid],mb=!!cl2gMappings[b.uuid];if(ma!==mb)return ma?-1:1;return(a.email_address||'').localeCompare(b.email_address||'')});
    const rows=sorted.map(u=>{const dest=cl2gMappings[u.uuid]||(unusedG[unusedIdx]?unusedG[unusedIdx++]:'');return`"${u.email_address||''}","${dest}"`;});
    const csv='Source User,Destination User\n'+rows.join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='cl2g-user-mappings.csv';a.click();
    showToast(`CSV downloaded — ${users.length} source user(s).`);
  };

  const uploadCsv=file=>{
    setCsvUploading(true);
    const r=new FileReader();
    r.onload=e=>{
      const lines=e.target.result.split(/\r?\n/).slice(1);
      const emailToUuid={};
      users.forEach(u=>{if(u.email_address)emailToUuid[u.email_address.toLowerCase()]=u.uuid});
      const m={...cl2gMappings};const csvUuids=[];const usedDest=new Set();
      for(const l of lines){
        if(!l.trim())continue;
        const c=parseCsvLine(l);
        if(c.length>=2&&c[0]){
          const srcEmail=c[0].trim().toLowerCase();
          const dstEmail=c[1].trim().toLowerCase();
          const uuid=emailToUuid[srcEmail];
          if(uuid&&dstEmail&&!usedDest.has(dstEmail)){m[uuid]=dstEmail;csvUuids.push(uuid);usedDest.add(dstEmail);}
          else if(uuid&&!dstEmail){m[uuid]='';csvUuids.push(uuid);}
        }
      }
      setCl2gMappings(m);setCsvEmails(csvUuids);
      setCl2gSelectedUuids(new Set(csvUuids.filter(id=>m[id])));
      persistMappings(m,csvUuids);
      setCsvUploading(false);
      showToast(`CSV uploaded — ${csvUuids.length} user(s) mapped.`);
    };
    r.onerror=()=>{setCsvUploading(false);showToast('Failed to read CSV.','error')};
    r.readAsText(file);
  };

  const clearCsv=()=>{
    setCsvEmails(null);
    const byLocal={};
    googleUsers.forEach(u=>{const em=(u.email||'').toLowerCase();const loc=em.split('@')[0];if(loc)byLocal[loc]=em});
    const m={};const used=new Set();
    users.forEach(u=>{const loc=(u.email_address||'').toLowerCase().split('@')[0];const dest=byLocal[loc]||'';if(dest&&!used.has(dest)){m[u.uuid]=dest;used.add(dest);}else m[u.uuid]='';});
    setCl2gMappings(m);
    setCl2gSelectedUuids(new Set(Object.entries(m).filter(([,v])=>v).map(([k])=>k)));
    persistMappings(m,null);
    showToast('CSV cleared — restored auto-mapping.');
  };

  const displayUsers=csvEmails?users.filter(u=>csvEmails.includes(u.uuid)):users;
  const filtered=displayUsers.filter(u=>{
    const q=search.toLowerCase();
    return (u.full_name||'').toLowerCase().includes(q)||(u.email_address||'').toLowerCase().includes(q)||(cl2gMappings[u.uuid]||'').toLowerCase().includes(q);
  }).sort((a,b)=>{const ma=!!cl2gMappings[a.uuid],mb=!!cl2gMappings[b.uuid];if(ma!==mb)return ma?-1:1;return (a.email_address||'').localeCompare(b.email_address||'')});

  const toggleUser=uuid=>setCl2gSelectedUuids(p=>{const n=new Set(p);n.has(uuid)?n.delete(uuid):n.add(uuid);return n});
  const autoMapped=displayUsers.filter(u=>!!cl2gMappings[u.uuid]).length;
  const unmapped=displayUsers.filter(u=>!cl2gMappings[u.uuid]).length;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}} className="fade-up">
      <div style={{flexShrink:0,marginBottom:12}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
          <div>
            <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:2}}>User Mapping</div>
            <div style={{fontSize:13,color:C.muted}}>
              {csvEmails?<span style={{color:C.primary,fontWeight:500}}>{csvEmails.length} users from CSV</span>
              :<>Map Claude accounts to Google destination emails.{' '}
              {autoMapped>0&&<span style={{color:C.success,fontWeight:500}}>{autoMapped} auto-mapped</span>}
              {unmapped>0&&<span style={{color:C.error}}>{autoMapped>0?' · ':''}{unmapped} need mapping</span>}</>}
            </div>
          </div>
          <div style={{display:'flex',gap:4,flexShrink:0}}>
            <input ref={csvRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])uploadCsv(e.target.files[0]);e.target.value=''}}/>
            <button onClick={()=>csvRef.current.click()} disabled={csvUploading} title="Upload CSV"
              style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}
              onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              {csvUploading?<Spinner s={12}/>:<IcoUpload s={13} c={C.muted}/>}
            </button>
            <button onClick={downloadCsv} title="Download CSV"
              style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.primary}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}
              onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <IcoDownload s={13} c={C.primary}/>
            </button>
            {csvEmails&&<button onClick={clearCsv} title="Clear CSV — restore auto-mapping"
              style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.error}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}
              onMouseEnter={e=>e.currentTarget.style.background='#FEF2F2'} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <IcoTrash s={13}/>
            </button>}
          </div>
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:8}}><span style={{fontWeight:600,color:C.primary}}>{cl2gSelectedUuids.size}</span> of {displayUsers.length} selected</div>
        <SearchBar value={search} onChange={setSearch} placeholder="Search by name or email..."/>
      </div>
      <div style={{flex:1,overflowY:'auto',minHeight:0,background:'white',border:`1px solid ${C.border}`,borderRadius:10}}>
        <div style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr',padding:'9px 14px',background:C.bg,borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.4,position:'sticky',top:0,zIndex:1}}>
          <input type="checkbox" checked={cl2gSelectedUuids.size>0&&cl2gSelectedUuids.size===displayUsers.length} onChange={()=>{if(cl2gSelectedUuids.size===displayUsers.length)setCl2gSelectedUuids(new Set());else setCl2gSelectedUuids(new Set(displayUsers.map(u=>u.uuid)))}} style={{accentColor:C.primary,width:15,height:15,cursor:'pointer'}}/>
          <div>Claude Account</div><div>Google Destination</div>
        </div>
        {filtered.map((u,i)=>{
          const mapped=!!cl2gMappings[u.uuid];
          return(
            <div key={u.uuid} style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr',alignItems:'center',padding:'9px 14px',borderBottom:i<filtered.length-1?`1px solid ${C.bg}`:'none',background:cl2gSelectedUuids.has(u.uuid)?C.tint:'white',transition:'background .15s',cursor:'pointer'}} onClick={()=>toggleUser(u.uuid)}>
              <input type="checkbox" checked={cl2gSelectedUuids.has(u.uuid)} onChange={()=>toggleUser(u.uuid)} style={{accentColor:C.primary,width:15,height:15}} onClick={e=>e.stopPropagation()}/>
              <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}>
                <Avatar name={u.full_name||u.email_address} email={u.email_address} size={26}/>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:500,color:C.dark,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.full_name||'(no name)'}</div>
                  <div style={{fontSize:11,color:C.muted,fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.email_address}</div>
                  {u.conversationCount>0&&<div style={{fontSize:10,color:C.primaryL}}>{u.conversationCount} convs{u.hasMemory?' · memory':''}{u.projectCount>0?` · ${u.projectCount} project${u.projectCount>1?'s':''}`:''}</div>}
                </div>
              </div>
              {/* Destination cell — text display with click-to-change */}
              <div style={{display:'flex',alignItems:'center',gap:6,minWidth:0,paddingRight:8}} onClick={e=>e.stopPropagation()}>
                {mapped?(
                  <>
                    <Avatar name={cl2gMappings[u.uuid]} email={cl2gMappings[u.uuid]} size={22}/>
                    <span style={{fontSize:12,color:C.dark,fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{cl2gMappings[u.uuid]}</span>
                    <button onClick={e=>{e.stopPropagation();handleMappingChange(u.uuid,'')}} title="Clear mapping" style={{flexShrink:0,background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:14,lineHeight:1,padding:'0 2px'}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color=C.muted}>✕</button>
                  </>
                ):(
                  googleUsers.length>0?(
                    <select defaultValue="" onChange={e=>{e.stopPropagation();if(e.target.value)handleMappingChange(u.uuid,e.target.value);e.target.value=''}}
                      onClick={e=>e.stopPropagation()}
                      style={{border:'none',background:'transparent',fontSize:12,fontFamily:'inherit',color:C.muted,cursor:'pointer',outline:'none',width:'100%',padding:'2px 0'}}>
                      <option value="">— assign —</option>
                      {googleUsers.map(g=><option key={g.email||g.id} value={g.email||''}>{g.email||g.name}</option>)}

      </div>
      {cl2gSelectedUuids.size===0&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:8,fontSize:12,color:'#991B1B',marginBottom:8}}><IcoWarn s={13}/>Select at least one user to continue.</div>}
      <div style={{flexShrink:0,display:'flex',gap:10,paddingTop:4}}>

        <Btn onClick={onNext} disabled={cl2gSelectedUuids.size===0} style={{flex:1,justifyContent:'center'}}>Continue →</Btn>
      </div>
    </div>
  );
};

const GEM_INSTRUCTIONS=`You are my personal Claude conversation assistant. The uploaded document(s) contain my complete Claude conversation history, with each conversation clearly labeled by number and title.

How to answer my questions:
1. ALWAYS search the uploaded documents thoroughly before responding.
2. When I ask about a topic — find all conversations related to it in the document and summarize what was discussed.
3. When I ask "what did I ask about X?" or "find my conversation about X" — locate it in the document and return the exact Human and Claude message exchanges.
4. When I ask to continue or follow up on a past conversation — find that conversation in the document, read the full message thread, then continue responding as Claude would, staying consistent with the context and conclusions already reached in that conversation.
5. Answer from the document content directly. Do not rephrase from your own training memory when the topic is in the documents.
6. If a topic is not found anywhere in the documents, say: "This topic was not in your migrated conversation history." Then answer from general knowledge if helpful.
7. Never fabricate conversation content that is not in the documents.

Document structure: Each conversation starts with "Conversation N: Title" followed by [Human] and [Claude] labeled messages in chronological order.`;

4. When I ask to continue or follow up on a past conversation — find that conversation in the document, read the full message thread, then continue responding as Copilot would, staying consistent with the context and conclusions already reached.
5. Answer from the document content directly. Do not rephrase from your own training memory when the topic is in the documents.
6. If a topic is not found anywhere in the documents, say: "This topic was not in your migrated Copilot history." Then answer from general knowledge if helpful.
7. Never fabricate conversation content that is not in the documents.
8. If a message references an attached file, look for its Google Drive link in the document — you can mention that the file is available in Google Drive.

Document structure: Each conversation starts with "Conversation N: Title" followed by [You] and [Copilot] labeled messages in chronological order.`;

const StepCL2CUpload=({cl2cUploadData,setCl2cUploadData,onNext,onBack,showToast})=>{
  const [uploading,setUploading]=useState(false);
  const [dragOver,setDragOver]=useState(false);
  const [uploads,setUploads]=useState([]);
  const [showMenu,setShowMenu]=useState(false);
  const fileRef=useRef(null);
  const menuRef=useRef(null);

  const loadUploads=async()=>{
    try{
      const r=await fetch('/api/cl2c/uploads');const d=await r.json();
      const list=Array.isArray(d)?d:[];
      setUploads(list);
      // Auto-select most recent upload if nothing is selected (persists across refresh/login)
      if(!cl2cUploadData&&list.length>0){
        const u=list[0];
        setCl2cUploadData({uploadId:u._id,users:u.users||[],totalConversations:u.totalConversations||0,totalMemories:u.totalMemories||0,totalProjects:u.totalProjects||0,fileName:u.fileName});
      }
    }catch{}
  };
  useEffect(()=>{loadUploads();},[]);

  // Close dropdown when clicking outside
  useEffect(()=>{
    const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setShowMenu(false)};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  const uploadZip=async(file)=>{
    if(!file||!file.name.toLowerCase().endsWith('.zip')){showToast('Only ZIP files accepted.','error');return;}
    setUploading(true);
    const fd=new FormData();fd.append('file',file);
    try{
      const r=await fetch('/api/cl2c/upload',{method:'POST',body:fd});
      const text=await r.text();
      let d;try{d=JSON.parse(text);}catch{throw new Error(`Upload failed (${r.status})`)}
      if(!r.ok)throw new Error(d.error||'Upload failed');
      setCl2cUploadData({uploadId:d.uploadId,users:d.users||[],totalConversations:d.totalConversations||0,totalMemories:d.totalMemories||0,totalProjects:d.totalProjects||0,fileName:file.name});
      await loadUploads();
      showToast(`Uploaded — ${d.totalConversations} conversations, ${d.users?.length||0} users found.`);
    }catch(e){showToast(e.message,'error')}
    finally{setUploading(false)}
  };

  const deleteUpload=async(id,e)=>{
    e.stopPropagation();
    try{
      await fetch(`/api/cl2c/uploads/${id}`,{method:'DELETE'});
      if(cl2cUploadData?.uploadId===id)setCl2cUploadData(null);
      setUploads(p=>p.filter(u=>u._id!==id));
      showToast('Upload deleted.');
    }catch(err){showToast(err.message,'error')}
  };

  const selectUpload=doc=>{
    setCl2cUploadData({uploadId:doc._id,users:doc.users||[],totalConversations:doc.totalConversations||0,totalMemories:doc.totalMemories||0,totalProjects:doc.totalProjects||0,fileName:doc.fileName});
    setShowMenu(false);
  };

  return(
    <div className="fade-up">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Upload Claude Export</div>
          <div style={{fontSize:13,color:C.muted}}>Download your Claude data export (ZIP) and upload it here.</div>
        </div>
        {/* Previous uploads hamburger */}
        <div ref={menuRef} style={{position:'relative',flexShrink:0}}>
          <button onClick={()=>{setShowMenu(p=>!p);loadUploads()}} title="Previous uploads"
            style={{width:36,height:36,borderRadius:8,border:`1px solid ${C.border}`,background:'white',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:C.muted,transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.color=C.primary}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted}}>
            <IcoMenu s={16}/>
          </button>
          {showMenu&&(
            <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',width:320,background:'white',border:`1px solid ${C.border}`,borderRadius:10,boxShadow:'0 8px 30px rgba(0,0,0,.12)',zIndex:100,overflow:'hidden'}}>
              <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.bg}`,fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>Previous Uploads</div>
              {uploads.length===0
                ?<div style={{padding:'20px 14px',fontSize:13,color:C.muted,textAlign:'center'}}>No uploads yet</div>
                :uploads.map((u,i)=>{
                  const isActive=cl2cUploadData?.uploadId===u._id;
                  return(
                    <div key={u._id} onClick={()=>selectUpload(u)}
                      style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',cursor:'pointer',borderBottom:i<uploads.length-1?`1px solid ${C.bg}`:'none',background:isActive?C.tint:'white',transition:'background .15s'}}
                      onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background=C.bg}}
                      onMouseLeave={e=>{e.currentTarget.style.background=isActive?C.tint:'white'}}>
                      <IcoZip s={20} c={isActive?C.primary:C.primaryL}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',display:'flex',alignItems:'center',gap:6}}>
                          <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{u.fileName}</span>
                          {isActive&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:10,background:C.primary,color:'white',flexShrink:0}}>active</span>}
                        </div>
                        <div style={{fontSize:11,color:C.muted}}>{u.totalConversations} convs · {u.users?.length||0} users · {new Date(u.uploadTime).toLocaleDateString()}</div>
                      </div>
                      <button onClick={e=>deleteUpload(u._id,e)} title="Delete"
                        style={{padding:'4px 6px',border:'none',background:'none',cursor:'pointer',color:C.muted,borderRadius:4,flexShrink:0,display:'flex',alignItems:'center',transition:'all .15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.background='#FEF2F2';e.currentTarget.style.color=C.error}}
                        onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color=C.muted}}>
                        <IcoTrash s={13}/>
                      </button>
                    </div>
                  );
                })
              }
            </div>
          )}
        </div>
      </div>

      <div onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)uploadZip(f)}}
        onClick={()=>!uploading&&fileRef.current.click()}
        style={{border:`2px dashed ${dragOver?C.primary:C.border}`,borderRadius:12,padding:'36px',textAlign:'center',cursor:'pointer',background:dragOver?C.tint:'white',transition:'all .2s',marginBottom:16}}>
        <input ref={fileRef} type="file" accept=".zip" style={{display:'none'}} onChange={e=>{if(e.target.files[0])uploadZip(e.target.files[0]);e.target.value=''}}/>
        {uploading
          ?<><Spinner s={28}/><div style={{fontSize:13,color:C.muted,marginTop:10}}>Uploading & parsing ZIP…</div></>
          :<><IcoZip s={28} c={dragOver?C.primary:C.muted}/><div style={{fontSize:13,color:C.muted,marginTop:8}}>Drag & drop your Claude export ZIP here</div><div style={{fontSize:11,color:C.primaryL,marginTop:4}}>or click to browse</div></>}
      </div>

      {cl2cUploadData&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:C.tint,borderRadius:8,border:`1px solid ${C.primary}30`,marginBottom:16}}>
          <IcoZip s={18} c={C.primary}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:C.primary,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cl2cUploadData.fileName}</div>
            <div style={{fontSize:11,color:C.muted}}>{cl2cUploadData.totalConversations} conversations · {cl2cUploadData.users?.length||0} users{cl2cUploadData.totalMemories>0?` · ${cl2cUploadData.totalMemories} memory`:''}{cl2cUploadData.totalProjects>0?` · ${cl2cUploadData.totalProjects} project${cl2cUploadData.totalProjects>1?'s':''}`:''}</div>
          </div>
          <Check s={16} c={C.success}/>
        </div>
      )}

      <div style={{display:'flex',gap:10}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={onNext} disabled={!cl2cUploadData} style={{flex:1,justifyContent:'center'}}>Continue →</Btn>
      </div>
    </div>
  );
};

const StepCL2CMap=({cl2cUploadData,msUsers,cl2cMappings,setCl2cMappings,cl2cSelectedUuids,setCl2cSelectedUuids,onNext,onBack,showToast})=>{
  const csvRef=useRef(null);
  const [search,setSearch]=useState('');
  const [csvUploading,setCsvUploading]=useState(false);
  const [csvEmails,setCsvEmails]=useState(null);
  const users=cl2cUploadData?.users||[];
  // Always keep a current ref so auto-map effect never reads a stale closure
  const cl2cMappingsRef=useRef(cl2cMappings);
  cl2cMappingsRef.current=cl2cMappings;

  // Load saved mappings + CSV from DB on mount; also restore upload if wiped by refresh
  useEffect(()=>{
    // Restore upload data if missing (e.g. after page refresh)
    if(!cl2cUploadData){
      fetch('/api/cl2c/uploads').then(r=>r.ok?r.json():null).then(list=>{
        if(Array.isArray(list)&&list.length>0){
          const u=list[0];
          setCl2cUploadData({uploadId:u._id,users:u.users||[],totalConversations:u.totalConversations||0,totalMemories:u.totalMemories||0,totalProjects:u.totalProjects||0,fileName:u.fileName});
        }
      }).catch(()=>{});
    }
    fetch('/api/cl2c/user-mappings').then(r=>r.ok?r.json():null).then(doc=>{
      if(doc?.mappings)setCl2cMappings(prev=>({...prev,...doc.mappings}));
      if(doc?.csvEmails){
        setCsvEmails(doc.csvEmails);
        if(doc.csvEmails.length>0)setCl2cSelectedUuids(new Set(doc.csvEmails.filter(uuid=>doc.mappings?.[uuid])));
      }
    }).catch(()=>{});
  },[]);

  // Auto-map by email local-part — each MS email used at most once
  useEffect(()=>{
    if(!users.length||!msUsers.length)return;
    const byLocal={};
    msUsers.forEach(u=>{const em=(u.mail||u.userPrincipalName||'').toLowerCase();const loc=em.split('@')[0];if(loc)byLocal[loc]=em});
    const m={};const used=new Set();
    users.forEach(u=>{
      const existing=(cl2cMappingsRef.current[u.uuid]||'').toLowerCase();
      if(existing&&!used.has(existing)){m[u.uuid]=existing;used.add(existing);}
      else{const loc=(u.email_address||'').toLowerCase().split('@')[0];const dest=byLocal[loc]||'';
        if(dest&&!used.has(dest)){m[u.uuid]=dest;used.add(dest);}else m[u.uuid]='';}
    });
    setCl2cMappings(m);
    setCl2cSelectedUuids(new Set(Object.entries(m).filter(([,v])=>v).map(([k])=>k)));
  },[users,msUsers]);

  const persistMappings=(mappings,csv)=>{
    fetch('/api/cl2c/user-mappings',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mappings,csvEmails:csv||null})}).catch(()=>{});
  };

  const handleMappingChange=(uuid,val)=>{
    const m={...cl2cMappings,[uuid]:val};
    setCl2cMappings(m);
    persistMappings(m,csvEmails);
  };

  const downloadCsv=()=>{
    if(!users.length){showToast('No source users found.','error');return;}
    const availableMs=(msUsers||[]).map(u=>(u.mail||u.userPrincipalName||'').toLowerCase()).filter(Boolean);
    const usedDest=new Set(Object.values(cl2cMappings).filter(Boolean));
    const unusedMs=availableMs.filter(e=>!usedDest.has(e));
    let unusedIdx=0;
    const sorted=[...users].sort((a,b)=>{const ma=!!cl2cMappings[a.uuid],mb=!!cl2cMappings[b.uuid];if(ma!==mb)return ma?-1:1;return(a.email_address||'').localeCompare(b.email_address||'')});
    const rows=sorted.map(u=>{const dest=cl2cMappings[u.uuid]||(unusedMs[unusedIdx]?unusedMs[unusedIdx++]:'');return`"${u.email_address||''}","${dest}"`;});
    const csv='Source User,Destination User\n'+rows.join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='cl2c-user-mappings.csv';a.click();
    showToast(`CSV downloaded — ${users.length} source user(s).`);
  };

  const uploadCsv=file=>{
    setCsvUploading(true);
    const r=new FileReader();
    r.onload=e=>{
      const lines=e.target.result.split(/\r?\n/).slice(1);
      const emailToUuid={};
      users.forEach(u=>{if(u.email_address)emailToUuid[u.email_address.toLowerCase()]=u.uuid});
      const m={...cl2cMappings};const csvUuids=[];const usedDest=new Set();
      for(const l of lines){
        if(!l.trim())continue;
        const c=parseCsvLine(l);
        if(c.length>=2&&c[0]){
          const srcEmail=c[0].trim().toLowerCase();
          const dstEmail=c[1].trim().toLowerCase();
          const uuid=emailToUuid[srcEmail];
          if(uuid&&dstEmail&&!usedDest.has(dstEmail)){m[uuid]=dstEmail;csvUuids.push(uuid);usedDest.add(dstEmail);}
          else if(uuid&&!dstEmail){m[uuid]='';csvUuids.push(uuid);}
        }
      }
      setCl2cMappings(m);setCsvEmails(csvUuids);
      setCl2cSelectedUuids(new Set(csvUuids.filter(id=>m[id])));
      persistMappings(m,csvUuids);
      setCsvUploading(false);
      showToast(`CSV uploaded — ${csvUuids.length} user(s) mapped.`);
    };
    r.onerror=()=>{setCsvUploading(false);showToast('Failed to read CSV.','error')};
    r.readAsText(file);
  };

  const clearCsv=()=>{
    setCsvEmails(null);
    const byLocal={};
    msUsers.forEach(u=>{const em=(u.mail||u.userPrincipalName||'').toLowerCase();const loc=em.split('@')[0];if(loc)byLocal[loc]=em});
    const m={};const used=new Set();
    users.forEach(u=>{const loc=(u.email_address||'').toLowerCase().split('@')[0];const dest=byLocal[loc]||'';if(dest&&!used.has(dest)){m[u.uuid]=dest;used.add(dest);}else m[u.uuid]='';});
    setCl2cMappings(m);
    setCl2cSelectedUuids(new Set(Object.entries(m).filter(([,v])=>v).map(([k])=>k)));
    persistMappings(m,null);
    showToast('CSV cleared — restored auto-mapping.');
  };

  const displayUsers=csvEmails?users.filter(u=>csvEmails.includes(u.uuid)):users;
  const filtered=displayUsers.filter(u=>{
    const q=search.toLowerCase();
    return(u.full_name||'').toLowerCase().includes(q)||(u.email_address||'').toLowerCase().includes(q)||(cl2cMappings[u.uuid]||'').toLowerCase().includes(q);
  }).sort((a,b)=>{const ma=!!cl2cMappings[a.uuid],mb=!!cl2cMappings[b.uuid];if(ma!==mb)return ma?-1:1;return(a.email_address||'').localeCompare(b.email_address||'')});

  const toggleUser=uuid=>setCl2cSelectedUuids(p=>{const n=new Set(p);n.has(uuid)?n.delete(uuid):n.add(uuid);return n});
  const autoMapped=displayUsers.filter(u=>!!cl2cMappings[u.uuid]).length;
  const unmapped=displayUsers.filter(u=>!cl2cMappings[u.uuid]).length;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}} className="fade-up">
      <div style={{flexShrink:0,marginBottom:12}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
          <div>
            <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:2}}>User Mapping</div>
            <div style={{fontSize:13,color:C.muted}}>
              {csvEmails?<span style={{color:C.primary,fontWeight:500}}>{csvEmails.length} users from CSV</span>
              :<>Map Claude accounts to Microsoft 365 destination emails.{' '}
              {autoMapped>0&&<span style={{color:C.success,fontWeight:500}}>{autoMapped} auto-mapped</span>}
              {unmapped>0&&<span style={{color:C.error}}>{autoMapped>0?' · ':''}{unmapped} need mapping</span>}</>}
            </div>
          </div>
          <div style={{display:'flex',gap:4,flexShrink:0}}>
            <input ref={csvRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])uploadCsv(e.target.files[0]);e.target.value=''}}/>
            <button onClick={()=>csvRef.current.click()} disabled={csvUploading} title="Upload CSV"
              style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}
              onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              {csvUploading?<Spinner s={12}/>:<IcoUpload s={13} c={C.muted}/>}
            </button>
            <button onClick={downloadCsv} title="Download CSV"
              style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.primary}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}
              onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <IcoDownload s={13} c={C.primary}/>
            </button>
            {csvEmails&&<button onClick={clearCsv} title="Clear CSV — restore auto-mapping"
              style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.error}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}
              onMouseEnter={e=>e.currentTarget.style.background='#FEF2F2'} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <IcoTrash s={13}/>
            </button>}
          </div>
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:8}}><span style={{fontWeight:600,color:C.primary}}>{cl2cSelectedUuids.size}</span> of {displayUsers.length} selected</div>
        <SearchBar value={search} onChange={setSearch} placeholder="Search by name or email..."/>
      </div>
      <div style={{flex:1,overflowY:'auto',minHeight:0,background:'white',border:`1px solid ${C.border}`,borderRadius:10}}>
        <div style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr',padding:'9px 14px',background:C.bg,borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.4,position:'sticky',top:0,zIndex:1}}>
          <input type="checkbox" checked={cl2cSelectedUuids.size>0&&cl2cSelectedUuids.size===displayUsers.length} onChange={()=>{if(cl2cSelectedUuids.size===displayUsers.length)setCl2cSelectedUuids(new Set());else setCl2cSelectedUuids(new Set(displayUsers.map(u=>u.uuid)))}} style={{accentColor:C.primary,width:15,height:15,cursor:'pointer'}}/>
          <div>Claude Account</div><div>M365 Destination</div>
        </div>
        {filtered.map((u,i)=>{
          const mapped=!!cl2cMappings[u.uuid];
          return(
            <div key={u.uuid} style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr',alignItems:'center',padding:'9px 14px',borderBottom:i<filtered.length-1?`1px solid ${C.bg}`:'none',background:cl2cSelectedUuids.has(u.uuid)?C.tint:'white',transition:'background .15s',cursor:'pointer'}} onClick={()=>toggleUser(u.uuid)}>
              <input type="checkbox" checked={cl2cSelectedUuids.has(u.uuid)} onChange={()=>toggleUser(u.uuid)} style={{accentColor:C.primary,width:15,height:15}} onClick={e=>e.stopPropagation()}/>
              <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}>
                <Avatar name={u.full_name||u.email_address} email={u.email_address} size={26}/>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:500,color:C.dark,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.full_name||'(no name)'}</div>
                  <div style={{fontSize:11,color:C.muted,fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.email_address}</div>
                  {u.conversationCount>0&&<div style={{fontSize:10,color:C.primaryL}}>{u.conversationCount} convs{u.hasMemory?' · memory':''}{u.projectCount>0?` · ${u.projectCount} project${u.projectCount>1?'s':''}`:''}</div>}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6,minWidth:0,paddingRight:8}} onClick={e=>e.stopPropagation()}>
                {mapped?(
                  <>
                    <Avatar name={cl2cMappings[u.uuid]} email={cl2cMappings[u.uuid]} size={22}/>
                    <span style={{fontSize:12,color:C.dark,fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{cl2cMappings[u.uuid]}</span>
                    <button onClick={e=>{e.stopPropagation();handleMappingChange(u.uuid,'')}} title="Clear mapping" style={{flexShrink:0,background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:14,lineHeight:1,padding:'0 2px'}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color=C.muted}>✕</button>
                  </>
                ):(
                  msUsers.length>0?(
                    <select defaultValue="" onChange={e=>{e.stopPropagation();if(e.target.value)handleMappingChange(u.uuid,e.target.value);e.target.value=''}}
                      onClick={e=>e.stopPropagation()}
                      style={{border:'none',background:'transparent',fontSize:12,fontFamily:'inherit',color:C.muted,cursor:'pointer',outline:'none',width:'100%',padding:'2px 0'}}>
                      <option value="">— assign —</option>
                      {msUsers.map(ms=><option key={ms.mail||ms.userPrincipalName} value={ms.mail||ms.userPrincipalName||''}>{ms.mail||ms.userPrincipalName}</option>)}
                    </select>
                  ):(
                    <span style={{color:C.muted,fontSize:13}}>–</span>
                  )
                )}
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:'center',padding:'24px',fontSize:13,color:C.muted}}>No users found.</div>}
      </div>
      {cl2cSelectedUuids.size===0&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:8,fontSize:12,color:'#991B1B',marginBottom:8}}><IcoWarn s={13}/>Select at least one user to continue.</div>}
      <div style={{flexShrink:0,display:'flex',gap:10,paddingTop:4}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={onNext} disabled={cl2cSelectedUuids.size===0} style={{flex:1,justifyContent:'center'}}>Continue →</Btn>
      </div>
    </div>
  );
};

const StepCL2COptions=({cl2cOptions,setCl2cOptions,cl2cConfig,setCl2cConfig,msAuthed,onRun,onBack})=>{

    <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer',padding:'8px 0'}}>
      <input type="checkbox" checked={checked} onChange={onChange} style={{accentColor:C.primary,width:16,height:16}}/>
      <div><span>{label}</span>{hint&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>{hint}</div>}</div>
    </label>
  );
  return(
    <div className="fade-up">
      <div style={{marginBottom:20}}>
        <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Migration Options</div>
        <div style={{fontSize:13,color:C.muted}}>Configure how Claude conversations will be migrated to Microsoft OneNote.</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:20}}>

        <Chk label="Include memory" hint="Creates a Claude Memory page in OneNote" checked={cl2cOptions.includeMemory!==false} onChange={e=>setCl2cOptions(p=>({...p,includeMemory:e.target.checked}))}/>
        <Chk label="Include projects" hint="Creates a Claude Projects page in OneNote" checked={cl2cOptions.includeProjects!==false} onChange={e=>setCl2cOptions(p=>({...p,includeProjects:e.target.checked}))}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Field label="From Date"><Input type="date" value={cl2cOptions.fromDate||''} onChange={e=>setCl2cOptions(p=>({...p,fromDate:e.target.value}))}/></Field>
          <Field label="To Date"><Input type="date" value={cl2cOptions.toDate||''} onChange={e=>setCl2cOptions(p=>({...p,toDate:e.target.value}))}/></Field>
        </div>
        {(cl2cOptions.fromDate||cl2cOptions.toDate)&&<TextBtn onClick={()=>setCl2cOptions(p=>({...p,fromDate:'',toDate:''}))} style={{fontSize:11,marginTop:2,color:C.muted}}>Clear date range</TextBtn>}
      </div>
      {!cl2cOptions.dryRun&&!msAuthed&&(
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:8,fontSize:12,color:'#991B1B',marginBottom:12}}><IcoWarn s={13}/>Microsoft 365 account not connected. Sign in with Microsoft to run a live migration.</div>
      )}
      <div style={{display:'flex',gap:10}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={()=>onRun()} disabled={!cl2cConfig.folderName||(!cl2cOptions.dryRun&&!msAuthed)} style={{flex:1,justifyContent:'center'}}>
          {cl2cOptions.dryRun?<><IcoSearch s={14}/>Start Dry Run</>:<><IcoRocket s={14}/>Start Migration</>}
        </Btn>
      </div>
    </div>
  );
};

            <div style={{fontSize:13,color:C.muted}}>{lastRunWasDry?'Preview finished — no pages were created.':'Claude conversations have been created as OneNote pages.'}</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:20}}>
            {[{label:'Users Processed',val:cl2cStats.users,c:'#0129AC'},{label:lastRunWasDry?'Pages (preview)':'Pages Created',val:cl2cStats.files,c:'#20CC83'},{label:'Errors',val:cl2cStats.errors,c:'#FF1F1F'}].map((e,i)=>(

                <div style={{fontSize:22,fontWeight:700,color:e.c}}>{e.val}</div>

        </>
      )}

  );
};

const ReportsPanel=({onClose,refreshKey=0,liveStats=null,liveBatchId=null,isLive=false})=>{
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(true);
  const [agg,setAgg]=useState(null);
  const [expanded,setExpanded]=useState({});
  const [batchDetails,setBatchDetails]=useState({});
  const pollRef=useRef(null);

  const loadReports=useCallback(()=>{
    Promise.all([
      fetch('/api/reports').then(r=>r.json()).catch(()=>[]),
      fetch('/api/reports/aggregate').then(r=>r.json()).catch(()=>null)
    ]).then(([list,aggData])=>{
      setReports(Array.isArray(list)?list:[]);
      setAgg(aggData);
      setLoading(false);
    });
  },[]);

  // Re-fetch whenever panel opens (refreshKey changes) or migration completes
  useEffect(()=>{ setLoading(true); loadReports(); },[refreshKey]);

  // Auto-poll every 3s while any batch is running
  useEffect(()=>{
    const hasRunning=reports.some(r=>r.status==='running')||isLive;
    if(hasRunning){
      pollRef.current=setInterval(loadReports,3000);
    } else {
      clearInterval(pollRef.current);
    }
    return()=>clearInterval(pollRef.current);
  },[reports,isLive,loadReports]);

  const toggleDetail=async(id)=>{
    setExpanded(p=>({...p,[id]:!p[id]}));
    if(!batchDetails[id]){
      fetch(`/api/reports/${id}`).then(r=>r.ok?r.json():null).then(d=>{
        if(d?.users)setBatchDetails(p=>({...p,[id]:d.users}));
      }).catch(()=>{});
    }
  };

  const dlBatch=id=>{
    const a=document.createElement('a');a.href=`/api/reports/${id}/csv`;a.download=`batch_${id}.csv`;a.click();
  };

  const fmtDate=ts=>{try{const d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})}catch{return ts}};
  const fmtDur=(s,e)=>{try{const sec=Math.round((new Date(e)-new Date(s))/1000);return sec<60?`${sec}s`:`${Math.floor(sec/60)}m ${sec%60}s`}catch{return ''}};
  const statusStyle=(r)=>{
    if(r.status==='running')return{bg:'#EFF6FF',color:'#1D4ED8',label:'In Progress'};
    if(r.dryRun)return{bg:'#FEF3C7',color:'#92400E',label:'Dry Run'};
    if(r.status==='failed')return{bg:'#FEE2E2',color:'#991B1B',label:'Failed'};
    if(r.totalErrors>0)return{bg:'#FEF3C7',color:'#92400E',label:'Partial'};
    return{bg:'#DCFCE7',color:'#166534',label:'Success'};
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'flex-end'}} onClick={onClose}>
      <div style={{width:'100%',maxWidth:680,height:'100vh',background:'white',display:'flex',flexDirection:'column',boxShadow:'-4px 0 30px rgba(0,0,0,.15)',animation:'slideRight .3s ease'}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <div style={{fontSize:18,fontWeight:600,color:C.primary}}>Migration Reports</div>
            <div style={{fontSize:12,color:C.muted}}>All migration batches across sessions</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={loadReports} title="Refresh" style={{width:32,height:32,borderRadius:'50%',border:`1px solid ${C.border}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:C.primary}} onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}><IcoReset s={13}/></button>
            <button onClick={onClose} style={{width:32,height:32,borderRadius:'50%',border:`1px solid ${C.border}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:C.muted}}>✕</button>
          </div>
        </div>

        {/* Aggregate Summary Bar */}
        {agg&&(
          <div style={{padding:'12px 24px',background:C.tint,borderBottom:`1px solid ${C.primary}20`,flexShrink:0}}>
            <div style={{fontSize:10,fontWeight:700,color:C.primary,textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Overall Summary</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
              {[['Total Batches',agg.totalBatches,C.primary],['Live Batches',agg.liveBatches,C.primary],['Pages Created',agg.totalPages,C.success],['Total Errors',agg.totalErrors,agg.totalErrors>0?C.error:C.muted]].map(([lbl,val,col],i)=>(
                <div key={i} style={{background:'white',borderRadius:8,padding:'8px 12px',textAlign:'center',border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:18,fontWeight:700,color:col}}>{val??0}</div>
                  <div style={{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:.3,marginTop:2}}>{lbl}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{flex:1,overflowY:'auto',padding:'16px 24px'}}>
          {loading&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'20px 0',color:C.muted}}><Spinner s={16}/> Loading...</div>}
          {!loading&&reports.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:C.muted,fontSize:13}}>No migration reports yet. Run a migration to see results here.</div>}
          {reports.map((r,i)=>{
            const ss=statusStyle(r);
            const isExp=expanded[r._id];
            const details=batchDetails[r._id];
            return(
              <Card key={i} className="fade-up" style={{marginBottom:12,animationDelay:`${i*40}ms`}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                      <span style={{fontSize:13,fontWeight:600,color:C.dark}}>{r.customerName||'Migration'}</span>
                      <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,fontWeight:600,background:ss.bg,color:ss.color}}>{ss.label}</span>
                      {(r.direction==='c2g'||r.direction==='copilot-gemini')&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#EFF6FF',color:'#1D4ED8',fontWeight:600}}>C2G</span>}
                      {r.direction==='claude-gemini'&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#FFF7ED',color:'#C2410C',fontWeight:600}}>CL2G</span>}
                      {r.direction==='claude-copilot'&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#F5F3FF',color:'#6D28D9',fontWeight:600}}>CL2C</span>}
                      {(!r.direction||r.direction==='gemini-copilot')&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#F0FDF4',color:'#166534',fontWeight:600}}>G2C</span>}
                    </div>
                    <div style={{fontSize:12,color:C.muted,display:'flex',gap:12}}>
                      <span>{fmtDate(r.startTime)}</span>
                      {r.endTime&&<span>⏱ {fmtDur(r.startTime,r.endTime)}</span>}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6,flexShrink:0,marginLeft:8,alignItems:'center'}}>
                    {r.status==='running'&&<span style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'#1D4ED8'}}><Spinner s={12}/>Running...</span>}
                    {r.status!=='running'&&!r.dryRun&&<button onClick={()=>dlBatch(r._id)} title="Download CSV" style={{display:'flex',alignItems:'center',gap:4,padding:'5px 9px',borderRadius:6,border:`1px solid ${C.primary}`,background:'white',fontSize:11,color:C.primary,cursor:'pointer',fontFamily:'inherit',fontWeight:500}} onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}><IcoDownload s={11} c={C.primary}/> CSV</button>}
                  </div>
                </div>

                <div style={{display:'flex',gap:16,borderTop:`1px solid ${C.bg}`,paddingTop:8,marginTop:4,justifyContent:'space-between',alignItems:'flex-end'}}>
                  <div style={{display:'flex',gap:16}}>
                    {(()=>{
                      const isRunningBatch=r.status==='running';
                      const live=isRunningBatch&&liveStats&&r._id===liveBatchId;
                      const doneUsers=live?liveStats.users:(isRunningBatch?r.progressUsers:r.totalUsers);
                      const donePages=live?liveStats.pages:(isRunningBatch?r.progressPages:r.migratedConversations);
                      const doneErrors=live?liveStats.errors:(isRunningBatch?r.progressErrors:r.totalErrors);
                      const totalUsers=r.totalUsers||0;
                      const filesLabel=(r.direction==='c2g'||r.direction==='copilot-gemini'||r.direction==='claude-gemini')?'Files':'Pages';
                      // use src→dest layout for any direction that has source+destination users
                      return[
                        ['Users',isRunningBatch?`${doneUsers??0}/${totalUsers}`:doneUsers,false],
                        [filesLabel,donePages,false],
                        ['Errors',doneErrors,doneErrors>0]
                      ].map(([lbl,val,isErr],j)=>(
                        <div key={j} style={{textAlign:'center'}}>
                          <div style={{fontSize:16,fontWeight:700,color:isErr?C.error:C.primary}}>{val??0}</div>
                          <div style={{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:.3}}>{lbl}</div>
                        </div>
                      ));
                    })()}
                  </div>
                  {!r.dryRun&&r.status!=='running'&&<button onClick={()=>toggleDetail(r._id)} style={{fontSize:11,color:C.primaryL,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:'0 4px'}}>{isExp?'▲ Hide Details':'▼ View Details'}</button>}
                </div>

                {/* Per-user detail expand */}
                {isExp&&(
                  <div style={{marginTop:12,border:`1px solid ${C.border}`,borderRadius:6,overflow:'hidden'}}>
                    {(()=>{
                      const hasSrcDest=['c2g','copilot-gemini','claude-gemini','claude-copilot'].includes(r.direction);
                      const pagesCol=hasSrcDest?(r.direction==='c2g'||r.direction==='copilot-gemini'||r.direction==='claude-gemini'?'Files':'Pages'):'Pages';
                      return(<>
                        <div style={{display:'grid',gridTemplateColumns:hasSrcDest?'1fr 1fr 70px 50px 50px':'1fr 80px 60px 60px',padding:'6px 12px',background:C.bg,fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.4}}>
                          {hasSrcDest?<><div>Source</div><div>Destination</div><div style={{textAlign:'center'}}>Status</div><div style={{textAlign:'center'}}>{pagesCol}</div><div style={{textAlign:'center'}}>Errors</div></>
                          :<><div>User</div><div style={{textAlign:'center'}}>Status</div><div style={{textAlign:'center'}}>Pages</div><div style={{textAlign:'center'}}>Errors</div></>}
                        </div>
                        {!details&&<div style={{padding:'12px',textAlign:'center',fontSize:12,color:C.muted}}><Spinner s={14}/></div>}
                        {details&&details.map((u,k)=>(
                          hasSrcDest?
                          <div key={k} style={{display:'grid',gridTemplateColumns:'1fr 1fr 70px 50px 50px',alignItems:'center',padding:'7px 12px',borderTop:`1px solid ${C.bg}`,background:'white'}}>
                            <div style={{fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.dark}}>{u.email}</div>
                            <div style={{fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.muted}}>{u.destEmail||'—'}</div>
                            <div style={{textAlign:'center'}}><span style={{fontSize:10,padding:'2px 6px',borderRadius:20,fontWeight:600,background:u.status==='success'?'#dcfce7':u.status==='partial'?'#fef3c7':'#fee2e2',color:u.status==='success'?'#166534':u.status==='partial'?'#92400e':'#991b1b'}}>{u.status}</span></div>
                            <div style={{textAlign:'center',fontSize:13,fontWeight:600,color:C.primary}}>{u.pages_created}</div>
                            <div style={{textAlign:'center',fontSize:13,fontWeight:600,color:u.error_count>0?C.error:C.muted}}>{u.error_count}</div>
                          </div>
                          :<div key={k} style={{display:'grid',gridTemplateColumns:'1fr 80px 60px 60px',alignItems:'center',padding:'7px 12px',borderTop:`1px solid ${C.bg}`,background:'white'}}>
                            <div style={{fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.dark}}>{u.email}</div>
                            <div style={{textAlign:'center'}}><span style={{fontSize:10,padding:'2px 6px',borderRadius:20,fontWeight:600,background:u.status==='success'?'#dcfce7':u.status==='partial'?'#fef3c7':'#fee2e2',color:u.status==='success'?'#166534':u.status==='partial'?'#92400e':'#991b1b'}}>{u.status}</span></div>
                            <div style={{textAlign:'center',fontSize:13,fontWeight:600,color:C.primary}}>{u.pages_created}</div>
                            <div style={{textAlign:'center',fontSize:13,fontWeight:600,color:u.error_count>0?C.error:C.muted}}>{u.error_count}</div>
                          </div>
                        ))}
                      </>);
                    })()}
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ═══            MAIN APP            ═══ */
/* ══════════════════════════════════════ */
function App(){
  // Read stored userId synchronously so state initializers use the right scoped keys
  const [step,setStep]=useState(()=>lsGet(LS_PREFS,{}).step||0);
  const [uploadData,setUploadData]=useState(()=>{const c=lsGet(LS_UPLOAD,null);return c?.uploadId?c:null});
  const [config,setConfig]=useState(()=>({filePath:'GeminiChats',tenantId:'807d6772-847c-40e2-9bec-e2c930b3a42e',...(lsGet(LS_PREFS,{}).config||{})}));
  const [mappings,setMappings]=useState(()=>lsGet(LS_MAPPING,{}).g2c||{});
  const [selectedUsers,setSelectedUsers]=useState(()=>new Set());
  const [options,setOptions]=useState(()=>({dryRun:true,skipFollowups:false,skipAiResponse:false,fromDate:'',toDate:'',...(lsGet(LS_PREFS,{}).options||{})}));
  const [googleAuthed,setGoogleAuthed]=useState(false);
  const [msAuthed,setMsAuthed]=useState(false);
  const [googleUsers,setGoogleUsers]=useState([]);
  const [msUsers,setMsUsers]=useState([]);
  const [logs,setLogs]=useState([]);
  const [live,setLive]=useState(false);
  const [migDone,setMigDone]=useState(()=>lsGet(LS_PREFS,{}).migDone||false);
  const [stats,setStats]=useState(()=>lsGet(LS_PREFS,{}).stats||{users:0,pages:0,errors:0,flagged:0});
  const [lastRunWasDry,setLastRunWasDry]=useState(()=>lsGet(LS_PREFS,{}).lastRunWasDry||false);
  const [currentBatchId,setCurrentBatchId]=useState(()=>lsGet(LS_PREFS,{}).currentBatchId||null);
  const [retrying,setRetrying]=useState(false);
  const [retryMode,setRetryMode]=useState(false);
  const [toast,setToast]=useState(null); // {message, type}
  const [showReports,setShowReports]=useState(false);
  const [appUser,setAppUser]=useState(null);
  const [showReset,setShowReset]=useState(false);
  const [reportRefreshKey,setReportRefreshKey]=useState(0); // increments to force reports re-fetch
  const [wsLoaded,setWsLoaded]=useState(false); // true after DB workspace hydration
  const wsSaveTimer=useRef(null); // debounce timer for workspace saves
  const sseRef=useRef(null);
  const silenceTimer=useRef(null);
  const cl2gLiveRef=useRef(false);
  const cl2cLiveRef=useRef(false);
  const [splitPct,setSplitPct]=useState(()=>lsGet(LS_PREFS,{}).splitPct||50);
  const [panelSwapped,setPanelSwapped]=useState(()=>lsGet(LS_PREFS,{}).panelSwapped||false);
  const [agentMsgs,setAgentMsgs]=useState(()=>lsGet(LS_CHAT,[]||lsGet(K.agentMsgs,[])));
  const [agentTyping,setAgentTyping]=useState(false);
  const [agentInput,setAgentInput]=useState('');
  const [agentMode,setAgentMode]=useState('guide');
  const [leftMode,setLeftMode]=useState(()=>lsGet(LS_PREFS,{}).leftMode||'viz'); // 'viz' | 'mapping'
  const [migDir,setMigDir]=useState(()=>lsGet(LS_PREFS,{}).migDir||null); // 'gemini-copilot' | 'copilot-gemini' | 'claude-gemini' | null
  const [c2gMappings,setC2gMappings]=useState(()=>lsGet(LS_MAPPING,{}).c2g||{});
  const [c2gSelectedUsers,setC2gSelectedUsers]=useState(()=>new Set());
  const [c2gStats,setC2gStats]=useState(()=>lsGet(LS_PREFS,{}).c2gStats||{users:0,files:0,errors:0});
  const [c2gTotal,setC2gTotal]=useState(0);
  const [c2gDone,setC2gDone]=useState(()=>lsGet(LS_PREFS,{}).c2gDone||false);
  const [c2gLive,setC2gLive]=useState(false);
  const [c2gOptions,setC2gOptions]=useState(()=>({dryRun:true,fromDate:'',toDate:'',...(lsGet(LS_PREFS,{}).c2gOptions||{})}));
  const [c2gConfig,setC2gConfig]=useState(()=>({folderName:'CopilotChats',...(lsGet(LS_PREFS,{}).c2gConfig||{})}));
  const [c2gLastDry,setC2gLastDry]=useState(()=>lsGet(LS_PREFS,{}).c2gLastDry||false);
  // CL2G (Claude → Gemini) state
  const [cl2gUploadData,setCl2gUploadData]=useState(()=>lsGet(LS_UPLOAD,{}).cl2g||null);
  const [cl2gMappings,setCl2gMappings]=useState(()=>lsGet(LS_MAPPING,{}).cl2g||{});
  const [cl2gSelectedUuids,setCl2gSelectedUuids]=useState(new Set());
  const [cl2gOptions,setCl2gOptions]=useState(()=>({dryRun:true,fromDate:'',toDate:'',includeMemory:true,includeProjects:true,...(lsGet(LS_PREFS,{}).cl2gOptions||{})}));
  const [cl2gConfig,setCl2gConfig]=useState(()=>({folderName:'ClaudeChats',...(lsGet(LS_PREFS,{}).cl2gConfig||{})}));
  const [cl2gStats,setCl2gStats]=useState(()=>lsGet(LS_PREFS,{}).cl2gStats||{users:0,files:0,errors:0});
  const [cl2gTotal,setCl2gTotal]=useState(0);
  const [cl2gDone,setCl2gDone]=useState(()=>lsGet(LS_PREFS,{}).cl2gDone||false);
  const [cl2gLive,setCl2gLive]=useState(false);
  const [cl2gLastDry,setCl2gLastDry]=useState(()=>lsGet(LS_PREFS,{}).cl2gLastDry||false);
  // CL2C (Claude → Copilot) state
  const [cl2cUploadData,setCl2cUploadData]=useState(null);
  const [cl2cMappings,setCl2cMappings]=useState({});
  const [cl2cSelectedUuids,setCl2cSelectedUuids]=useState(new Set());
  const [cl2cOptions,setCl2cOptions]=useState({dryRun:true,fromDate:'',toDate:'',includeMemory:true,includeProjects:true});
  const [cl2cConfig,setCl2cConfig]=useState({folderName:'ClaudeChats'});
  const [cl2cStats,setCl2cStats]=useState({users:0,files:0,errors:0});
  const [cl2cTotal,setCl2cTotal]=useState(0);
  const [cl2cDone,setCl2cDone]=useState(false);
  const [cl2cLive,setCl2cLive]=useState(false);
  const [cl2cLastDry,setCl2cLastDry]=useState(false);
  const [chatGLoading,setChatGLoading]=useState(false);
  const [chatMLoading,setChatMLoading]=useState(false);
  const [chatUploading,setChatUploading]=useState(false);
  const containerRef=useRef(null);
  const dividerRef=useRef(null);
  const panelDragRef=useRef(null);
  const greetedRef=useRef(false);
  const prevGuideKeyRef=useRef(null);
  const sendToAgentRef=useRef(null);
  const [agentMigrationTrigger,setAgentMigrationTrigger]=useState(null);

  const showToast=useCallback((message,type='success')=>{
    setToast({message,type});
  },[]);

  const handleDividerMouseDown=useCallback(e=>{
    e.preventDefault();
    if(dividerRef.current)dividerRef.current.classList.add('active');
    const onMove=ev=>{
      if(!containerRef.current)return;
      const rect=containerRef.current.getBoundingClientRect();
      setSplitPct(Math.max(20,Math.min(80,((ev.clientX-rect.left)/rect.width)*100)));
    };
    const onUp=()=>{if(dividerRef.current)dividerRef.current.classList.remove('active');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  },[]);

  // Load app config (reset button, feature flags)
  useEffect(()=>{fetch('/api/app-config').then(r=>r.ok?r.json():null).then(cfg=>{if(cfg?.showReset)setShowReset(true);}).catch(()=>{});},[]);

  // Auth check on mount — verify app session, hydrate state from DB (cross-device), check cloud auth
  useEffect(()=>{
    fetch('/api/me').then(r=>{
      if(!r.ok){window.location.href='/login.html';return null}
      return r.json();
    }).then(u=>{
      if(!u)return;
      // Detect user switch — clear stale LS data from previous session
      const uid=u._id||u.id||u.email;
      const lastUid=localStorage.getItem('gem_last_user');
      if(lastUid&&lastUid!==uid){
        lsClearAll();
        // Reset all migration state to defaults so previous user's data is gone
        setStep(0);setMigDir(null);setUploadData(null);
        setMappings({});setSelectedUsers(new Set());
        setMigDone(false);setStats({users:0,pages:0,errors:0,flagged:0});
        setLastRunWasDry(false);setCurrentBatchId(null);setLogs([]);
        setC2gMappings({});setC2gSelectedUsers(new Set());
        setC2gDone(false);setC2gStats({users:0,files:0,errors:0});setC2gTotal(0);
        setC2gOptions({dryRun:true,fromDate:'',toDate:''});
        setCl2gUploadData(null);setCl2gMappings({});setCl2gSelectedUuids(new Set());
        setCl2gDone(false);setCl2gStats({users:0,files:0,errors:0});setCl2gTotal(0);
        setCl2gOptions({dryRun:true,fromDate:'',toDate:'',includeMemory:true,includeProjects:true});
        setAgentMsgs([]);greetedRef.current=false;prevGuideKeyRef.current=null;
      }
      localStorage.setItem('gem_last_user',uid);
      setAppUser(u);
      // NOTE: setWsLoaded(true) is intentionally deferred until after auth/init
      // so the agent greeting fires with correct googleAuthed/msAuthed state.

      // Fetch auth status + DB state, THEN mark ready so greeting has correct context
      Promise.all([
        fetch('/auth/status').then(r=>r.json()).catch(()=>({})),
        fetch('/api/init').then(r=>r.ok?r.json():null).catch(()=>null),
      ]).then(([authStatus, initData])=>{
        if(authStatus.googleConnected!==undefined) setGoogleAuthed(!!authStatus.googleConnected);
        if(authStatus.msConnected!==undefined) setMsAuthed(!!authStatus.msConnected);

        if(initData){
          // Restore chat history from DB (cross-device) — DB wins over localStorage
          if(initData.chatMessages?.length>0){
            setAgentMsgs(initData.chatMessages);
            lsSet(LS_CHAT,initData.chatMessages);
          }

          // Restore UI position from DB — cross-device (step, migDir, options)
          // recentWorkspaces recovery below may further update done/stats state
          const ui=initData.uiState;
          if(ui){
            if(typeof ui.step==='number') setStep(ui.step);
            if(ui.migDir) setMigDir(ui.migDir);
            if(ui.stats) setStats(ui.stats);
            if(ui.c2gStats) setC2gStats(ui.c2gStats);
            if(ui.cl2gStats) setCl2gStats(ui.cl2gStats);
            if(ui.migDone!=null) setMigDone(!!ui.migDone);
            if(ui.c2gDone!=null) setC2gDone(!!ui.c2gDone);
            if(ui.cl2gDone!=null) setCl2gDone(!!ui.cl2gDone);
            if(ui.lastRunWasDry!=null) setLastRunWasDry(!!ui.lastRunWasDry);
            if(ui.c2gLastDry!=null) setC2gLastDry(!!ui.c2gLastDry);
            if(ui.cl2gLastDry!=null) setCl2gLastDry(!!ui.cl2gLastDry);
            if(ui.currentBatchId) setCurrentBatchId(ui.currentBatchId);
            if(ui.options) setOptions(p=>({...p,...ui.options}));
            if(ui.c2gOptions) setC2gOptions(p=>({...p,...ui.c2gOptions}));
            if(ui.cl2gOptions) setCl2gOptions(p=>({...p,...ui.cl2gOptions}));
            // Sync to localStorage so same-device is also up to date
            lsSet(LS_PREFS,{...lsGet(LS_PREFS,{}),...ui});
          }

          // DB mappings override localStorage (DB is authoritative for mappings)
          const g2cMap=initData.mappings?.find(m=>m.migDir==='gemini-copilot');
          const c2gMap=initData.mappings?.find(m=>m.migDir==='copilot-gemini');
          const cl2gMap=initData.mappings?.find(m=>m.migDir==='claude-gemini');
          if(g2cMap?.mappings&&Object.keys(g2cMap.mappings).length) setMappings(g2cMap.mappings);
          if(c2gMap?.mappings&&Object.keys(c2gMap.mappings).length) setC2gMappings(c2gMap.mappings);
          if(cl2gMap?.mappings&&Object.keys(cl2gMap.mappings).length) setCl2gMappings(cl2gMap.mappings);
