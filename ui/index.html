<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CloudFuze Migration</title>
  <link rel="icon" type="image/png" href="/assets/CloudFuze blue.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
    @keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(1,41,172,.2)}50%{box-shadow:0 0 20px rgba(1,41,172,.5)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @keyframes typing{0%{opacity:.2}20%{opacity:1}100%{opacity:.2}}
    @keyframes connectorPulse{0%,100%{opacity:.4}50%{opacity:1}}
    @keyframes toastIn{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}
    .td{animation:typing 1.4s infinite both;width:5px;height:5px;border-radius:50%;background:#94a3b8;display:inline-block}
    .td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',system-ui,sans-serif;background:#F6F6F6;color:#2e2e2e;height:100vh;overflow:hidden}
    button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px}::-webkit-scrollbar-thumb:hover{background:#9ca3af}
    .fade-up{animation:fadeInUp .4s ease both}.scale-in{animation:scaleIn .35s ease both}
    .slide-r{animation:slideRight .35s ease both}.check-pop{animation:checkPop .3s ease both}
    .spinner{animation:spin 1s linear infinite}.pulse-dot{animation:pulse .9s ease-in-out infinite}
    .drag-divider{width:6px;background:#EBEBEB;cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative;z-index:10;display:flex;align-items:center;justify-content:center;user-select:none}
    .drag-divider:hover,.drag-divider.active{background:#809EFC}
    .drag-divider::after{content:'';position:absolute;width:2px;height:36px;border-radius:99px;background:rgba(1,41,172,.3);pointer-events:none}
    .agent-md{font-size:13px;line-height:1.6;color:#1e293b}
    .agent-md p{margin:0 0 8px}.agent-md p:last-child{margin-bottom:0}
    .agent-md ul,.agent-md ol{margin:4px 0 8px 18px;padding:0}.agent-md li{margin-bottom:3px}
    .agent-md strong{font-weight:600;color:#0129AC}
    .agent-md h2,.agent-md h3{font-size:13px;font-weight:700;color:#0f172a;margin:10px 0 4px}
    .agent-md code{background:#f1f5f9;border-radius:4px;padding:1px 5px;font-family:monospace;font-size:12px}
    .agent-md hr{border:none;border-top:1px solid #e2e8f0;margin:10px 0}
    .agent-md a{color:#0129AC;text-decoration:underline}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

const C={primary:'#0129AC',primaryH:'#0C18D4',primaryL:'#809EFC',tint:'#E1ECFF',
  bg:'#F6F6F6',white:'#FFFFFF',dark:'#2e2e2e',muted:'#707070',
  border:'#EBEBEB',success:'#0129AC',error:'#FF1F1F',warn:'#809EFC'};

/* ── localStorage — user-scoped keys ── */
// Keys are prefixed with the userId so different users don't share state.
// LS_KEYS: base key names; LS(uid): returns prefixed key map for that user.
const LS_KEYS={step:'step',uploadData:'upload_data',config:'config',
  mappings:'mappings',logs:'logs',authG:'auth_google',authMs:'auth_ms',
  batches:'batches',selUsers:'selected_users',
  migDone:'mig_done',stats:'stats',batchId:'current_batch',lastDry:'last_dry',
  agentMsgs:'agent_msgs',migDir:'mig_dir',
  c2gMappings:'c2g_mappings',c2gSelUsers:'c2g_sel_users'};
const LS=(uid)=>{const p=uid?`gem_${uid}_`:'gem_';return Object.fromEntries(Object.entries(LS_KEYS).map(([k,v])=>[k,p+v]))};
const lsGet=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
// Clear only this user's keys
const lsClear=(uid)=>{Object.values(LS(uid)).forEach(k=>localStorage.removeItem(k))};
// Clear ALL gem_ keys (used when switching users)
const lsClearAll=()=>{Object.keys(localStorage).filter(k=>k.startsWith('gem_')).forEach(k=>localStorage.removeItem(k))};

function parseCsvLine(line){
  const f=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}else if(c===','&&!inQ){f.push(cur.trim());cur=''}else cur+=c}
  f.push(cur.trim());return f;
}

/* ── Icons ── */
const Spinner=({s=16})=><svg width={s} height={s} viewBox="0 0 24 24" className="spinner"><circle cx="12" cy="12" r="10" stroke={C.primary} strokeWidth="3" fill="none" strokeDasharray="31.4 31.4" strokeLinecap="round"/></svg>;
const Check=({s=16,c=C.success})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
const IcoInfo=({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
const IcoWarn=({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
const IcoError=({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
const IcoDone=({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
const IcoUser=({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
const IcoPage=({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>;
const IcoFlag=({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>;
const IcoCloud=({s=40,c=C.primary})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/></svg>;
const IcoZip=({s=40,c=C.primary})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
const IcoDownload=({s=13,c=C.primary})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
const IcoUpload=({s=13,c=C.muted})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
const IcoRocket=({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 00-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 012-3.95A12.88 12.88 0 0122 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 01-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>;
const IcoLogout=({s=13})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
const IcoReset=({s=13})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>;
const IcoSearch=({s=14,c='currentColor'})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
const IcoTrash=({s=13})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>;
const IcoMenu=({s=16})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
const IcoReport=({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
const GoogleIcon=()=><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>;
const MsIcon=()=><svg width="18" height="18" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>;

/* ── Primitives ── */
const Ring=({pct,size=80,stroke=6,color=C.primary})=>{const r=(size-stroke)/2,circ=2*Math.PI*r,off=circ-(pct/100)*circ;return<svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5e7eb" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off} style={{transition:'stroke-dashoffset .6s ease'}}/></svg>};
const TypingDots=()=><div style={{display:'flex',alignItems:'flex-start',gap:8,padding:'4px 0'}}><div style={{width:28,height:28,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.primaryL})`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2a4 4 0 014 4v2H8V6a4 4 0 014-4z"/><rect x="4" y="8" width="16" height="12" rx="2"/><circle cx="9" cy="14" r="1.5" fill="white"/><circle cx="15" cy="14" r="1.5" fill="white"/></svg></div><div style={{background:'#f1f5f9',borderRadius:'10px 10px 10px 3px',padding:'12px 16px',display:'flex',gap:4,alignItems:'center'}}><span className="td"/><span className="td"/><span className="td"/></div></div>;
function avatarColor(e){const cs=['#0129AC','#0C18D4','#809EFC','#20CC83','#0ea5e9','#6366f1','#14b8a6'];let h=0;for(let i=0;i<e.length;i++)h=(h*31+e.charCodeAt(i))%cs.length;return cs[h]}
const Avatar=({name,email,size=36})=>{const i=(name||email).split(/[\s@]/)[0].slice(0,2).toUpperCase();return<div style={{width:size,height:size,borderRadius:'50%',background:avatarColor(email),display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:size*0.35,fontWeight:600,flexShrink:0}}>{i}</div>};

const Btn=({children,onClick,disabled,variant='primary',style={}})=>{
  const base={padding:'10px 20px',borderRadius:4,border:'none',fontSize:14,fontWeight:600,display:'inline-flex',alignItems:'center',gap:8,transition:'all .15s',cursor:disabled?'not-allowed':'pointer',opacity:disabled?.5:1,...style};
  const vs={primary:{background:C.primary,color:'white'},outline:{background:'white',color:C.primary,border:`1.5px solid ${C.primary}`},ghost:{background:'transparent',color:C.muted,border:`1px solid ${C.border}`},danger:{background:'#FEF2F2',color:C.error,border:`1px solid #FCA5A5`}};
  const [hov,setHov]=useState(false);const s={...base,...vs[variant]};
  if(hov&&!disabled){if(variant==='primary')s.background=C.primaryH;if(variant==='outline')s.background=C.tint;if(variant==='ghost')s.background=C.bg;if(variant==='danger')s.background='#FEE2E2'}
  return<button style={s} onClick={disabled?undefined:onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>{children}</button>;
};
const Card=({children,style={},className=''})=><div className={className} style={{background:'white',borderRadius:10,border:`1px solid ${C.border}`,padding:20,...style}}>{children}</div>;
const Field=({label,children,hint})=><div style={{marginBottom:16}}><div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}><div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>{label}</div>{hint&&<span style={{fontSize:11,color:C.primaryL,fontStyle:'italic'}}>{hint}</span>}</div>{children}</div>;
const Input=({value,onChange,placeholder,type='text'})=><input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{width:'100%',border:`1px solid ${C.border}`,borderRadius:6,padding:'9px 12px',fontSize:13,outline:'none',transition:'border .2s'}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>;
const TextBtn=({children,onClick,style={}})=>{const [h,sH]=useState(false);return<button onClick={onClick} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)} style={{fontSize:12,color:C.primary,background:'none',border:'none',cursor:'pointer',fontWeight:500,fontFamily:'inherit',opacity:h?.8:1,...style}}>{children}</button>};
const SearchBar=({value,onChange,placeholder='Search...'})=><div style={{position:'relative',marginBottom:10}}><input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:'100%',border:`1px solid ${C.border}`,borderRadius:6,padding:'8px 12px 8px 34px',fontSize:13,outline:'none',fontFamily:'inherit',background:'white'}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/><span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',display:'flex'}}><IcoSearch s={14} c={C.muted}/></span></div>;

/* ── Toast notification ── */
const Toast=({message,type='success',onHide})=>{
  useEffect(()=>{const t=setTimeout(onHide,3200);return()=>clearTimeout(t)},[]);
  const bg=type==='error'?'#991B1B':type==='warn'?C.primary:'#1a1a2e';
  return<div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',background:bg,color:'white',padding:'12px 22px',borderRadius:10,fontSize:13,fontWeight:500,zIndex:9999,boxShadow:'0 8px 30px rgba(0,0,0,.25)',animation:'toastIn .3s ease',display:'flex',alignItems:'center',gap:8,whiteSpace:'nowrap'}}><Check s={15} c="white"/>{message}</div>;
};

/* ── Google User Select Panel ── */
const UserSelectPanel=({users,selected,toggleUser,toggleAll,startExport})=>{
  const [search,setSearch]=useState('');
  const filtered=users.filter(u=>u.name.toLowerCase().includes(search.toLowerCase())||u.email.toLowerCase().includes(search.toLowerCase()));
  return(
    <div className="fade-up">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:13,fontWeight:600}}><span style={{width:8,height:8,borderRadius:'50%',background:C.success,display:'inline-block'}}/>Signed in · {users.length} users</span>
        <TextBtn onClick={toggleAll}>{selected.size===users.length?'Deselect All':'Select All'}</TextBtn>
      </div>
      <SearchBar value={search} onChange={setSearch} placeholder="Search users..."/>
      <div style={{maxHeight:240,overflowY:'auto',display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
        {filtered.map((u,i)=>(
          <div key={u.email} className="slide-r" style={{animationDelay:`${i*30}ms`,display:'flex',alignItems:'center',gap:12,padding:'10px 14px',border:`1.5px solid ${selected.has(u.email)?C.primary:C.border}`,borderRadius:8,cursor:'pointer',transition:'all .2s',background:selected.has(u.email)?C.tint:'white'}} onClick={()=>toggleUser(u.email)}>
            <input type="checkbox" checked={selected.has(u.email)} onChange={()=>toggleUser(u.email)} style={{accentColor:C.primary,width:16,height:16,flexShrink:0}} onClick={e=>e.stopPropagation()}/>
            <Avatar name={u.name} email={u.email} size={34}/>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.name}</div><div style={{fontSize:11,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.email}</div></div>
            {selected.has(u.email)&&<Check s={16} c={C.primary}/>}
          </div>
        ))}
        {filtered.length===0&&<div style={{textAlign:'center',padding:'20px',fontSize:13,color:C.muted}}>No users match "{search}"</div>}
      </div>
      <Btn onClick={startExport} disabled={selected.size===0} style={{width:'100%',justifyContent:'center'}}>Export {selected.size>0?`${selected.size} User${selected.size>1?'s':''}`: 'Selected Users'}</Btn>
    </div>
  );
};

/* Grip icon for panel drag-to-swap */
const IcoGrip=({s=14})=><svg width={s} height={s} viewBox="0 0 20 20" fill="currentColor"><circle cx="6" cy="4" r="1.5"/><circle cx="6" cy="10" r="1.5"/><circle cx="6" cy="16" r="1.5"/><circle cx="14" cy="4" r="1.5"/><circle cx="14" cy="10" r="1.5"/><circle cx="14" cy="16" r="1.5"/></svg>;

/* ══════════════════════════════ */
/* ═══    STEP 0: ADD CLOUDS  ═══ */
/* ══════════════════════════════ */
const Step0=({googleAuthed,setGoogleAuthed,msAuthed,setMsAuthed,googleUsers,setGoogleUsers,msUsers,setMsUsers,tenantId,onComplete})=>{
  const [lgG,setLgG]=useState(false),[lgM,setLgM]=useState(false);
  const [errG,setErrG]=useState(''),[errM,setErrM]=useState('');

  const loadGoogleUsers=async()=>{setLgG(true);setErrG('');try{const r=await fetch('/api/google/users');if(r.status===401){setGoogleAuthed(false);setLgG(false);return}const d=await r.json();if(d.users)setGoogleUsers(d.users);else setErrG(d.error||'Failed to load users')}catch(e){setErrG(e.message)}setLgG(false)};
  const loadMsUsers=async()=>{setLgM(true);setErrM('');try{const r=await fetch('/api/ms/users');if(r.status===401){setMsAuthed(false);setLgM(false);return}const d=await r.json();if(d.users)setMsUsers(d.users);else setErrM(d.error||'Failed to load users')}catch(e){setErrM(e.message)}setLgM(false)};

  useEffect(()=>{if(googleAuthed&&googleUsers.length===0)loadGoogleUsers()},[googleAuthed]);
  useEffect(()=>{if(msAuthed&&msUsers.length===0)loadMsUsers()},[msAuthed]);

  const signInGoogle=()=>{window.open('/auth/google/login','googleauth','width=500,height=700,left=300,top=100');window.addEventListener('message',function h(e){if(e.data?.type==='google-auth-success'){window.removeEventListener('message',h);
    // Verify with server before setting state (small delay to allow session save)
    setTimeout(()=>{fetch('/auth/google/status').then(r=>r.json()).then(d=>{if(d.authenticated){setGoogleAuthed(true);loadGoogleUsers();}else{setGoogleAuthed(true);loadGoogleUsers();/* trust postMessage */}}).catch(()=>{setGoogleAuthed(true);loadGoogleUsers();})},500);
  }})};
  const signInMs=()=>{const url=`/auth/login${tenantId?`?tenant_id=${tenantId}`:''}`;window.open(url,'msauth','width=500,height=700,left=300,top=100');window.addEventListener('message',function h(e){if(e.data?.type==='auth-success'){window.removeEventListener('message',h);
    setTimeout(()=>{fetch('/auth/status').then(r=>r.json()).then(d=>{setMsAuthed(true);loadMsUsers();}).catch(()=>{setMsAuthed(true);loadMsUsers();})},500);
  }})};
  const logoutGoogle=async()=>{await fetch('/auth/google/logout',{method:'POST'});setGoogleAuthed(false);setGoogleUsers([])};
  const logoutMs=async()=>{await fetch('/auth/logout',{method:'POST'});setMsAuthed(false);setMsUsers([])};

  const CloudCard=({icon,label,connected,loading,error,onConnect,onSignOut})=>{
    const [hov,setHov]=useState(false);
    return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
        <button
          onClick={!connected&&!loading?onConnect:undefined}
          onMouseEnter={()=>!connected&&!loading&&setHov(true)}
          onMouseLeave={()=>setHov(false)}
          style={{
            width:130,padding:'24px 12px 20px',borderRadius:14,
            border:`2px solid ${connected?C.primary:hov?'#9CA3AF':'#E5E7EB'}`,
            background:connected?C.tint:hov?'#F9FAFB':'#fff',
            cursor:!connected&&!loading?'pointer':'default',
            textAlign:'center',transition:'all .15s',fontFamily:'inherit',
            boxShadow:connected?'0 4px 14px rgba(26,86,219,.12)':hov?'0 2px 8px rgba(0,0,0,.08)':'0 1px 3px rgba(0,0,0,.06)',
            display:'flex',flexDirection:'column',alignItems:'center',position:'relative',outline:'none'
          }}>
          <div style={{minHeight:64,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
            {loading?<Spinner s={44}/>:icon}
          </div>
          <div style={{fontWeight:700,fontSize:12,color:connected?C.primary:hov?C.dark:C.dark,lineHeight:1.3,textAlign:'center'}}>{label}</div>
          <div style={{fontSize:10,marginTop:5,fontWeight:500,color:connected?'#16a34a':loading?C.muted:hov?C.primary:C.muted}}>
            {connected?'Connected':loading?'Connecting...':'Click to connect'}
          </div>
        </button>
        {error&&<div style={{fontSize:10,color:C.error,textAlign:'center',width:130,lineHeight:1.3}}>{error}</div>}
        {connected&&<button onClick={onSignOut} style={{fontSize:11,color:C.muted,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',display:'inline-flex',alignItems:'center',gap:3,padding:'2px 6px',borderRadius:4,transition:'color .15s'}} onMouseEnter={e=>e.currentTarget.style.color=C.error} onMouseLeave={e=>e.currentTarget.style.color=C.muted}><IcoLogout s={10}/> Sign Out</button>}
      </div>
    );
  };

  return(
    <div className="fade-up">
      <div style={{marginBottom:24}}>
        <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Connect Clouds</div>
        <div style={{fontSize:13,color:C.muted}}>Connect source and destination cloud accounts with admin credentials.</div>
      </div>

      <div style={{display:'flex',gap:14,marginBottom:24,flexWrap:'wrap'}}>
        <CloudCard
          icon={<GoogleIcon s={200}/>}
          label="Google Workspace"
          connected={googleAuthed} loading={lgG} error={errG}
          onConnect={signInGoogle} onSignOut={logoutGoogle}/>
        <CloudCard
          icon={<MsIcon s={200}/>}
          label={<span>Microsoft<br/>Teams / 365</span>}
          connected={msAuthed} loading={lgM} error={errM}
          onConnect={signInMs} onSignOut={logoutMs}/>
      </div>

      {!googleAuthed&&<div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:8,fontSize:13,color:'#991B1B',marginBottom:16}}><IcoWarn s={14}/>Google Workspace connection is required to proceed.</div>}
      <Btn onClick={onComplete} disabled={!googleAuthed} style={{width:'100%',justifyContent:'center',marginTop:8}}>Continue →</Btn>
    </div>
  );
};

/* ══════════════════════════════════ */
/* ═══  STEP 1: CHOOSE DIRECTION  ═══ */
/* ══════════════════════════════════ */
const ClaudeIcon=({s=32})=><svg width={s} height={s} viewBox="-2 -2 20 20"><circle cx="8" cy="8" r="10" fill="#CC785C"/><path d="m3.127 10.604 3.135-1.76.053-.153-.053-.085H6.11l-.525-.032-1.791-.048-1.554-.065-1.505-.08-.38-.081L0 7.832l.036-.234.32-.214.455.04 1.009.069 1.513.105 1.097.064 1.626.17h.259l.036-.105-.089-.065-.068-.064-1.566-1.062-1.695-1.121-.887-.646-.48-.327-.243-.306-.104-.67.435-.48.585.04.15.04.593.456 1.267.981 1.654 1.218.242.202.097-.068.012-.049-.109-.181-.9-1.626-.96-1.655-.428-.686-.113-.411a2 2 0 0 1-.068-.484l.496-.674L4.446 0l.662.089.279.242.411.94.666 1.48 1.033 2.014.302.597.162.553.06.17h.105v-.097l.085-1.134.157-1.392.154-1.792.052-.504.25-.605.497-.327.387.186.319.456-.045.294-.19 1.23-.37 1.93-.243 1.29h.142l.161-.16.654-.868 1.097-1.372.484-.545.565-.601.363-.287h.686l.505.751-.226.775-.707.895-.585.759-.839 1.13-.524.904.048.072.125-.012 1.897-.403 1.024-.186 1.223-.21.553.258.06.263-.218.536-1.307.323-1.533.307-2.284.54-.028.02.032.04 1.029.098.44.024h1.077l2.005.15.525.346.315.424-.053.323-.807.411-3.631-.863-.872-.218h-.12v.073l.726.71 1.331 1.202 1.667 1.55.084.383-.214.302-.226-.032-1.464-1.101-.565-.497-1.28-1.077h-.084v.113l.295.432 1.557 2.34.08.718-.112.234-.404.141-.444-.08-.911-1.28-.94-1.44-.759-1.291-.093.053-.448 4.821-.21.246-.484.186-.403-.307-.214-.496.214-.98.258-1.28.21-1.016.19-1.263.112-.42-.008-.028-.092.012-.953 1.307-1.448 1.957-1.146 1.227-.274.109-.477-.247.045-.44.266-.39 1.586-2.018.956-1.25.617-.723-.004-.105h-.036l-4.212 2.736-.75.096-.324-.302.04-.496.154-.162 1.267-.871z" fill="white"/></svg>;
const DirCard=({d,hovered,setHovered,onSelect})=>{
  const isHov=hovered===d.id;
  return(
    <button key={d.id} onClick={()=>onSelect(d.id)}
      onMouseEnter={()=>setHovered(d.id)} onMouseLeave={()=>setHovered(null)}
      style={{flex:'1 1 160px',padding:'24px 16px',borderRadius:14,border:`2px solid ${isHov?C.primary:C.border}`,
        background:isHov?C.tint:'white',cursor:'pointer',textAlign:'center',transition:'all .2s',fontFamily:'inherit'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:14}}>
        {d.srcIcon}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        {d.tgtIcon}
      </div>
      <div style={{fontWeight:600,fontSize:14,color:C.dark,marginBottom:4}}>{d.label}</div>
      <div style={{fontSize:11,color:C.muted}}>{d.sub}</div>
    </button>
  );
};
const StepDirection=({onSelect,onBack,googleAuthed,msAuthed})=>{
  const [hovered,setHovered]=useState(null);
  const bothConnected=googleAuthed&&msAuthed;
  const dirs=bothConnected?[
    {id:'gemini-copilot',label:'Gemini → Copilot',sub:'Google Workspace to Microsoft 365',srcIcon:<GoogleIcon/>,tgtIcon:<MsIcon/>},
    {id:'copilot-gemini',label:'Copilot → Gemini',sub:'Microsoft 365 to Google Workspace',srcIcon:<MsIcon/>,tgtIcon:<GoogleIcon/>},
  ]:[
    {id:'claude-gemini',label:'Claude → Gemini',sub:'Claude export ZIP to Google Drive',srcIcon:<ClaudeIcon/>,tgtIcon:<GoogleIcon/>},
  ];
  return(
    <div className="fade-up">
      <div style={{marginBottom:24}}>
        <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Choose Migration Direction</div>
        <div style={{fontSize:13,color:C.muted}}>Select the source and destination for your migration.</div>
      </div>
      <div style={{display:'flex',gap:14,marginBottom:24,flexWrap:'wrap'}}>
        {dirs.map(d=><DirCard key={d.id} d={d} hovered={hovered} setHovered={setHovered} onSelect={onSelect}/>)}
      </div>
      {googleAuthed&&!msAuthed&&<div style={{fontSize:12,color:C.muted,marginBottom:20,padding:'10px 14px',background:C.bg,borderRadius:8}}>
        • Connect <strong>Microsoft 365</strong> on the previous step to unlock G2C and C2G directions.
      </div>}
      <Btn variant="ghost" onClick={onBack}>← Back</Btn>
    </div>
  );
};

/* ══════════════════════════════ */
/* ═══   STEP 1: IMPORT DATA  ═══ */
/* ══════════════════════════════ */
const Step1=({googleUsers,googleAuthed,onComplete,onBack,showToast,uploadData:activeUpload})=>{
  const [tab,setTab]=useState(activeUpload?'upload':'userwise');
  const [selected,setSelected]=useState(new Set());
  const [exporting,setExporting]=useState(false);
  const [exportStatus,setExportStatus]=useState('');
  const [elapsed,setElapsed]=useState(0);
  const elapsedRef=useRef(null);
  const fileInputRef=useRef(null);
  const [uploading,setUploading]=useState(false);
  const [dragOver,setDragOver]=useState(false);
  const [savedUploads,setSavedUploads]=useState([]);
  const [showMenu,setShowMenu]=useState(false);
  const menuRef=useRef(null);

  useEffect(()=>{if(googleUsers.length>0&&selected.size===0)setSelected(new Set(googleUsers.map(u=>u.email)))},[googleUsers]);

  const loadSavedUploads=async()=>{
    try{const r=await fetch('/api/uploads');const d=await r.json();setSavedUploads(d.uploads||[])}catch{}
  };

  useEffect(()=>{loadSavedUploads()},[]);

  // Close hamburger when clicking outside
  useEffect(()=>{
    const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setShowMenu(false)};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  const toggleUser=e=>setSelected(p=>{const n=new Set(p);n.has(e)?n.delete(e):n.add(e);return n});
  const toggleAll=()=>{if(selected.size===googleUsers.length)setSelected(new Set());else setSelected(new Set(googleUsers.map(u=>u.email)))};

  const startExport=async()=>{
    setExporting(true);setElapsed(0);
    elapsedRef.current=setInterval(()=>setElapsed(p=>p+1),1000);
    setExportStatus('Creating Vault export...');
    try{
      const res=await fetch('/api/google/vault-export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_emails:[...selected]})});
      const data=await res.json();
      if(!res.ok){setExportStatus(`Error: ${data.error}`);clearInterval(elapsedRef.current);setExporting(false);return}
      setExportStatus('Export in progress...');pollExport();
    }catch(e){setExportStatus(`Error: ${e.message}`);clearInterval(elapsedRef.current);setExporting(false)}
  };

  const pollExport=()=>{
    const check=async()=>{
      try{
        const res=await fetch('/api/google/vault-export/status');const data=await res.json();
        if(data.status==='COMPLETED'&&data.users){clearInterval(elapsedRef.current);setExportStatus(`Done`);setExporting(false);setTimeout(()=>onComplete(data),600);return}
        if(data.status==='FAILED'){clearInterval(elapsedRef.current);setExportStatus(`Failed: ${data.error||'Unknown'}`);setExporting(false);return}
        setExportStatus(`In progress (${data.status})...`);setTimeout(check,10000);
      }catch{setTimeout(check,15000)}
    };check();
  };

  const doUpload=async file=>{
    if(!file.name.endsWith('.zip'))return;
    setUploading(true);
    const fd=new FormData();fd.append('vault_zip',file);
    try{
      const res=await fetch('/api/upload',{method:'POST',body:fd});
      const data=await res.json();
      if(res.ok){loadSavedUploads();onComplete(data)}
    }catch{}
    setUploading(false);
  };

  const loadSavedUpload=(entry)=>{
    setShowMenu(false);
    onComplete({
      id:entry.id, original_name:entry.original_name,
      extract_path:entry.extract_path,
      total_users:entry.total_users, total_conversations:entry.total_conversations,
      users:(entry.users||[]).map(u=>({email:u.email,display_name:u.display_name,conversation_count:u.conversation_count}))
    });
  };

  const deleteSavedUpload=async(e,id)=>{
    e.stopPropagation();
    await fetch(`/api/uploads/${id}`,{method:'DELETE'});
    loadSavedUploads();
  };

  // Safe display helpers
  const fmtDate=v=>{if(!v)return'—';const d=new Date(v);return isNaN(d)?'—':d.toLocaleDateString()};
  const fmtCount=(n,label)=>n!=null?`${n} ${label}${n!==1?'s':''}`:null;

  return(
    <div className="fade-up">
      <div style={{marginBottom:20}}>
        <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Import Data</div>
        <div style={{fontSize:13,color:C.muted}}>Select users to export from Google Workspace, or upload a Vault ZIP file.</div>
      </div>

      {/* Tabs + hamburger */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:20}}>
        <div style={{display:'flex',gap:4,flex:1,background:C.bg,borderRadius:8,padding:4}}>
          {[['userwise',googleAuthed?"User's List":'Connect Google First'],['upload','Upload ZIP']].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'8px 0',borderRadius:6,border:'none',fontSize:13,fontWeight:tab===id?600:400,background:tab===id?'white':C.bg,color:tab===id?C.primary:C.muted,boxShadow:tab===id?'0 1px 4px rgba(0,0,0,.1)':'none',transition:'all .2s',cursor:'pointer'}}>{label}</button>
          ))}
        </div>
        {/* Previous uploads hamburger */}
        <div ref={menuRef} style={{position:'relative'}}>
          <button onClick={()=>{setShowMenu(p=>!p);loadSavedUploads()}} title="Previous uploads" style={{width:36,height:36,borderRadius:8,border:`1px solid ${C.border}`,background:'white',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:C.muted,flexShrink:0,transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.color=C.primary}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted}}>
            <IcoMenu s={16}/>
          </button>
          {showMenu&&(
            <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',width:340,background:'white',border:`1px solid ${C.border}`,borderRadius:10,boxShadow:'0 8px 30px rgba(0,0,0,.12)',zIndex:100,overflow:'hidden'}}>
              <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.bg}`,fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>Previous Uploads</div>
              {savedUploads.length===0?(
                <div style={{padding:'20px 14px',fontSize:13,color:C.muted,textAlign:'center'}}>No uploads yet</div>
              ):savedUploads.map((u,i)=>{
                const isActive=activeUpload&&activeUpload.id===u.id;
                const meta=[fmtCount(u.total_users,'user'),fmtDate(u.upload_time)].filter(Boolean).join(' · ');
                return(
                  <div key={u.id} onClick={()=>!isActive&&loadSavedUpload(u)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',cursor:isActive?'default':'pointer',borderBottom:i<savedUploads.length-1?`1px solid ${C.bg}`:'none',transition:'background .15s',background:isActive?C.tint:'white'}} onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background=C.bg}} onMouseLeave={e=>{e.currentTarget.style.background=isActive?C.tint:'white'}}>
                    <IcoZip s={20} c={isActive?C.primary:C.primaryL}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',display:'flex',alignItems:'center',gap:6}}>
                        <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{u.original_name||u.id}</span>
                        {isActive&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:10,background:C.primary,color:'white',flexShrink:0}}>active</span>}
                      </div>
                      <div style={{fontSize:11,color:C.muted}}>{meta||'—'}</div>
                    </div>
                    <button onClick={e=>deleteSavedUpload(e,u.id)} title="Delete" style={{padding:'4px 6px',border:'none',background:'none',cursor:'pointer',color:C.muted,borderRadius:4,flexShrink:0,display:'flex',alignItems:'center',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.background='#FEF2F2';e.currentTarget.style.color=C.error}} onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color=C.muted}}><IcoTrash s={13}/></button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {tab==='userwise'&&(
        exporting?(
          <Card className="scale-in" style={{textAlign:'center',padding:28}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:16}}>
              <div style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
                <Ring pct={Math.min(elapsed*1.5,90)} size={88} stroke={6} color={C.primary}/>
                <div style={{position:'absolute',textAlign:'center'}}><IcoCloud s={22} c={C.primaryL}/><div style={{fontSize:10,color:C.muted,fontWeight:600}}>{elapsed}s</div></div>
              </div>
            </div>
            <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>Exporting Gemini Data</div>
            <div style={{fontSize:12,color:exportStatus.startsWith('Error')||exportStatus.startsWith('Failed')?C.error:C.muted,fontWeight:exportStatus.startsWith('Error')||exportStatus.startsWith('Failed')?600:400}}>{exportStatus}</div>
          </Card>
        ):googleUsers.length>0?(
          <UserSelectPanel users={googleUsers} selected={selected} toggleUser={toggleUser} toggleAll={toggleAll} startExport={startExport}/>
        ):(
          <Card className="fade-up" style={{textAlign:'center',padding:32}}>
            <IcoCloud s={44} c={C.primaryL}/>
            <div style={{marginTop:12,fontSize:13,color:C.muted}}>No users loaded. Please go back and connect Google Workspace, or use Upload ZIP.</div>
          </Card>
        )
      )}

      {tab==='upload'&&(
        <div className="fade-up">
          {/* Active upload banner */}
          {activeUpload&&(
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:C.tint,border:`1.5px solid ${C.primary}40`,borderRadius:10,marginBottom:16}}>
              <IcoZip s={26} c={C.primary}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:600,color:C.primary,marginBottom:1}}>Currently using</div>
                <div style={{fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{activeUpload.original_name||activeUpload.id}</div>
                <div style={{fontSize:11,color:C.muted}}>{[fmtCount(activeUpload.total_users,'user'),fmtCount(activeUpload.total_conversations,'conversation')].filter(Boolean).join(' · ')}</div>
              </div>
              <Btn onClick={()=>onComplete(activeUpload)} style={{flexShrink:0,fontSize:12,padding:'6px 14px'}}>Continue →</Btn>
            </div>
          )}
          {/* Drop zone */}
          <div onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);if(e.dataTransfer.files[0])doUpload(e.dataTransfer.files[0])}}>
            <div onClick={()=>!uploading&&fileInputRef.current.click()} style={{border:`2px dashed ${dragOver?C.primary:C.border}`,borderRadius:10,padding:activeUpload?'28px 20px':'48px 20px',textAlign:'center',cursor:uploading?'wait':'pointer',transition:'all .2s',background:dragOver?C.tint:'white'}}>
              <input ref={fileInputRef} type="file" accept=".zip" style={{display:'none'}} onChange={e=>{if(e.target.files[0])doUpload(e.target.files[0])}}/>
              {uploading?(<div><Spinner s={32}/><div style={{marginTop:12,fontSize:13,color:C.muted}}>Uploading & extracting...</div></div>):(<><div style={{display:'flex',justifyContent:'center',marginBottom:12}}><IcoZip s={activeUpload?32:44} c={dragOver?C.primary:C.primaryL}/></div><div style={{fontSize:14,fontWeight:500,marginBottom:4}}><span style={{color:C.primary,fontWeight:600}}>Click to browse</span> or drag & drop</div><div style={{fontSize:12,color:C.muted}}>{activeUpload?'Upload a different Vault .zip file':'Google Vault .zip export file'}</div></>)}
            </div>
          </div>
        </div>
      )}

      <div style={{marginTop:16,paddingTop:12,borderTop:`1px solid ${C.bg}`}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
      </div>
    </div>
  );
};

/* ══════════════════════════════ */
/* ═══   STEP 2: MAP USERS    ═══ */
/* ══════════════════════════════ */
const Step2=({uploadData,msUsers,mappings,setMappings,selectedUsers,setSelectedUsers,onNext,onBack,showToast})=>{
  const csvRef=useRef(null);
  const [search,setSearch]=useState('');
  const [csvUploading,setCsvUploading]=useState(false);
  const [prevMigrated,setPrevMigrated]=useState(new Set());

  // Fetch previously migrated M365 emails for this upload to show duplicate warnings
  useEffect(()=>{
    if(uploadData?.id){
      fetch(`/api/batches/migrated-users?uploadId=${encodeURIComponent(uploadData.id)}`)
        .then(r=>r.ok?r.json():null)
        .then(d=>{if(d?.migrated_users)setPrevMigrated(new Set(d.migrated_users))})
        .catch(()=>{});
    }
  },[uploadData?.id]);

  // Auto-map by email local-part similarity on mount / when uploadData changes
  useEffect(()=>{
    if(!uploadData?.users?.length)return;
    const byLocal={};
    msUsers.forEach(u=>{const em=(u.mail||u.userPrincipalName||'').toLowerCase();const loc=em.split('@')[0];if(loc)byLocal[loc]=u.mail||u.userPrincipalName||''});
    const m={...mappings};let changed=false;
    uploadData.users.forEach(u=>{
      if(!m[u.email]){const gl=u.email.split('@')[0].toLowerCase();m[u.email]=byLocal[gl]||'';changed=true}
    });
    if(changed)setMappings(m);
    if(selectedUsers.size===0)setSelectedUsers(new Set(uploadData.users.map(u=>u.email)));
  },[uploadData,msUsers]);

  const downloadCsv=()=>{
    const rows=(uploadData?.users||[]).map(u=>`"${u.email}","${mappings[u.email]||''}"`);
    const csv='Google Email,M365 Email\n'+rows.join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='user-mappings.csv';a.click();
    showToast('User mapping CSV downloaded successfully.');
  };

  const uploadCsv=file=>{
    setCsvUploading(true);
    const r=new FileReader();
    r.onload=e=>{
      const lines=e.target.result.split(/\r?\n/).slice(1);
      const m={...mappings};
      for(const l of lines){if(!l.trim())continue;const c=parseCsvLine(l);if(c.length>=2&&c[0])m[c[0]]=c[1]}
      setMappings(m);setSelectedUsers(new Set(Object.keys(m)));
      setCsvUploading(false);
      showToast('User mapping uploaded successfully.');
    };
    r.onerror=()=>setCsvUploading(false);
    r.readAsText(file);
  };

  const users=uploadData?.users||[];
  const filtered=users.filter(u=>{const q=search.toLowerCase();return u.email.toLowerCase().includes(q)||(mappings[u.email]||'').toLowerCase().includes(q)}).sort((a,b)=>{const ma=!!mappings[a.email],mb=!!mappings[b.email];if(ma!==mb)return ma?-1:1;return a.email.localeCompare(b.email)});
  const toggleUser=e=>setSelectedUsers(p=>{const n=new Set(p);n.has(e)?n.delete(e):n.add(e);return n});
  const toggleAll=()=>{if(selectedUsers.size===users.length)setSelectedUsers(new Set());else setSelectedUsers(new Set(users.map(u=>u.email)))};
  const autoMapped=users.filter(u=>!!mappings[u.email]).length;
  const unmapped=users.filter(u=>!mappings[u.email]).length;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}} className="fade-up">
      <div style={{flexShrink:0,marginBottom:12}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
          <div>
            <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:2}}>User Mapping</div>
            <div style={{fontSize:13,color:C.muted}}>
              Map Google accounts to M365 emails.{' '}
              {autoMapped>0&&<span style={{color:C.success,fontWeight:500}}>{autoMapped} auto-mapped</span>}
              {unmapped>0&&<span style={{color:C.error}}>{autoMapped>0?' · ':''}{unmapped} need mapping</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:4,flexShrink:0}}>
            <input ref={csvRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])uploadCsv(e.target.files[0]);e.target.value=''}}/>
            <button onClick={()=>csvRef.current.click()} disabled={csvUploading} title="Upload CSV" style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              {csvUploading?<Spinner s={12}/>:<IcoUpload s={13} c={C.muted}/>}
            </button>
            <button onClick={downloadCsv} title="Download CSV" style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.primary}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <IcoDownload s={13} c={C.primary}/>
            </button>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:12,color:C.muted}}><span style={{fontWeight:600,color:C.primary}}>{selectedUsers.size}</span> of {users.length} selected</div>
        </div>
        <SearchBar value={search} onChange={setSearch} placeholder="Search by email..."/>
      </div>

      <div style={{flex:1,overflowY:'auto',minHeight:0,background:'white',border:`1px solid ${C.border}`,borderRadius:10}}>
        <div style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr 60px',padding:'9px 14px',background:C.bg,borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.4,position:'sticky',top:0,zIndex:1}}>
          <input type="checkbox" checked={selectedUsers.size>0&&selectedUsers.size===users.length} onChange={()=>{if(selectedUsers.size===users.length)setSelectedUsers(new Set());else setSelectedUsers(new Set(users.map(u=>u.email)))}} style={{accentColor:C.primary,width:15,height:15,cursor:'pointer'}}/><div>Google Email</div><div>M365 Email</div><div style={{textAlign:'right'}}>Chats</div>
        </div>
        {filtered.map((u,i)=>{
          const mapped=!!(mappings[u.email]);
          const alreadyMigrated=prevMigrated.has(mappings[u.email]);
          return(
            <div key={u.email} style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr 60px',alignItems:'center',padding:'9px 14px',borderBottom:i<filtered.length-1?`1px solid ${C.bg}`:'none',background:selectedUsers.has(u.email)?C.tint:'white',transition:'background .15s',cursor:'pointer'}} onClick={()=>toggleUser(u.email)}>
              <input type="checkbox" checked={selectedUsers.has(u.email)} onChange={()=>toggleUser(u.email)} style={{accentColor:C.primary,width:15,height:15}} onClick={e=>e.stopPropagation()}/>
              <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}><Avatar name={u.email} email={u.email} size={26}/><div style={{minWidth:0}}><span style={{fontSize:12,color:C.muted,fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>{u.email}</span>{alreadyMigrated&&<span style={{fontSize:10,color:'#92400e',background:'#fef3c7',padding:'1px 5px',borderRadius:3,fontWeight:600}}>Previously migrated</span>}</div></div>
              <input value={mappings[u.email]||''} onChange={e=>{e.stopPropagation();setMappings(p=>({...p,[u.email]:e.target.value}))}}
                placeholder="Enter M365 email..."
                style={{border:`1px solid ${mapped?C.primary+'50':C.border}`,borderRadius:5,padding:'5px 9px',fontSize:12,fontFamily:'inherit',outline:'none',marginRight:8,width:'100%',background:mapped?C.tint:'white'}}
                onFocus={e=>{e.stopPropagation();e.target.style.borderColor=C.primary}} onBlur={e=>e.target.style.borderColor=mapped?C.primary+'50':C.border} onClick={e=>e.stopPropagation()}/>
              <div style={{textAlign:'right',fontSize:12,color:C.muted,fontWeight:500}}>{u.conversation_count}</div>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:'center',padding:'24px',fontSize:13,color:C.muted}}>No users found.</div>}
      </div>

      <div style={{flexShrink:0,display:'flex',gap:10,paddingTop:12}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={onNext} style={{flex:1,justifyContent:'center'}}>Continue →</Btn>
      </div>
    </div>
  );
};

/* ══════════════════════════════ */
/* ═══    STEP 3: OPTIONS     ═══ */
/* ══════════════════════════════ */
const Step3=({options,setOptions,config,setConfig,msAuthed,googleAuthed,onRun,onBack,retryMode=false})=>{
  const filePathRef=useRef(null);
  const Chk=({label,checked,onChange,hint})=>(
    <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer',padding:'8px 0'}}>
      <input type="checkbox" checked={checked} onChange={onChange} style={{accentColor:C.primary,width:16,height:16}}/>
      <div><span>{label}</span>{hint&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>{hint}</div>}</div>
    </label>
  );
  useEffect(()=>{
    if(retryMode&&filePathRef.current){
      setTimeout(()=>{filePathRef.current?.focus();filePathRef.current?.scrollIntoView({behavior:'smooth',block:'center'})},100);
    }
  },[retryMode]);
  return(
    <div className="fade-up">
      <div style={{marginBottom:20}}>
        <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Migration Options</div>
        <div style={{fontSize:13,color:C.muted}}>{retryMode?'Update the file path below and retry the failed conversations.':'Configure and start the migration.'}</div>
      </div>

      {retryMode&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#FFF7ED',border:'1px solid #FDBA74',borderRadius:8,fontSize:12,color:'#9A3412',marginBottom:16}}>
          <IcoWarn s={14}/>Retry mode — fix the File Name below, then click Retry Failed.
        </div>
      )}

      <Field label="File Name *">
        <input ref={filePathRef} type="text" value={config.filePath||''} onChange={e=>setConfig(p=>({...p,filePath:e.target.value}))} placeholder="GeminiChats" style={{width:'100%',border:`2px solid ${retryMode?'#EA580C':C.border}`,borderRadius:6,padding:'9px 12px',fontSize:13,outline:'none',transition:'border .2s',boxSizing:'border-box'}} onFocus={e=>e.target.style.borderColor=retryMode?'#C2410C':C.primary} onBlur={e=>e.target.style.borderColor=retryMode?'#EA580C':C.border}/>
      </Field>

      <Card style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:4,color:C.dark}}>Behavior</div>
        <Chk label="Dry run (preview only — no pages created)" hint="Recommended before first live migration" checked={options.dryRun} onChange={e=>setOptions(p=>({...p,dryRun:e.target.checked}))}/>
      </Card>

      <Card style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:600,color:C.dark}}>Date Range</div>
          <span style={{fontSize:11,color:C.primaryL,fontStyle:'italic'}}>Optional — blank = migrate all data</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Field label="From Date"><Input type="date" value={options.fromDate} onChange={e=>setOptions(p=>({...p,fromDate:e.target.value}))}/></Field>
          <Field label="To Date"><Input type="date" value={options.toDate} onChange={e=>setOptions(p=>({...p,toDate:e.target.value}))}/></Field>
        </div>
        {(options.fromDate||options.toDate)&&<TextBtn onClick={()=>setOptions(p=>({...p,fromDate:'',toDate:''}))} style={{fontSize:11,marginTop:2,color:C.muted}}>Clear date range</TextBtn>}
      </Card>

      {!options.dryRun&&!msAuthed&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:8,fontSize:13,color:'#991B1B',marginBottom:16}}>
          <IcoWarn s={15}/>Live migration requires Microsoft sign-in (Step 1 — Connect Clouds).
        </div>
      )}
      {!options.dryRun&&!googleAuthed&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:8,fontSize:13,color:'#991B1B',marginBottom:16}}>
          <IcoWarn s={15}/>Live migration requires Google sign-in (Step 1 — Connect Clouds).
        </div>
      )}

      <div style={{display:'flex',gap:10}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={()=>onRun()} disabled={!config.filePath||(!options.dryRun&&(!msAuthed||!googleAuthed))} style={{flex:1,justifyContent:'center'}}>
          {retryMode?<><IcoReset s={14}/>Retry Failed</>:options.dryRun?<><IcoSearch s={14}/>Start Dry Run</>:<><IcoRocket s={14}/>Start Migration</>}
        </Btn>
      </div>
    </div>
  );
};

/* ══════════════════════════════ */
/* ═══   STEP 4/5: MIGRATE    ═══ */
/* ══════════════════════════════ */
const MIG_ENTITIES=[
  {label:'Users',  icon:<IcoUser s={18}/>,  color:C.primary},
  {label:'Pages',  icon:<IcoPage s={18}/>,  color:C.success},
  {label:'Errors', icon:<IcoError s={18}/>, color:C.error},
  {label:'Flagged',icon:<IcoFlag s={18}/>,  color:C.primaryL},
];

const StepMigrate=({stats,done,lastRunWasDry,batchId,onStartLive,onRunAnother,onRetry,retrying,hasUploadData,onGoToConnect,onRetryWithPath,totalExpected=0,onChangeDirection})=>{
  const [batchUsers,setBatchUsers]=useState(null);
  const [showUserDetail,setShowUserDetail]=useState(false);
  const [errorGroups,setErrorGroups]=useState(null);
  // Dynamic progress: pages migrated / total expected. Survives page refresh (stats is persisted).
  const ring=done?100:(totalExpected>0?Math.min(Math.round(((stats.pages||0)+(stats.errors||0))/totalExpected*100),99):(stats.pages>0||stats.users>0?Math.min(5+(stats.pages||0),95):0));
  useEffect(()=>{
    if(done&&batchId&&!lastRunWasDry){
      fetch(`/api/reports/${batchId}`).then(r=>r.ok?r.json():null).then(d=>{if(d?.users)setBatchUsers(d.users)}).catch(()=>{});
      fetch(`/api/reports/${batchId}/errors`).then(r=>r.ok?r.json():null).then(d=>{
        if(!d?.errors?.length)return;
        const groups={path_conflict:[],auth_error:[],page_error:[]};
        for(const e of d.errors){
          const msg=(e.error||'').toLowerCase();
          if(msg.includes('already exists')||msg.includes('20117'))groups.path_conflict.push(e);
          else if(msg.includes('401')||msg.includes('not authenticated')||msg.includes('token'))groups.auth_error.push(e);
          else groups.page_error.push(e);
        }
        setErrorGroups(groups);
      }).catch(()=>{});
    }
  },[done,batchId,lastRunWasDry]);
  const vals=[stats.users,stats.pages,stats.errors,stats.flagged];

  const dlMigrationCsv=async()=>{
    try{
      const endpoint=batchId?`/api/reports/${batchId}`:'/api/reports/migration';
      const res=await fetch(endpoint);
      if(!res.ok)throw new Error('not found');
      const data=await res.json();
      const users=data.users||[];
      const customerName=data.customerName||'Gemini';
      const destFor=(email)=>`${email}/OneDrive/Notebooks/${customerName}/${customerName} Conversations`;
      // Flatten: one row per user, or one per error for failed users
      const rows=[];
      users.forEach(u=>{
        if(u.errors&&u.errors.length>0){
          u.errors.forEach(e=>rows.push([u.email,destFor(u.email),u.status,u.pages_created,e.conversation||'',e.error_message||'']));
        }else{
          rows.push([u.email,destFor(u.email),u.status,u.pages_created,'','']);
        }
      });
      const csv='Email,Destination Path,Status,Pages Created,Conversation,Error\n'+
        rows.map(r=>r.map(f=>`"${String(f||'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const a=document.createElement('a');
      a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
      a.download=`migration_report_${batchId||'latest'}.csv`;a.click();
    }catch(e){
      console.warn('CSV download failed:',e);
    }
  };

  return(
    <div className="fade-up">
      {!done?(
        <>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Migration in Progress</div>
            <div style={{fontSize:13,color:C.muted}}>Watch the log on the right for live updates.</div>
          </div>
          <div style={{display:'flex',justifyContent:'center',padding:'28px 0 20px'}}>
            <div style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
              <Ring pct={ring} size={120} stroke={8} color={C.primary}/>
              <div style={{position:'absolute',textAlign:'center'}}><div style={{fontSize:22,fontWeight:700,color:C.primary}}>{ring}%</div><div style={{fontSize:10,color:C.muted}}>Progress</div></div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            {MIG_ENTITIES.map((e,i)=>(
              <div key={i} className="slide-r" style={{animationDelay:`${i*60}ms`,background:'white',borderRadius:10,padding:'12px 14px',border:`1px solid ${C.border}`,borderLeft:`3px solid ${e.color}`,display:'flex',alignItems:'center',gap:10}}>
                <div style={{color:e.color,animation:'float 3s ease-in-out infinite',animationDelay:`${i*.4}s`}}>{e.icon}</div>
                <div><div style={{fontSize:18,fontWeight:700,color:e.color}}>{vals[i]}</div><div style={{fontSize:11,color:C.muted,textTransform:'uppercase',letterSpacing:.3}}>{e.label}</div></div>
              </div>
            ))}
          </div>
          <div style={{background:C.tint,borderRadius:8,padding:'10px 14px',fontSize:12,color:C.primary,textAlign:'center'}}>Processing conversations... watch the log →</div>
        </>
      ):(
        <>
          <div style={{marginBottom:20,textAlign:'center'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:8,color:C.success}}><IcoDone s={48}/></div>
            <div style={{fontSize:20,fontWeight:600,color:C.success,marginBottom:4}}>
              {lastRunWasDry?'Dry Run Complete!':'Migration Complete!'}
            </div>
            <div style={{fontSize:13,color:C.muted}}>
              {lastRunWasDry?'Preview complete — no pages were created.':'All conversations migrated. Copilot Agent deployed.'}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
            {[{label:'Users',val:stats.users,icon:<IcoUser s={22}/>,color:C.primary},{label:'Pages Created',val:stats.pages,icon:<IcoPage s={22}/>,color:C.success},{label:'Errors',val:stats.errors,icon:<IcoError s={22}/>,color:stats.errors>0?C.error:C.muted},{label:'Flagged Assets',val:stats.flagged,icon:<IcoFlag s={22}/>,color:C.primaryL}].map((s,i)=>(
              <Card key={i} className="scale-in" style={{animationDelay:`${i*80}ms`,textAlign:'center',padding:16}}>
                <div style={{display:'flex',justifyContent:'center',marginBottom:6,color:s.color}}>{s.icon}</div>
                <div style={{fontSize:28,fontWeight:700,color:s.color}}>{s.val}</div>
                <div style={{fontSize:11,color:C.muted,textTransform:'uppercase',letterSpacing:.4,marginTop:2}}>{s.label}</div>
              </Card>
            ))}
          </div>

          {!lastRunWasDry&&(
            <Card style={{background:C.tint,border:`1px solid ${C.primary}30`,marginBottom:16,padding:'14px 16px',fontSize:13}}>
              <b>What's next:</b> Users can open <b>Microsoft Copilot</b> or <b>Teams</b> — the agent is pinned in their sidebar with all migrated conversations.
            </Card>
          )}

          <button onClick={dlMigrationCsv} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'10px 16px',borderRadius:6,border:`1px solid ${C.primary}`,background:'white',fontSize:13,fontWeight:500,cursor:'pointer',color:C.primary,fontFamily:'inherit',transition:'all .15s',marginBottom:10}} onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}>
            <IcoDownload s={13} c={C.primary}/> Download Migration Report (CSV)
          </button>

          {/* Smart error panel */}
          {!lastRunWasDry&&stats.errors>0&&errorGroups&&(
            <div style={{marginBottom:10}}>
              {errorGroups.path_conflict.length>0&&(
                <div style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 14px',background:'#FFFBEB',border:'1px solid #FCD34D',borderRadius:8,fontSize:12,color:'#92400E',marginBottom:8}}>
                  <IcoWarn s={14}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,marginBottom:2}}>Section already exists ({errorGroups.path_conflict.length} conversation{errorGroups.path_conflict.length>1?'s':''})</div>
                    <div style={{color:'#B45309',marginBottom:6}}>This usually resolves automatically on retry — a fresh PagesCreator instance clears the section cache.</div>
                    <button onClick={onRetry} disabled={retrying} style={{fontSize:11,fontWeight:600,padding:'4px 12px',borderRadius:4,border:'1px solid #F59E0B',background:'#FEF3C7',color:'#92400E',cursor:retrying?'not-allowed':'pointer',fontFamily:'inherit',opacity:retrying?0.6:1}}>
                      {retrying?'Retrying…':'Retry Now'}
                    </button>
                  </div>
                </div>
              )}
              {errorGroups.auth_error.length>0&&(
                <div style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 14px',background:'#FEF2F2',border:`1px solid #FCA5A5`,borderRadius:8,fontSize:12,color:'#991B1B',marginBottom:8}}>
                  <IcoError s={14}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,marginBottom:2}}>Microsoft token expired ({errorGroups.auth_error.length} conversation{errorGroups.auth_error.length>1?'s':''})</div>
                    <div style={{color:'#B91C1C',marginBottom:6}}>Go back to Connect Clouds to re-authenticate with Microsoft.</div>
                    <button onClick={onGoToConnect} style={{fontSize:11,fontWeight:600,padding:'4px 12px',borderRadius:4,border:`1px solid #FCA5A5`,background:'#FEF2F2',color:'#991B1B',cursor:'pointer',fontFamily:'inherit'}}>
                      Go to Connect Clouds
                    </button>
                  </div>
                </div>
              )}
              {errorGroups.page_error.length>0&&(
                <div style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 14px',background:'#FFF7ED',border:'1px solid #FDBA74',borderRadius:8,fontSize:12,color:'#9A3412',marginBottom:8}}>
                  <IcoWarn s={14}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,marginBottom:2}}>{errorGroups.page_error.length} conversation{errorGroups.page_error.length>1?'s':''} failed to create pages</div>
                    <div style={{color:'#C2410C',marginBottom:6}}>Check the file path is correct and the destination notebook exists.</div>
                    <button onClick={onRetryWithPath} style={{fontSize:11,fontWeight:600,padding:'4px 12px',borderRadius:4,border:'1px solid #FDBA74',background:'#FEF3C7',color:'#9A3412',cursor:'pointer',fontFamily:'inherit'}}>
                      Change Path &amp; Retry
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Retry failed conversations (generic fallback) */}
          {!lastRunWasDry&&stats.errors>0&&onRetry&&(
            <button onClick={onRetry} disabled={retrying} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'10px 16px',borderRadius:6,border:`1px solid #FF1F1F`,background:'white',fontSize:13,fontWeight:500,cursor:retrying?'not-allowed':'pointer',color:'#FF1F1F',fontFamily:'inherit',transition:'all .15s',marginBottom:10,opacity:retrying?0.6:1}} onMouseEnter={e=>{if(!retrying)e.currentTarget.style.background='#fff0f0'}} onMouseLeave={e=>e.currentTarget.style.background='white'}>

                <span>Per-User Breakdown</span>

                    <div>User</div><div style={{textAlign:'center'}}>Status</div><div style={{textAlign:'center'}}>Pages</div><div style={{textAlign:'center'}}>Errors</div>
                  </div>
                  {batchUsers.map((u,i)=>(
                    <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 80px 70px 60px',alignItems:'center',padding:'8px 12px',borderTop:`1px solid ${C.bg}`,background:'white'}}>
                      <div style={{fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.dark}}>{u.email}</div>
                      <div style={{textAlign:'center'}}>
                        <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,fontWeight:600,background:u.status==='success'?'#dcfce7':u.status==='partial'?'#fef3c7':'#fee2e2',color:u.status==='success'?'#166534':u.status==='partial'?'#92400e':'#991b1b'}}>{u.status}</span>
                      </div>
                      <div style={{textAlign:'center',fontSize:13,fontWeight:600,color:C.primary}}>{u.pages_created}</div>
                      <div style={{textAlign:'center',fontSize:13,fontWeight:600,color:u.error_count>0?C.error:C.muted}}>{u.error_count}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Batch migration actions */}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {lastRunWasDry&&onStartLive&&(
              <Btn onClick={onStartLive} style={{flex:'1 1 120px',justifyContent:'center'}}>
                <IcoRocket s={14}/> Start Migration (Live)
              </Btn>
            )}
            <Btn variant="ghost" onClick={()=>onRunAnother(false)} style={{flex:'1 1 100px',justifyContent:'center'}}>
              New Migration
            </Btn>
            {onChangeDirection&&<Btn variant="ghost" onClick={onChangeDirection} style={{flex:'1 1 120px',justifyContent:'center'}}>⇄ Change Direction</Btn>}
          </div>
        </>
      )}
    </div>
  );
};

/* Bot avatar */
const BotAv=({s=28})=><div style={{width:s,height:s,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.primaryL})`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width={s*.48} height={s*.48} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2a4 4 0 014 4v2H8V6a4 4 0 014-4z"/><rect x="4" y="8" width="16" height="12" rx="2"/><circle cx="9" cy="14" r="1.5" fill="white"/><circle cx="15" cy="14" r="1.5" fill="white"/></svg></div>;

/* Markdown renderer — uses marked.js + DOMPurify if available */
function renderMarkdown(text){
  if(!text)return null;
  const html=typeof marked!=='undefined'?marked.parse(text):text.replace(/\n/g,'<br/>');
  const clean=typeof DOMPurify!=='undefined'?DOMPurify.sanitize(html):html;
  return<div className="agent-md" dangerouslySetInnerHTML={{__html:clean}}/>;
}

/* Migration results status card */
const StatusCard=({users=0,files=0,errors=0,label='Migration Results'})=>{
  const items=[{v:users,l:'users',c:'#0129AC'},{v:files,l:'files',c:'#20CC83'},{v:errors,l:'errors',c:'#FF1F1F'}].filter(i=>i.v>0);
  if(!items.length)return null;
  return(
    <div style={{borderRadius:10,border:'1px solid #e2e8f0',padding:'10px 14px',marginTop:8,background:'#f8fafc'}}>
      <div style={{fontSize:10,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>{label}</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {items.map(i=>(
          <div key={i.l} style={{background:'white',border:`1px solid ${i.c}33`,borderLeft:`3px solid ${i.c}`,borderRadius:8,padding:'6px 12px',textAlign:'center',minWidth:60}}>
            <div style={{fontSize:22,fontWeight:700,color:i.c,lineHeight:1}}>{i.v}</div>
            <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:.4}}>{i.l}</div>
          </div>
        ))}

};

/* Collapsible shell/terminal log block */
const ShellBlock=({lines,onLineClick})=>{
  const [open,setOpen]=useState(false);
  const scrollRef=React.useRef(null);
  const lineColor=t=>t==='error'?'#f87171':t==='warn'?'#fbbf24':t==='success'?'#4ade80':t==='done'?'#60a5fa':'#94a3b8';
  // Auto-scroll modal when new lines arrive
  React.useEffect(()=>{if(open&&scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;},[lines,open]);
  const errCount=lines.filter(l=>l.type==='error').length;
  const warnCount=lines.filter(l=>l.type==='warn').length;
  const doneItem=lines.find(l=>l.type==='done');
  const lastLine=lines[lines.length-1];
  const preview=lastLine?lastLine.text:'Waiting for logs…';
  return(
    <>
      {/* Compact inline card — click to open modal */}
      <div className="fade-up" onClick={()=>setOpen(true)} style={{marginLeft:36,borderRadius:8,overflow:'hidden',border:'1px solid #1e293b',fontSize:12,fontFamily:'monospace',cursor:'pointer'}}>
        {/* Terminal chrome */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 12px',background:'#1e293b',userSelect:'none'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:'#ef4444',display:'inline-block'}}/>
            <span style={{width:8,height:8,borderRadius:'50%',background:'#f59e0b',display:'inline-block'}}/>
            <span style={{width:8,height:8,borderRadius:'50%',background:'#22c55e',display:'inline-block'}}/>
            <span style={{marginLeft:10,color:'#94a3b8',fontSize:11}}>shell</span>
            <span style={{color:'#475569',fontSize:10}}>{lines.length} lines</span>
            {errCount>0&&<span style={{color:'#f87171',fontSize:10}}>· {errCount} error{errCount!==1?'s':''}</span>}
            {warnCount>0&&<span style={{color:'#fbbf24',fontSize:10}}>· {warnCount} warn{warnCount!==1?'s':''}</span>}
          </div>
          <span style={{color:'#64748b',fontSize:10}}>▼ open</span>
        </div>
        {/* Preview: last log line */}
        <div style={{background:'#0f172a',padding:'5px 12px 6px 52px',color:lastLine?lineColor(lastLine.type):'#475569',fontSize:11,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
          {doneItem?<span style={{color:'#60a5fa'}}>✓ Done — {lines.length} lines logged</span>:preview}
        </div>
      </div>

      {/* Modal overlay */}
      {open&&ReactDOM.createPortal(
        <div style={{position:'fixed',inset:0,zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.6)',backdropFilter:'blur(3px)'}} onClick={()=>setOpen(false)}>
          <div onClick={e=>e.stopPropagation()} style={{width:'min(860px,94vw)',height:'min(560px,85vh)',display:'flex',flexDirection:'column',background:'#0f172a',borderRadius:12,overflow:'hidden',border:'1px solid #1e293b',boxShadow:'0 24px 64px rgba(0,0,0,.6)'}}>
            {/* Modal header */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 14px',background:'#1e293b',flexShrink:0}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{width:8,height:8,borderRadius:'50%',background:'#ef4444',display:'inline-block'}}/>
                <span style={{width:8,height:8,borderRadius:'50%',background:'#f59e0b',display:'inline-block'}}/>
                <span style={{width:8,height:8,borderRadius:'50%',background:'#22c55e',display:'inline-block'}}/>
                <span style={{marginLeft:10,color:'#94a3b8',fontSize:12,fontFamily:'monospace'}}>migration log</span>
                <span style={{color:'#475569',fontSize:11,fontFamily:'monospace'}}>{lines.length} lines</span>
              </div>
              <button onClick={()=>setOpen(false)} style={{background:'none',border:'none',cursor:'pointer',color:'#64748b',fontSize:18,lineHeight:1,padding:'2px 6px',borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.color='#f87171'} onMouseLeave={e=>e.currentTarget.style.color='#64748b'}>✕</button>
            </div>
            {/* Log lines */}
            <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'6px 0'}}>
              {lines.length===0&&<div style={{padding:'16px 52px',color:'#475569',fontSize:12,fontFamily:'monospace'}}>Waiting for logs…</div>}
              {lines.map((ln,i)=>(
                <div key={i} onClick={()=>onLineClick&&onLineClick(ln)} style={{display:'flex',padding:'2px 14px',cursor:onLineClick?'pointer':'default',transition:'background .1s',fontFamily:'monospace'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.04)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <span style={{color:'#334155',minWidth:32,textAlign:'right',paddingRight:12,userSelect:'none',fontSize:11,flexShrink:0}}>{ln.line||i+1}</span>
                  <span style={{color:lineColor(ln.type),flex:1,wordBreak:'break-all',fontSize:12}}>{ln.text}</span>
                </div>
              ))}
            </div>
          </div>
        </div>,
        document.body
      )}
    </>
  );
};
