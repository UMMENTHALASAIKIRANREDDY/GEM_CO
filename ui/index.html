<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini → Copilot Migration | CloudFuze</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn { from{transform:scale(.94);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
    @keyframes checkPop { 0%{transform:scale(0)} 60%{transform:scale(1.3)} 100%{transform:scale(1)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes indeterminate { 0%{left:-40%;width:40%} 100%{left:100%;width:40%} }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    @keyframes glow { 0%,100%{box-shadow:0 0 8px rgba(1,41,172,.2)} 50%{box-shadow:0 0 20px rgba(1,41,172,.5)} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes typing { 0%{opacity:.2} 20%{opacity:1} 100%{opacity:.2} }
    @keyframes connectorPulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    .td{animation:typing 1.4s infinite both;width:5px;height:5px;border-radius:50%;background:#94a3b8;display:inline-block}
    .td:nth-child(2){animation-delay:.2s}
    .td:nth-child(3){animation-delay:.4s}

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',system-ui,sans-serif;background:#F6F6F6;color:#2e2e2e;height:100vh;overflow:hidden}
    button{font-family:inherit;cursor:pointer}
    input,select{font-family:inherit}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px}
    ::-webkit-scrollbar-thumb:hover{background:#9ca3af}

    .fade-up{animation:fadeInUp .4s ease both}
    .scale-in{animation:scaleIn .35s ease both}
    .slide-r{animation:slideRight .35s ease both}
    .check-pop{animation:checkPop .3s ease both}
    .spinner{animation:spin 1s linear infinite}
    .pulse-dot{animation:pulse .9s ease-in-out infinite}
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

/* ─── Brand Colors ─── */
const C = {
  primary: '#0129AC',
  primaryH: '#0C18D4',
  primaryL: '#809EFC',
  tint: '#E1ECFF',
  bg: '#F6F6F6',
  white: '#FFFFFF',
  dark: '#2e2e2e',
  muted: '#707070',
  border: '#EBEBEB',
  success: '#20CC83',
  error: '#FF1F1F',
  warn: '#F59E0B',
};

/* ─── Tiny SVG Icons ─── */
const Spinner = ({s=16}) => (
  <svg width={s} height={s} viewBox="0 0 24 24" className="spinner">
    <circle cx="12" cy="12" r="10" stroke={C.primary} strokeWidth="3" fill="none" strokeDasharray="31.4 31.4" strokeLinecap="round"/>
  </svg>
);

const Check = ({s=16, c=C.success}) => (
  <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);

const GoogleIcon = () => (
  <svg width="18" height="18" viewBox="0 0 48 48">
    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
  </svg>
);

const MsIcon = () => (
  <svg width="18" height="18" viewBox="0 0 21 21">
    <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
    <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
    <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
    <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
  </svg>
);

/* ─── Progress Ring ─── */
const Ring = ({pct, size=80, stroke=6, color=C.primary, children}) => {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const off = circ - (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5e7eb" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off}
        style={{transition:'stroke-dashoffset .6s ease'}}/>
      {children}
    </svg>
  );
};

/* ─── Typing Dots ─── */
const TypingDots = () => (
  <div style={{display:'flex',alignItems:'flex-start',gap:8,padding:'4px 0'}}>
    <div style={{width:28,height:28,borderRadius:'50%',
      background:`linear-gradient(135deg,${C.primary},${C.primaryL})`,
      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round">
        <path d="M12 2a4 4 0 014 4v2H8V6a4 4 0 014-4z"/><rect x="4" y="8" width="16" height="12" rx="2"/>
        <circle cx="9" cy="14" r="1.5" fill="white"/><circle cx="15" cy="14" r="1.5" fill="white"/>
      </svg>
    </div>
    <div style={{background:'#f1f5f9',borderRadius:'10px 10px 10px 3px',padding:'12px 16px',display:'flex',gap:4,alignItems:'center'}}>
      <span className="td"/><span className="td"/><span className="td"/>
    </div>
  </div>
);

/* ─── Avatar with initials ─── */
function avatarColor(email) {
  const colors = ['#0129AC','#8b5cf6','#06b6d4','#f59e0b','#20CC83','#ec4899','#ef4444'];
  let h = 0;
  for (let i = 0; i < email.length; i++) h = (h * 31 + email.charCodeAt(i)) % colors.length;
  return colors[h];
}

const Avatar = ({name, email, size=36}) => {
  const initials = (name || email).split(/[\s@]/)[0].slice(0,2).toUpperCase();
  return (
    <div style={{width:size,height:size,borderRadius:'50%',background:avatarColor(email),
      display:'flex',alignItems:'center',justifyContent:'center',
      color:'white',fontSize:size*0.35,fontWeight:600,flexShrink:0}}>
      {initials}
    </div>
  );
};

/* ─── Btn ─── */
const Btn = ({children, onClick, disabled, variant='primary', style={}}) => {
  const base = {padding:'10px 20px',borderRadius:4,border:'none',fontSize:14,fontWeight:600,
    display:'inline-flex',alignItems:'center',gap:8,transition:'all .15s',cursor:disabled?'not-allowed':'pointer',
    opacity:disabled?.5:1,...style};
  const styles = {
    primary: {background:C.primary,color:'white'},
    outline: {background:'white',color:C.primary,border:`1.5px solid ${C.primary}`},
    ghost: {background:'transparent',color:C.muted,border:`1px solid ${C.border}`},
  };
  const [hov, setHov] = useState(false);
  const s = {...base,...styles[variant]};
  if (hov && !disabled) {
    if (variant==='primary') s.background = C.primaryH;
    if (variant==='outline') s.background = C.tint;
    if (variant==='ghost') s.background = C.bg;
  }
  return (
    <button style={s} onClick={disabled ? undefined : onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
      {children}
    </button>
  );
};

/* ─── Card ─── */
const Card = ({children, style={}, className=''}) => (
  <div className={className} style={{background:'white',borderRadius:10,border:`1px solid ${C.border}`,
    padding:20,...style}}>
    {children}
  </div>
);

/* ─── Field ─── */
const Field = ({label, children}) => (
  <div style={{marginBottom:16}}>
    <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:5}}>{label}</div>
    {children}
  </div>
);

const Input = ({value, onChange, placeholder, type='text'}) => (
  <input type={type} value={value} onChange={onChange} placeholder={placeholder}
    style={{width:'100%',border:`1px solid ${C.border}`,borderRadius:6,padding:'9px 12px',
      fontSize:13,outline:'none',transition:'border .2s'}}
    onFocus={e=>e.target.style.borderColor=C.primary}
    onBlur={e=>e.target.style.borderColor=C.border}
  />
);

/* ══════════════════════════════ */
/* ═══       STEP TRACKER     ═══ */
/* ══════════════════════════════ */
const STEPS = [
  {label:'Import Data', icon:'📥'},
  {label:'Configure',   icon:'⚙️'},
  {label:'Map Users',   icon:'🔗'},
  {label:'Options',     icon:'🎛️'},
  {label:'Migrate',     icon:'🚀'},
  {label:'Complete',    icon:'✅'},
];

const StepTracker = ({active}) => (
  <div style={{display:'flex',alignItems:'center',padding:'14px 24px',borderBottom:`1px solid ${C.border}`,background:'white'}}>
    {STEPS.map((s, i) => {
      const done = i < active, act = i === active;
      return (
        <React.Fragment key={i}>
          <div style={{display:'flex',alignItems:'center',gap:8,opacity:done||act?1:.4,transition:'all .3s'}}>
            <div style={{width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:15,background:done?C.success:act?C.primary:'#e5e7eb',color:'white',
              transition:'all .3s',boxShadow:act?`0 0 0 4px ${C.tint}`:'none',flexShrink:0,
              animation:act?'glow 2s ease-in-out infinite':undefined}}>
              {done ? <span className="check-pop" style={{display:'flex'}}><Check s={15} c="white"/></span> : s.icon}
            </div>
            <span style={{fontSize:11,fontWeight:act?600:400,color:done?C.success:act?C.primary:C.muted,whiteSpace:'nowrap'}}>{s.label}</span>
          </div>
          {i < STEPS.length-1 && (
            <div style={{flex:1,height:2,margin:'0 8px',minWidth:12,
              background:done?C.success:act?C.primaryL:C.border,transition:'background .5s',
              animation:act?'connectorPulse 1.6s ease-in-out infinite':undefined}}/>
          )}
        </React.Fragment>
      );
    })}
  </div>
);

/* ─── Search Input ─── */
const SearchBar = ({value, onChange, placeholder='Search...'}) => (
  <div style={{position:'relative',marginBottom:10}}>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:'100%',border:`1px solid ${C.border}`,borderRadius:6,padding:'8px 12px 8px 34px',
        fontSize:13,outline:'none',fontFamily:'inherit',background:'white'}}
      onFocus={e=>e.target.style.borderColor=C.primary}
      onBlur={e=>e.target.style.borderColor=C.border}/>
    <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13,color:C.muted}}>🔍</span>
  </div>
);

/* ─── Google User Select Panel ─── */
const UserSelectPanel = ({users, selected, toggleUser, toggleAll, startExport}) => {
  const [search, setSearch] = useState('');
  const filtered = users.filter(u =>
    u.name.toLowerCase().includes(search.toLowerCase()) ||
    u.email.toLowerCase().includes(search.toLowerCase())
  );
  const downloadCsv = () => {
    const csv = 'Name,Email\n' + users.map(u=>`"${u.name}","${u.email}"`).join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'google-users.csv'; a.click();
  };
  return (
    <div className="fade-up">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:13,fontWeight:600}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:C.success,display:'inline-block'}}/>
          Signed in · {users.length} users
        </span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={downloadCsv} style={{fontSize:12,color:C.primary,background:'none',border:`1px solid ${C.primary}`,
            borderRadius:5,padding:'4px 9px',cursor:'pointer',fontFamily:'inherit',fontWeight:500}}>⬇ CSV</button>
          <button onClick={toggleAll} style={{fontSize:12,color:C.primary,background:'none',border:'none',cursor:'pointer',fontWeight:500,fontFamily:'inherit'}}>
            {selected.size === users.length ? 'Deselect All' : 'Select All'}
          </button>
        </div>
      </div>
      <SearchBar value={search} onChange={setSearch} placeholder="Search users..."/>
      <div style={{maxHeight:260,overflowY:'auto',display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
        {filtered.map((u,i) => (
          <div key={u.email} className="slide-r" style={{animationDelay:`${i*30}ms`,
            display:'flex',alignItems:'center',gap:12,padding:'10px 14px',
            border:`1.5px solid ${selected.has(u.email)?C.primary:C.border}`,
            borderRadius:8,cursor:'pointer',transition:'all .2s',
            background:selected.has(u.email)?C.tint:'white'}}
            onClick={()=>toggleUser(u.email)}>
            <input type="checkbox" checked={selected.has(u.email)} onChange={()=>toggleUser(u.email)}
              style={{accentColor:C.primary,width:16,height:16,flexShrink:0}} onClick={e=>e.stopPropagation()}/>
            <Avatar name={u.name} email={u.email} size={34}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.name}</div>
              <div style={{fontSize:11,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.email}</div>
            </div>
            {selected.has(u.email) && <Check s={16} c={C.primary}/>}
          </div>
        ))}
        {filtered.length === 0 && <div style={{textAlign:'center',padding:'20px',fontSize:13,color:C.muted}}>No users match "{search}"</div>}
      </div>
      <Btn onClick={startExport} disabled={selected.size===0} style={{width:'100%',justifyContent:'center'}}>
        Export {selected.size > 0 ? `${selected.size} User${selected.size>1?'s':''}` : 'Selected Users'}
      </Btn>
    </div>
  );
};

/* ─── MS User List Panel (shown after MS sign-in in Step 2) ─── */
const MsUserPanel = () => {
  const [msUsers, setMsUsers] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [search, setSearch] = useState('');

  useEffect(() => {
    setLoading(true);
    fetch('/api/ms/users').then(r=>r.json()).then(d => {
      if (d.users) setMsUsers(d.users);
      else setError(d.error || 'Failed to load users');
    }).catch(e => setError(e.message)).finally(() => setLoading(false));
  }, []);

  const downloadCsv = () => {
    const csv = 'Name,Email\n' + msUsers.map(u=>`"${u.displayName}","${u.mail||u.userPrincipalName}"`).join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'ms365-users.csv'; a.click();
  };

  const filtered = msUsers.filter(u => {
    const q = search.toLowerCase();
    return (u.displayName||'').toLowerCase().includes(q) || (u.mail||u.userPrincipalName||'').toLowerCase().includes(q);
  });

  if (loading) return <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 0',fontSize:13,color:C.muted}}><Spinner s={16}/> Loading M365 users...</div>;
  if (error) return <div style={{fontSize:12,color:C.error,padding:'8px 0'}}>⚠ {error}</div>;
  if (msUsers.length === 0) return null;

  return (
    <div className="scale-in" style={{marginTop:16}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:600,color:C.dark}}>{msUsers.length} M365 Users Found</span>
        <button onClick={downloadCsv} style={{fontSize:12,color:C.primary,background:'none',border:`1px solid ${C.primary}`,
          borderRadius:5,padding:'4px 9px',cursor:'pointer',fontFamily:'inherit',fontWeight:500}}>⬇ Download CSV</button>
      </div>
      <SearchBar value={search} onChange={setSearch} placeholder="Search M365 users..."/>
      <div style={{maxHeight:200,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
        {filtered.map((u,i) => (
          <div key={i} className="slide-r" style={{animationDelay:`${i*20}ms`,
            display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
            background:'white',borderRadius:7,border:`1px solid ${C.border}`}}>
            <Avatar name={u.displayName||'?'} email={u.mail||u.userPrincipalName||'?'} size={28}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.displayName}</div>
              <div style={{fontSize:11,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.mail||u.userPrincipalName}</div>
            </div>
          </div>
        ))}
        {filtered.length === 0 && <div style={{textAlign:'center',padding:'16px',fontSize:13,color:C.muted}}>No users match "{search}"</div>}
      </div>
    </div>
  );
};

/* ══════════════════════════════ */
/* ═══   STEP 1: IMPORT DATA  ═══ */
/* ══════════════════════════════ */
const Step1 = ({onComplete}) => {
  const [tab, setTab] = useState('vault');
  const [googleAuthed, setGoogleAuthed] = useState(false);
  const [loadingUsers, setLoadingUsers] = useState(false);
  const [users, setUsers] = useState([]);
  const [selected, setSelected] = useState(new Set());
  const [exporting, setExporting] = useState(false);
  const [exportStatus, setExportStatus] = useState('');
  const [elapsed, setElapsed] = useState(0);
  const elapsedRef = useRef(null);
  const fileInputRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  const [dragOver, setDragOver] = useState(false);

  // No auto-check on mount — auth state resets on every page load/refresh

  const loadUsers = async () => {
    setLoadingUsers(true);
    try {
      const res = await fetch('/api/google/users');
      const data = await res.json();
      if (res.ok) {
        setUsers(data.users);
        setSelected(new Set(data.users.map(u=>u.email)));
      }
    } catch(e){}
    setLoadingUsers(false);
  };

  const signInGoogle = () => {
    window.open('/auth/google/login', 'googleauth', 'width=500,height=700,left=300,top=100');
    window.addEventListener('message', function h(e) {
      if (e.data?.type === 'google-auth-success') {
        window.removeEventListener('message', h);
        setGoogleAuthed(true);
        loadUsers();
      }
    });
  };

  const toggleUser = (email) => {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(email) ? n.delete(email) : n.add(email);
      return n;
    });
  };

  const toggleAll = () => {
    if (selected.size === users.length) setSelected(new Set());
    else setSelected(new Set(users.map(u=>u.email)));
  };

  const startExport = async () => {
    setExporting(true);
    setElapsed(0);
    elapsedRef.current = setInterval(()=>setElapsed(p=>p+1), 1000);
    setExportStatus('Creating Vault export...');
    try {
      const res = await fetch('/api/google/vault-export', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({user_emails: [...selected]}),
      });
      const data = await res.json();
      if (!res.ok) { setExportStatus(`Error: ${data.error}`); clearInterval(elapsedRef.current); setExporting(false); return; }
      setExportStatus('Export in progress...');
      poll();
    } catch(e) {
      setExportStatus(`Error: ${e.message}`);
      clearInterval(elapsedRef.current);
      setExporting(false);
    }
  };

  const poll = async () => {
    const check = async () => {
      try {
        const res = await fetch('/api/google/vault-export/status');
        const data = await res.json();
        if (data.status === 'COMPLETED' && data.users) {
          clearInterval(elapsedRef.current);
          setExportStatus(`Done — ${data.total_users} users, ${data.total_conversations} conversations`);
          setExporting(false);
          setTimeout(() => onComplete(data), 800);
          return;
        }
        if (data.status === 'FAILED') {
          clearInterval(elapsedRef.current);
          setExportStatus(`Export failed: ${data.error || 'Unknown error'}`);
          setExporting(false);
          return;
        }
        setExportStatus(`Export in progress (${data.status})...`);
        setTimeout(check, 10000);
      } catch(e) {
        setTimeout(check, 15000);
      }
    };
    check();
  };

  const doUpload = async (file) => {
    if (!file.name.endsWith('.zip')) return;
    setUploading(true);
    const fd = new FormData();
    fd.append('vault_zip', file);
    try {
      const res = await fetch('/api/upload', {method:'POST', body:fd});
      const data = await res.json();
      if (res.ok) onComplete(data);
    } catch(e){}
    setUploading(false);
  };

  return (
    <div className="fade-up">
      <div style={{marginBottom:20}}>
        <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Import Gemini Data</div>
        <div style={{fontSize:13,color:C.muted}}>Connect Google Vault to export Gemini conversations, or upload a ZIP manually.</div>
      </div>

      {/* Tabs */}

/* ═══   STEP 3: MAP USERS    ═══ */
/* ══════════════════════════════ */
const Step3 = ({uploadData, mappings, setMappings, onNext, onBack}) => {
  const csvRef = useRef(null);

  useEffect(() => {
    if (uploadData?.users) {
      const m = {};
      uploadData.users.forEach(u => { m[u.email] = u.email; });
      setMappings(m);
    }
  }, [uploadData]);

  const downloadMappingCsv = () => {
    const rows = (uploadData?.users||[]).map(u => `"${u.email}","${mappings[u.email]||u.email}"`);
    const csv = 'Google Email,M365 Email\n' + rows.join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'user-mappings.csv'; a.click();
  };

  const uploadMappingCsv = (file) => {
    const reader = new FileReader();
    reader.onload = e => {
      const lines = e.target.result.split('\n').slice(1); // skip header
      const m = {...mappings};
      for (const line of lines) {
        const cols = line.match(/"([^"]*)","([^"]*)"/);
        if (cols) m[cols[1]] = cols[2];
      }
      setMappings(m);
    };
    reader.readAsText(file);
  };

  return (
    <div className="fade-up">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>User Mappings</div>
          <div style={{fontSize:13,color:C.muted}}>Map each Google account to the Microsoft 365 email.</div>
        </div>
        <div style={{display:'flex',gap:6,flexShrink:0}}>
          <input ref={csvRef} type="file" accept=".csv" style={{display:'none'}}
            onChange={e=>{ if(e.target.files[0]) uploadMappingCsv(e.target.files[0]); e.target.value=''; }}/>
          <button onClick={()=>csvRef.current.click()} style={{fontSize:12,color:C.muted,background:'white',
            border:`1px solid ${C.border}`,borderRadius:5,padding:'5px 10px',cursor:'pointer',fontFamily:'inherit',fontWeight:500}}>
            ⬆ Upload CSV
          </button>
          <button onClick={downloadMappingCsv} style={{fontSize:12,color:C.primary,background:'white',
            border:`1px solid ${C.primary}`,borderRadius:5,padding:'5px 10px',cursor:'pointer',fontFamily:'inherit',fontWeight:500}}>
            ⬇ Download CSV
          </button>
        </div>
      </div>

      <div style={{background:'white',border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden',marginBottom:20}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 80px',padding:'10px 16px',
          background:C.bg,borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:600,
          color:C.muted,textTransform:'uppercase',letterSpacing:.4}}>
          <div>Google Email</div>
          <div>M365 Email</div>
          <div style={{textAlign:'right'}}>Chats</div>
        </div>
        {(uploadData?.users||[]).map((u, i) => (
          <div key={u.email} className="slide-r" style={{animationDelay:`${i*50}ms`,
            display:'grid',gridTemplateColumns:'1fr 1fr 80px',alignItems:'center',
            padding:'10px 16px',borderBottom:i<uploadData.users.length-1?`1px solid ${C.bg}`:'none'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <Avatar name={u.email} email={u.email} size={28}/>
              <span style={{fontSize:12,color:C.muted,fontFamily:'monospace'}}>{u.email}</span>
            </div>
            <input value={mappings[u.email]||''} onChange={e=>setMappings(p=>({...p,[u.email]:e.target.value}))}
              style={{border:`1px solid ${C.border}`,borderRadius:5,padding:'6px 10px',fontSize:12,
                fontFamily:'inherit',outline:'none',marginRight:8}}
              onFocus={e=>e.target.style.borderColor=C.primary}
              onBlur={e=>e.target.style.borderColor=C.border}/>
            <div style={{textAlign:'right',fontSize:12,color:C.muted,fontWeight:500}}>{u.conversation_count}</div>
          </div>
        ))}
      </div>

      <div style={{display:'flex',gap:10}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={onNext} style={{flex:1,justifyContent:'center'}}>Continue →</Btn>
      </div>
    </div>
  );
};

  return (

/* ═══            MAIN APP            ═══ */
/* ══════════════════════════════════════ */
function App() {
  const [step, setStep] = useState(0);
  const [uploadData, setUploadData] = useState(null);
  const [config, setConfig] = useState({customerName:'', tenantId:'807d6772-847c-40e2-9bec-e2c930b3a42e'});
  const [mappings, setMappings] = useState({});
  const [options, setOptions] = useState({dryRun:false, skipFollowups:false, fromDate:'', toDate:''});
  const [msAuthed, setMsAuthed] = useState(false);
  const [logs, setLogs] = useState([]);
  const [live, setLive] = useState(false);
  const [migDone, setMigDone] = useState(false);
  const [stats, setStats] = useState({users:0, pages:0, errors:0, flagged:0});
  const sseRef = useRef(null);

  // No auto-check on mount — MS auth state resets on every page load/refresh

  const addLog = (type, message) => {
    const ts = new Date().toTimeString().slice(0,8);
    setLogs(p => [...p, {type, message, ts}]);
  };

  const handleImportComplete = (data) => {
    setUploadData(data);
    addLog('success', `Imported — ${data.total_users} users, ${data.total_conversations} conversations`);
    setTimeout(() => setStep(1), 400);
  };

  const runMigration = async () => {
    setStep(4);
    const isDry = options.dryRun;
    addLog('info', isDry ? 'Starting dry run...' : 'Starting live migration...');
    setLive(true);
    const curStats = {users:0, pages:0, errors:0, flagged:0};

    // SSE
    if (sseRef.current) sseRef.current.close();
    sseRef.current = new EventSource('/api/migration-log');
    sseRef.current.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        if (d.type==='success' && d.message.includes('Page created')) curStats.pages++;
        if (d.type==='error') curStats.errors++;
        if (d.type==='info' && d.message.includes('Processing:')) curStats.users++;
        if (d.type==='warn' && d.message.includes('flagged')) {
          const m = d.message.match(/(\d+) conversations flagged/);
          if (m) curStats.flagged += parseInt(m[1]);
        }
        setStats({...curStats});
        addLog(d.type, d.message);
        if (d.type === 'done') {
          sseRef.current.close();
          setLive(false);
          setMigDone(true);
          setStep(5);
        }
      } catch(ex){}
    };
    sseRef.current.onerror = () => { if(sseRef.current){sseRef.current.close();setLive(false);} };

    const payload = {
      extract_path: uploadData.extract_path,
      tenant_id: config.tenantId,
      customer_name: config.customerName || 'Gemini',
      user_mappings: mappings,
      dry_run: isDry,
      skip_followups: options.skipFollowups,
      from_date: options.fromDate || null,
      to_date: options.toDate || null,
    };

    try {
      const res = await fetch('/api/migrate', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if (!res.ok) { const d=await res.json(); addLog('error',d.error); setLive(false); }
    } catch(err) { addLog('error',err.message); setLive(false); }
  };

  const leftContent = [
    <Step1 onComplete={handleImportComplete}/>,
    <Step2 uploadData={uploadData} config={config} setConfig={setConfig}
      msAuthed={msAuthed} setMsAuthed={setMsAuthed}
      onNext={()=>{addLog('info','Configuring user mappings...');setStep(2)}}
      onBack={()=>setStep(0)}/>,
    <Step3 uploadData={uploadData} mappings={mappings} setMappings={setMappings}
      onNext={()=>{addLog('info','Options configured.');setStep(3)}}
      onBack={()=>setStep(1)}/>,
    <Step4 options={options} setOptions={setOptions} msAuthed={msAuthed}
      onRun={runMigration} onBack={()=>setStep(2)}/>,
    <Step5 stats={stats} done={false}/>,
    <Step5 stats={stats} done={true}/>,
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',fontFamily:'Poppins,system-ui,sans-serif'}}>
      {/* Header */}
      <div style={{background:C.primary,height:52,display:'flex',alignItems:'center',
        padding:'0 24px',gap:12,flexShrink:0,boxShadow:'0 2px 8px rgba(1,41,172,.2)'}}>
        <img src="/assets/logo.png" alt="CloudFuze" style={{height:32,objectFit:'contain',borderRadius:4}}/>
        <div style={{width:1,height:24,background:'rgba(255,255,255,.25)',margin:'0 4px'}}/>
        <div>
          <div style={{color:'white',fontSize:14,fontWeight:600,lineHeight:1.2}}>Gemini → Copilot Migration</div>
          <div style={{color:'rgba(255,255,255,.6)',fontSize:11}}>powered by CloudFuze</div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
          <div className={live?'pulse-dot':''} style={{width:8,height:8,borderRadius:'50%',
            background:live?C.success:'rgba(255,255,255,.3)',transition:'background .3s'}}/>
          <span style={{color:'rgba(255,255,255,.7)',fontSize:12}}>{live?'Live':'Idle'}</span>
        </div>
      </div>

      {/* Step Tracker */}
      <StepTracker active={Math.min(step,5)}/>

      {/* Split Panel */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',flex:1,overflow:'hidden'}}>
        {/* Left */}
        <div style={{display:'flex',flexDirection:'column',borderRight:`1px solid ${C.border}`,overflow:'hidden',background:'white'}}>
          <div style={{padding:'16px 24px',borderBottom:`1px solid ${C.bg}`,background:'white'}}>
            <span style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>
              Step {Math.min(step+1,6)} of 6
            </span>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>
            {leftContent[Math.min(step, 5)]}
          </div>
        </div>

        {/* Right */}
        <div style={{display:'flex',flexDirection:'column',background:C.bg,overflow:'hidden'}}>
          <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,background:'white',
            display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:14,fontWeight:600}}>Migration Log</span>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div className={live?'pulse-dot':''} style={{width:8,height:8,borderRadius:'50%',
                background:live?C.success:'#d1d5db',transition:'background .3s'}}/>
              <span style={{fontSize:12,color:live?C.success:C.muted,fontWeight:500}}>
                {live?'Running':'Waiting'}
              </span>
            </div>
          </div>
          <LogFeed logs={logs} live={live}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
