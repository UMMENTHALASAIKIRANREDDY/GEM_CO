function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function lsClear() {
  Object.values(LS_KEYS).forEach(k => localStorage.removeItem(k));
}

/* ─── CSV parser (handles 100+ rows, quoted fields) ─── */
function parseCsvLine(line) {
  const fields = [];
  let current = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { current += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      fields.push(current.trim()); current = '';
    } else {
      current += ch;
    }
  }
  fields.push(current.trim());
  return fields;
}

  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const off = circ - (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5e7eb" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off}
        style={{transition:'stroke-dashoffset .6s ease'}}/>
      {children}
    </svg>
  );
};

/* ─── Avatar with initials ─── */
function avatarColor(email) {
  const colors = ['#0129AC','#0C18D4','#809EFC','#20CC83','#0ea5e9','#6366f1','#14b8a6'];
  let h = 0;
  for (let i = 0; i < email.length; i++) h = (h * 31 + email.charCodeAt(i)) % colors.length;
  return colors[h];
}

const Avatar = ({name, email, size=36}) => {
  const initials = (name || email).split(/[\s@]/)[0].slice(0,2).toUpperCase();
  return (
    <div style={{width:size,height:size,borderRadius:'50%',background:avatarColor(email),
      display:'flex',alignItems:'center',justifyContent:'center',
      color:'white',fontSize:size*0.35,fontWeight:600,flexShrink:0}}>
      {initials}
    </div>
  );
};

/* ─── Btn ─── */
const Btn = ({children, onClick, disabled, variant='primary', style={}}) => {
  const base = {padding:'10px 20px',borderRadius:4,border:'none',fontSize:14,fontWeight:600,
    display:'inline-flex',alignItems:'center',gap:8,transition:'all .15s',cursor:disabled?'not-allowed':'pointer',
    opacity:disabled?.5:1,...style};
  const styles = {
    primary: {background:C.primary,color:'white'},
    outline: {background:'white',color:C.primary,border:`1.5px solid ${C.primary}`},
    ghost: {background:'transparent',color:C.muted,border:`1px solid ${C.border}`},
  };
  const [hov, setHov] = useState(false);
  const s = {...base,...styles[variant]};
  if (hov && !disabled) {
    if (variant==='primary') s.background = C.primaryH;
    if (variant==='outline') s.background = C.tint;
    if (variant==='ghost') s.background = C.bg;
  }
  return (
    <button style={s} onClick={disabled ? undefined : onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
      {children}
    </button>
  );
};

/* ─── Google User Select Panel ─── */
const UserSelectPanel = ({users, selected, toggleUser, toggleAll, startExport, onLogout}) => {

    <div className="fade-up">

        <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:13,fontWeight:600}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:C.success,display:'inline-block'}}/>
          Signed in · {users.length} users
        </span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>

              borderRadius:5,padding:'4px 8px',cursor:'pointer',fontFamily:'inherit',fontWeight:500,
              display:'inline-flex',alignItems:'center',gap:4}}>

      <div style={{maxHeight:240,overflowY:'auto',display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
        {filtered.map((u,i) => (
          <div key={u.email} className="slide-r" style={{animationDelay:`${i*30}ms`,
            display:'flex',alignItems:'center',gap:12,padding:'10px 14px',
            border:`1.5px solid ${selected.has(u.email)?C.primary:C.border}`,
            borderRadius:8,cursor:'pointer',transition:'all .2s',
            background:selected.has(u.email)?C.tint:'white'}}
            onClick={()=>toggleUser(u.email)}>
            <input type="checkbox" checked={selected.has(u.email)} onChange={()=>toggleUser(u.email)}
              style={{accentColor:C.primary,width:16,height:16,flexShrink:0}} onClick={e=>e.stopPropagation()}/>
            <Avatar name={u.name} email={u.email} size={34}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.name}</div>
              <div style={{fontSize:11,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.email}</div>
            </div>
            {selected.has(u.email) && <Check s={16} c={C.primary}/>}
          </div>
        ))}
        {filtered.length === 0 && <div style={{textAlign:'center',padding:'20px',fontSize:13,color:C.muted}}>No users match "{search}"</div>}
      </div>
      <Btn onClick={startExport} disabled={selected.size===0} style={{width:'100%',justifyContent:'center'}}>
        Export {selected.size > 0 ? `${selected.size} User${selected.size>1?'s':''}` : 'Selected Users'}
      </Btn>
    </div>
  );
};

/* ─── MS User List Panel (shown after MS sign-in in Step 2) ─── */
const MsUserPanel = ({onLogout}) => {
  const [msUsers, setMsUsers] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [search, setSearch] = useState('');

  useEffect(() => {
    setLoading(true);
    fetch('/api/ms/users').then(r => {
      if (r.status === 401) {
        // Server token expired (e.g. server restarted) — clear UI auth state
        if (onLogout) onLogout();
        return { users: null, _expired: true };
      }
      return r.json();
    }).then(d => {
      if (d._expired) return;
      if (d.users) setMsUsers(d.users);
      else setError(d.error || 'Failed to load users');
    }).catch(e => setError(e.message)).finally(() => setLoading(false));
  }, []);

  const downloadCsv = () => {
    const csv = 'Name,Email\n' + msUsers.map(u=>`"${u.displayName}","${u.mail||u.userPrincipalName}"`).join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'ms365-users.csv'; a.click();
  };

  const filtered = msUsers.filter(u => {
    const q = search.toLowerCase();
    return (u.displayName||'').toLowerCase().includes(q) || (u.mail||u.userPrincipalName||'').toLowerCase().includes(q);
  });

  if (loading) return <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 0',fontSize:13,color:C.muted}}><Spinner s={16}/> Loading M365 users...</div>;
  if (error) return <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:C.error,padding:'8px 0'}}><IcoError s={13}/> {error}</div>;
  if (msUsers.length === 0) return null;

  return (
    <div className="scale-in" style={{marginTop:16}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:600,color:C.dark}}>{msUsers.length} M365 Users Found</span>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={downloadCsv} style={{fontSize:12,color:C.primary,background:'none',border:`1px solid ${C.primary}`,
            borderRadius:5,padding:'4px 9px',cursor:'pointer',fontFamily:'inherit',fontWeight:500,
            display:'inline-flex',alignItems:'center',gap:4}}>
            <IcoDownload s={11} c={C.primary}/> Download CSV
          </button>
          {onLogout && (
            <button onClick={onLogout} style={{fontSize:11,color:C.muted,background:'none',border:`1px solid ${C.border}`,
              borderRadius:5,padding:'4px 8px',cursor:'pointer',fontFamily:'inherit',fontWeight:500,
              display:'inline-flex',alignItems:'center',gap:4}}>
              <IcoLogout s={11}/> Sign Out
            </button>
          )}
        </div>
      </div>
      <SearchBar value={search} onChange={setSearch} placeholder="Search M365 users..."/>
      <div style={{maxHeight:200,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
        {filtered.map((u,i) => (
          <div key={i} className="slide-r" style={{animationDelay:`${i*20}ms`,
            display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
            background:'white',borderRadius:7,border:`1px solid ${C.border}`}}>
            <Avatar name={u.displayName||'?'} email={u.mail||u.userPrincipalName||'?'} size={28}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.displayName}</div>
              <div style={{fontSize:11,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.mail||u.userPrincipalName}</div>
            </div>
          </div>
        ))}
        {filtered.length === 0 && <div style={{textAlign:'center',padding:'16px',fontSize:13,color:C.muted}}>No users match "{search}"</div>}
      </div>
    </div>
  );
};

/* ══════════════════════════════ */
/* ═══   STEP 1: IMPORT DATA  ═══ */
/* ══════════════════════════════ */
const Step1 = ({onComplete, googleAuthed, setGoogleAuthed}) => {
  const [tab, setTab] = useState('vault');
  const [loadingUsers, setLoadingUsers] = useState(false);
  const [users, setUsers] = useState([]);
  const [selected, setSelected] = useState(new Set());
  const [exporting, setExporting] = useState(false);
  const [exportStatus, setExportStatus] = useState('');
  const [elapsed, setElapsed] = useState(0);
  const elapsedRef = useRef(null);
  const fileInputRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  const [dragOver, setDragOver] = useState(false);

  const [loadError, setLoadError] = useState('');

  const loadUsers = async () => {
    setLoadingUsers(true);
    setLoadError('');
    try {
      const res = await fetch('/api/google/users');
      if (res.status === 401) {
        setGoogleAuthed(false);
        setLoadingUsers(false);
        return;
      }
      const data = await res.json();
      if (res.ok && data.users) {
        setUsers(data.users);
        setSelected(new Set(data.users.map(u=>u.email)));
      } else {
        setLoadError(data.error || 'Failed to load users');
      }
    } catch(e){
      setLoadError(e.message);
    }
    setLoadingUsers(false);
  };

  // If already authed on mount (restored from localStorage), load users
  useEffect(() => {
    if (googleAuthed && users.length === 0) loadUsers();
  }, [googleAuthed]);

  const signInGoogle = () => {
    window.open('/auth/google/login', 'googleauth', 'width=500,height=700,left=300,top=100');
    window.addEventListener('message', function h(e) {
      if (e.data?.type === 'google-auth-success') {
        window.removeEventListener('message', h);
        setGoogleAuthed(true);
        loadUsers();
      }
    });
  };

  const logoutGoogle = async () => {
    await fetch('/auth/google/logout', {method:'POST'});
    setGoogleAuthed(false);
    setUsers([]);
    setSelected(new Set());
  };

  const toggleUser = (email) => {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(email) ? n.delete(email) : n.add(email);
      return n;
    });
  };

  const toggleAll = () => {
    if (selected.size === users.length) setSelected(new Set());
    else setSelected(new Set(users.map(u=>u.email)));
  };

  const startExport = async () => {
    setExporting(true);
    setElapsed(0);
    elapsedRef.current = setInterval(()=>setElapsed(p=>p+1), 1000);
    setExportStatus('Creating Vault export...');
    try {
      const res = await fetch('/api/google/vault-export', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({user_emails: [...selected]}),
      });
      const data = await res.json();
      if (!res.ok) { setExportStatus(`Error: ${data.error}`); clearInterval(elapsedRef.current); setExporting(false); return; }
      setExportStatus('Export in progress...');
      poll();
    } catch(e) {
      setExportStatus(`Error: ${e.message}`);
      clearInterval(elapsedRef.current);
      setExporting(false);
    }
  };

  const poll = async () => {
    const check = async () => {
      try {
        const res = await fetch('/api/google/vault-export/status');
        const data = await res.json();
        if (data.status === 'COMPLETED' && data.users) {
          clearInterval(elapsedRef.current);
          setExportStatus(`Done — ${data.total_users} users, ${data.total_conversations} conversations`);
          setExporting(false);
          setTimeout(() => onComplete(data), 800);
          return;
        }
        if (data.status === 'FAILED') {
          clearInterval(elapsedRef.current);
          setExportStatus(`Export failed: ${data.error || 'Unknown error'}`);
          setExporting(false);
          return;
        }
        setExportStatus(`Export in progress (${data.status})...`);
        setTimeout(check, 10000);
      } catch(e) {
        setTimeout(check, 15000);
      }
    };
    check();
  };

  const doUpload = async (file) => {
    if (!file.name.endsWith('.zip')) return;
    setUploading(true);
    const fd = new FormData();
    fd.append('vault_zip', file);
    try {
      const res = await fetch('/api/upload', {method:'POST', body:fd});
      const data = await res.json();
      if (res.ok) onComplete(data);
    } catch(e){}
    setUploading(false);
  };

  return (
    <div className="fade-up">
      <div style={{marginBottom:20}}>
        <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Import Gemini Data</div>
        <div style={{fontSize:13,color:C.muted}}>Connect Google Vault to export Gemini conversations, or upload a ZIP manually.</div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:4,marginBottom:20,background:C.bg,borderRadius:8,padding:4}}>
        {[['vault','Google Vault'],['upload','Upload ZIP']].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            flex:1,padding:'8px 0',borderRadius:6,border:'none',fontSize:13,fontWeight:tab===id?600:400,
            background:tab===id?'white':C.bg,color:tab===id?C.primary:C.muted,
            boxShadow:tab===id?'0 1px 4px rgba(0,0,0,.1)':'none',transition:'all .2s',cursor:'pointer'}}>
            {label}
          </button>
        ))}
      </div>

      {/* Google Vault Panel */}
      {tab === 'vault' && (
        <div>
          {!googleAuthed ? (
            <Card className="fade-up" style={{textAlign:'center',padding:32}}>
              <div style={{display:'flex',justifyContent:'center',marginBottom:12}}>
                <IcoCloud s={44} c={C.primaryL}/>
              </div>
              <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Connect Google Workspace</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Sign in with a Google Workspace admin account to access Vault.</div>
              <button onClick={signInGoogle} style={{display:'inline-flex',alignItems:'center',gap:10,
                padding:'11px 20px',borderRadius:6,border:`1px solid ${C.border}`,background:'white',
                fontSize:14,fontWeight:500,cursor:'pointer',transition:'all .15s',boxShadow:'0 1px 3px rgba(0,0,0,.08)'}}
                onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                onMouseLeave={e=>e.currentTarget.style.background='white'}>
                <GoogleIcon/> Sign in with Google
              </button>
            </Card>
          ) : loadingUsers ? (
            <Card className="fade-up" style={{textAlign:'center',padding:40}}>
              <Spinner s={28}/>
              <div style={{marginTop:12,fontSize:13,color:C.muted}}>Loading domain users...</div>
            </Card>
          ) : loadError ? (
            <Card className="fade-up" style={{textAlign:'center',padding:28}}>
              <div style={{display:'flex',justifyContent:'center',marginBottom:12,color:C.error}}><IcoError s={28}/></div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>Failed to load users</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:16}}>{loadError}</div>
              <Btn onClick={loadUsers}>Retry</Btn>
            </Card>
          ) : exporting ? (
            <Card className="scale-in" style={{textAlign:'center',padding:28}}>
              <div style={{display:'flex',justifyContent:'center',marginBottom:16}}>
                <div style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
                  <Ring pct={Math.min(elapsed * 1.5, 90)} size={88} stroke={6} color={C.primary}/>
                  <div style={{position:'absolute',textAlign:'center',transform:'rotate(0deg)'}}>
                    <IcoCloud s={22} c={C.primaryL}/>
                    <div style={{fontSize:10,color:C.muted,fontWeight:600}}>{elapsed}s</div>
                  </div>
                </div>
              </div>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>Exporting Gemini Data</div>
              <div style={{fontSize:12,color:C.muted}}>{exportStatus}</div>
            </Card>
          ) : (
            <UserSelectPanel users={users} selected={selected} toggleUser={toggleUser} toggleAll={toggleAll} startExport={startExport} onLogout={logoutGoogle}/>
          )}
        </div>
      )}

      {/* Upload ZIP Panel */}
      {tab === 'upload' && (
        <div className="fade-up"
          onDragOver={e=>{e.preventDefault();setDragOver(true)}}
          onDragLeave={()=>setDragOver(false)}
          onDrop={e=>{e.preventDefault();setDragOver(false);if(e.dataTransfer.files[0]) doUpload(e.dataTransfer.files[0])}}>
          <div onClick={()=>!uploading&&fileInputRef.current.click()} style={{
            border:`2px dashed ${dragOver?C.primary:C.border}`,borderRadius:10,padding:'48px 20px',
            textAlign:'center',cursor:uploading?'wait':'pointer',transition:'all .2s',
            background:dragOver?C.tint:'white'}}>
            <input ref={fileInputRef} type="file" accept=".zip" style={{display:'none'}}
              onChange={e=>{if(e.target.files[0]) doUpload(e.target.files[0])}}/>
            {uploading ? (
              <div><Spinner s={32}/><div style={{marginTop:12,fontSize:13,color:C.muted}}>Uploading...</div></div>
            ) : (
              <>
                <div style={{display:'flex',justifyContent:'center',marginBottom:12}}>
                  <IcoZip s={44} c={dragOver?C.primary:C.primaryL}/>
                </div>
                <div style={{fontSize:14,fontWeight:500,marginBottom:4}}><span style={{color:C.primary,fontWeight:600}}>Click to browse</span> or drag & drop</div>
                <div style={{fontSize:12,color:C.muted}}>Google Vault .zip export file</div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

const Step3 = ({uploadData, mappings, setMappings, selectedUsers, setSelectedUsers, onNext, onBack}) => {
  const csvRef = useRef(null);
  const [search, setSearch] = useState('');

  useEffect(() => {
    if (uploadData?.users) {
      const m = {};
      uploadData.users.forEach(u => { m[u.email] = u.email; });
      setMappings(m);
      setSelectedUsers(new Set(uploadData.users.map(u => u.email)));
    }
  }, [uploadData]);

  const downloadMappingCsv = () => {
    const rows = (uploadData?.users||[]).map(u => `"${u.email}","${mappings[u.email]||u.email}"`);
    const csv = 'Google Email,M365 Email\n' + rows.join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'user-mappings.csv'; a.click();
  };

  const uploadMappingCsv = (file) => {
    const reader = new FileReader();
    reader.onload = e => {
      const lines = e.target.result.split(/\r?\n/).slice(1); // skip header
      const m = {...mappings};
      for (const line of lines) {
        if (!line.trim()) continue;
        const cols = parseCsvLine(line);
        if (cols.length >= 2 && cols[0]) m[cols[0]] = cols[1];
      }
      setMappings(m);
      // After CSV upload: reset selection to all loaded users
      setSelectedUsers(new Set(Object.keys(m)));
    };
    reader.readAsText(file);
  };

  const users = uploadData?.users || [];
  const filtered = users.filter(u => {
    const q = search.toLowerCase();
    return u.email.toLowerCase().includes(q) || (mappings[u.email]||'').toLowerCase().includes(q);
  });

  const toggleUser = (email) => {
    setSelectedUsers(prev => {
      const n = new Set(prev);
      n.has(email) ? n.delete(email) : n.add(email);
      return n;
    });
  };
  const toggleAll = () => {
    if (selectedUsers.size === users.length) setSelectedUsers(new Set());
    else setSelectedUsers(new Set(users.map(u=>u.email)));
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}} className="fade-up">
      {/* Header row — static */}
      <div style={{flexShrink:0,marginBottom:12}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
          <div>
            <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:2}}>User Mappings</div>
            <div style={{fontSize:13,color:C.muted}}>Map each Google account to its Microsoft 365 email.</div>
          </div>
          <div style={{display:'flex',gap:6,flexShrink:0}}>
            <input ref={csvRef} type="file" accept=".csv" style={{display:'none'}}
              onChange={e=>{ if(e.target.files[0]) uploadMappingCsv(e.target.files[0]); e.target.value=''; }}/>
            <button onClick={()=>csvRef.current.click()} style={{fontSize:12,color:C.muted,background:'white',
              border:`1px solid ${C.border}`,borderRadius:5,padding:'5px 10px',cursor:'pointer',fontFamily:'inherit',fontWeight:500,
              display:'inline-flex',alignItems:'center',gap:4}}>
              <IcoUpload s={11}/> Upload CSV
            </button>
            <button onClick={downloadMappingCsv} style={{fontSize:12,color:C.primary,background:'white',

          </div>

        <SearchBar value={search} onChange={setSearch} placeholder="Search by email..."/>

              display:'flex',alignItems:'center',gap:10}}>
              <div style={{color:e.color,animation:'float 3s ease-in-out infinite',animationDelay:`${i*.4}s`}}>{e.icon}</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>

        </Card>

/* ══════════════════════════════════════ */
/* ═══            MAIN APP            ═══ */
/* ══════════════════════════════════════ */
function App() {
  // Hydrate state from localStorage on mount
  const [step, setStep] = useState(() => lsGet(LS_KEYS.step, 0));
  const [uploadData, setUploadData] = useState(() => lsGet(LS_KEYS.uploadData, null));
  const [config, setConfig] = useState(() => lsGet(LS_KEYS.config, {customerName:'', tenantId:'807d6772-847c-40e2-9bec-e2c930b3a42e'}));
  const [mappings, setMappings] = useState(() => lsGet(LS_KEYS.mappings, {}));
  const [selectedUsers, setSelectedUsers] = useState(() => {
    const saved = lsGet('gem_selected_users', null);
    return saved ? new Set(saved) : new Set();
  });
  const [options, setOptions] = useState({dryRun:false, skipFollowups:false, fromDate:'', toDate:''});
  const [googleAuthed, setGoogleAuthed] = useState(() => lsGet(LS_KEYS.authGoogle, {signedIn:false}).signedIn || false);
  const [msAuthed, setMsAuthed] = useState(() => lsGet(LS_KEYS.authMs, {signedIn:false}).signedIn || false);
  const [logs, setLogs] = useState(() => lsGet(LS_KEYS.logs, []));
  const [live, setLive] = useState(false);
  const [migDone, setMigDone] = useState(false);
  const [stats, setStats] = useState({users:0, pages:0, errors:0, flagged:0});
  const sseRef = useRef(null);

  // Re-verify auth on mount — check both Google and MS tokens.
  // If ANY stored auth is expired OR if there are stale logs but no active migration, clean up.
  useEffect(() => {
    Promise.all([
      fetch('/auth/google/status').then(r=>r.json()).then(d=> d.authenticated).catch(()=>false),
      fetch('/auth/status').then(r=>r.json()).then(d=> d.authenticated).catch(()=>false),
    ]).then(([gOk, mOk]) => {
      // If stored auth doesn't match server, clear everything
      const stale = (googleAuthed && !gOk) || (msAuthed && !mOk);
      // Also clear if we have logs/data but neither auth is valid on server
      const orphanedData = !gOk && !mOk && (logs.length > 0 || uploadData);
      if (stale || orphanedData) {
        lsClear();
        setGoogleAuthed(false); setMsAuthed(false);
        setStep(0); setUploadData(null); setMappings({});
        setSelectedUsers(new Set()); setLogs([]);
      } else {
        // Sync auth state with server
        if (!gOk && googleAuthed) setGoogleAuthed(false);
        if (!mOk && msAuthed) setMsAuthed(false);
      }
    });
  }, []);

  // Persist state to localStorage on change
  useEffect(() => { lsSet(LS_KEYS.step, step); }, [step]);
  useEffect(() => { lsSet(LS_KEYS.uploadData, uploadData); }, [uploadData]);
  useEffect(() => { lsSet(LS_KEYS.config, config); }, [config]);
  useEffect(() => { lsSet(LS_KEYS.mappings, mappings); }, [mappings]);
  useEffect(() => { lsSet(LS_KEYS.logs, logs.slice(-500)); }, [logs]);
  useEffect(() => { lsSet(LS_KEYS.authGoogle, {signedIn: googleAuthed}); }, [googleAuthed]);
  useEffect(() => { lsSet(LS_KEYS.authMs, {signedIn: msAuthed}); }, [msAuthed]);
  useEffect(() => { lsSet('gem_selected_users', [...selectedUsers]); }, [selectedUsers]);

  const addLog = (type, message) => {
    const ts = new Date().toTimeString().slice(0,8);
    setLogs(p => [...p, {type, message, ts}]);
  };

  const handleImportComplete = (data) => {
    setUploadData(data);
    addLog('success', `Imported — ${data.total_users} users, ${data.total_conversations} conversations`);
    setTimeout(() => setStep(1), 400);
  };

  const runMigration = async () => {
    setStep(4);
    const isDry = options.dryRun;
    addLog('info', isDry ? 'Starting dry run...' : 'Starting live migration...');
    setLive(true);
    const curStats = {users:0, pages:0, errors:0, flagged:0};

    // SSE
    if (sseRef.current) sseRef.current.close();
    sseRef.current = new EventSource('/api/migration-log');
    sseRef.current.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        if (d.type==='success' && d.message.includes('Page created')) curStats.pages++;
        if (d.type==='error') curStats.errors++;
        if (d.type==='info' && d.message.includes('Processing:')) curStats.users++;
        if (d.type==='warn' && d.message.includes('flagged')) {
          const m = d.message.match(/(\d+) conversations flagged/);
          if (m) curStats.flagged += parseInt(m[1]);
        }
        setStats({...curStats});
        addLog(d.type, d.message);
        if (d.type === 'done') {
          sseRef.current.close();
          setLive(false);
          setMigDone(true);
          setStep(5);
        }
      } catch(ex){}
    };
    sseRef.current.onerror = () => { if(sseRef.current){sseRef.current.close();setLive(false);} };

    // Filter mappings to only selected users
    const filteredMappings = {};
    const keysToMigrate = selectedUsers.size > 0 ? [...selectedUsers] : Object.keys(mappings);
    keysToMigrate.forEach(k => { if (mappings[k] !== undefined) filteredMappings[k] = mappings[k]; });

    const payload = {
      extract_path: uploadData.extract_path,
      tenant_id: config.tenantId,
      customer_name: config.customerName || 'Gemini',
      user_mappings: filteredMappings,
      dry_run: isDry,
      skip_followups: options.skipFollowups,
      from_date: options.fromDate || null,
      to_date: options.toDate || null,
    };

    try {
      const res = await fetch('/api/migrate', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if (!res.ok) { const d=await res.json(); addLog('error',d.error); setLive(false); }
    } catch(err) { addLog('error',err.message); setLive(false); }
  };

  const resetSession = () => {
    if (confirm('Reset all session data? This will clear auth, mappings, and logs.')) {
      lsClear();
      location.reload();
    }
  };

  const leftContent = [
    <Step1 onComplete={handleImportComplete} googleAuthed={googleAuthed} setGoogleAuthed={setGoogleAuthed}/>,
    <Step2 uploadData={uploadData} config={config} setConfig={setConfig}
      msAuthed={msAuthed} setMsAuthed={setMsAuthed}
      onNext={()=>{addLog('info',`M365 configured — customer: ${config.customerName}`);setStep(2)}}
      onBack={()=>setStep(0)}/>,
    <Step3 uploadData={uploadData} mappings={mappings} setMappings={setMappings}
      selectedUsers={selectedUsers} setSelectedUsers={setSelectedUsers}
      onNext={()=>{addLog('info',`User mappings ready — ${selectedUsers.size || Object.keys(mappings).length} users selected`);setStep(3)}}
      onBack={()=>setStep(1)}/>,
    <Step4 options={options} setOptions={setOptions} msAuthed={msAuthed}
      onRun={runMigration} onBack={()=>setStep(2)}/>,
    <Step5 stats={stats} done={false}/>,
    <Step5 stats={stats} done={true}/>,
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',fontFamily:'Poppins,system-ui,sans-serif'}}>
      {/* Header */}
      <div style={{background:C.primary,height:52,display:'flex',alignItems:'center',
        padding:'0 24px',gap:12,flexShrink:0,boxShadow:'0 2px 8px rgba(1,41,172,.2)'}}>
        <img src="/cloudfuze-logo.png" alt="CloudFuze" style={{height:32,objectFit:'contain',borderRadius:4}}/>
        <div style={{width:1,height:24,background:'rgba(255,255,255,.25)',margin:'0 4px'}}/>
        <div>
          <div style={{color:'white',fontSize:14,fontWeight:600,lineHeight:1.2}}>Gemini → Copilot Migration</div>
          <div style={{color:'rgba(255,255,255,.6)',fontSize:11}}>powered by CloudFuze</div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div className={live?'pulse-dot':''} style={{width:8,height:8,borderRadius:'50%',
              background:live?C.success:'rgba(255,255,255,.3)',transition:'background .3s'}}/>
            <span style={{color:'rgba(255,255,255,.7)',fontSize:12}}>{live?'Live':'Idle'}</span>
          </div>
          <button onClick={resetSession} title="Reset Session"
            style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'rgba(255,255,255,.6)',
              background:'transparent',border:'1px solid rgba(255,255,255,.2)',borderRadius:5,
              padding:'4px 9px',cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.1)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <IcoReset s={11}/> Reset
          </button>
        </div>
      </div>

      {/* Step Tracker */}
      <StepTracker active={Math.min(step,5)}/>

      {/* Split Panel */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',flex:1,overflow:'hidden'}}>
        {/* Left */}
        <div style={{display:'flex',flexDirection:'column',borderRight:`1px solid ${C.border}`,overflow:'hidden',background:'white'}}>
          <div style={{padding:'12px 24px',borderBottom:`1px solid ${C.bg}`,background:'white',flexShrink:0}}>
            <span style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>
              Step {Math.min(step+1,6)} of 6
            </span>
          </div>
          {/* Step3 manages its own internal scroll; others scroll via this container */}
          <div style={{flex:1,
            overflowY: step === 2 ? 'hidden' : 'auto',
            padding:'20px 24px',
            display: step === 2 ? 'flex' : 'block',
            flexDirection: step === 2 ? 'column' : undefined}}>
            {leftContent[Math.min(step, 5)]}
          </div>
        </div>

        {/* Right */}
        <div style={{display:'flex',flexDirection:'column',background:C.bg,overflow:'hidden'}}>
          <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,background:'white',
            display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:14,fontWeight:600}}>Migration Log</span>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div className={live?'pulse-dot':''} style={{width:8,height:8,borderRadius:'50%',
                background:live?C.success:'#d1d5db',transition:'background .3s'}}/>
              <span style={{fontSize:12,color:live?C.success:C.muted,fontWeight:500}}>
                {live?'Running':'Waiting'}
              </span>
            </div>
          </div>
          <LogFeed logs={logs} live={live}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
