                ?`Google Workspace connected! Both accounts ready. Choose a direction to get started.`
                :migDir==='claude-gemini'
                  ?`Google connected! You're all set for Claude → Gemini. Ready to upload your Claude ZIP?`
                  :`Google connected! Now connect Microsoft 365 to unlock Gemini↔Copilot migration — or choose Claude → Gemini which only needs Google.`;
              addAgentMsg('bot',msg,{quickReplies:msAuthed?['Gemini → Copilot','Copilot → Gemini','Claude → Gemini']:['Connect Microsoft 365','Claude → Gemini — Google only']});
            }
          }).catch(()=>{setGoogleAuthed(true);setChatGLoading(false);});
        },500);
      }
    });
  },[agentMode,msAuthed,migDir,addAgentMsg]);

  const handleChatSignInMs=useCallback(()=>{
    setChatMLoading(true);
    const url=`/auth/login${config.tenantId?`?tenant_id=${config.tenantId}`:''}`;
    window.open(url,'msauth','width=500,height=700,left=300,top=100');
    window.addEventListener('message',function h(e){
      if(e.data?.type==='auth-success'){
        window.removeEventListener('message',h);
        setTimeout(()=>{
          fetch('/api/ms/users').then(r=>r.json()).then(d=>{
            if(d.users)setMsUsers(d.users);
            setMsAuthed(true);setChatMLoading(false);
            if(agentMode==='guide'){
              const msg=googleAuthed
                ?`Microsoft 365 connected! Both accounts ready — choose your migration direction.`
                :`Microsoft 365 connected! Now connect Google Workspace to complete setup.`;
              addAgentMsg('bot',msg,{quickReplies:googleAuthed?['Gemini → Copilot','Copilot → Gemini']:['Connect Google Workspace']});
            }
          }).catch(()=>{setMsAuthed(true);setChatMLoading(false);});
        },500);
      }
    });
  },[config.tenantId,agentMode,googleAuthed,addAgentMsg]);

  const handleChatUpload=useCallback(async file=>{
    setChatUploading(true);
    const fd=new FormData();fd.append('vault_zip',file);
    try{
      const res=await fetch('/api/upload',{method:'POST',body:fd});
      const data=await res.json();
      if(res.ok)handleImportComplete(data);
    }catch{}
    setChatUploading(false);
  },[handleImportComplete]);

  // Build widgetProps for inline chat widgets — recreated when relevant state changes
  const widgetProps=useMemo(()=>({
    auth:{googleAuthed,msAuthed,onSignInGoogle:handleChatSignInGoogle,onSignInMs:handleChatSignInMs,googleUsers,msUsers,googleLoading:chatGLoading,msLoading:chatMLoading},
    upload:{onUpload:handleChatUpload,uploading:chatUploading,activeUpload:uploadData},
    options:{options,setOptions,config,setConfig,onStart:()=>runMigration()},
    authConnect:{googleAuthed,msAuthed,onSignInGoogle:handleChatSignInGoogle,onSignInMs:handleChatSignInMs},
    migrationActions:{
      onDryRun:()=>{
        if(migDir==='copilot-gemini'){setC2gOptions(p=>({...p,dryRun:true}));setTimeout(()=>runC2GMigration(false),200);}
        else if(migDir==='claude-gemini'){setCl2gOptions(p=>({...p,dryRun:true}));setTimeout(()=>runCL2GMigration(false),200);}
        else{setOptions(p=>({...p,dryRun:true}));setTimeout(()=>runMigration(false),200);}
      },
      onGoLive:()=>{
        if(migDir==='copilot-gemini')setTimeout(()=>runC2GMigration(true),200);
        else if(migDir==='claude-gemini')setTimeout(()=>runCL2GMigration(true),200);
        else{setOptions(p=>({...p,dryRun:false}));setTimeout(()=>runMigration(true),200);}
      }
    }
  }),[googleAuthed,msAuthed,handleChatSignInGoogle,handleChatSignInMs,googleUsers,msUsers,chatGLoading,chatMLoading,handleChatUpload,chatUploading,uploadData,options,config,migDir,runMigration,runC2GMigration,runCL2GMigration]);

  // ── Agent context: fires on load + every left-panel navigation ───────────────
  useEffect(()=>{
    if(!wsLoaded||agentMode==='running')return;
    const key=`${step}:${migDir}`;
    if(prevGuideKeyRef.current===key)return;
    // If chat history restored from localStorage, skip initial greeting to avoid duplicate
    if(prevGuideKeyRef.current===null&&agentMsgs.length>0){
      prevGuideKeyRef.current=key;
      return;
    }
    prevGuideKeyRef.current=key;
    setTimeout(()=>sendToAgentRef.current&&sendToAgentRef.current('__step_context__',true),400);
  },[wsLoaded,agentMode,step,migDir]);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',fontFamily:'Poppins,system-ui,sans-serif'}}>
      {/* Header */}
      <div style={{background:C.primary,height:52,display:'flex',alignItems:'center',padding:'0 24px',gap:12,flexShrink:0,boxShadow:'0 2px 8px rgba(1,41,172,.2)'}}>
        <img src="/assets/logo.png" alt="CloudFuze" style={{height:32,objectFit:'contain',cursor:'pointer'}} onClick={()=>window.location.reload()}/>
        <div style={{width:1,height:24,background:'rgba(255,255,255,.25)',margin:'0 4px'}}/>
        <div style={{color:'white',fontSize:15,fontWeight:700,letterSpacing:.2,cursor:'pointer'}} onClick={()=>window.location.reload()}>CloudFuze</div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div className={live?'pulse-dot':''} style={{width:8,height:8,borderRadius:'50%',background:live?'#4ade80':'rgba(255,255,255,.3)',transition:'background .3s'}}/>
            <span style={{color:'rgba(255,255,255,.7)',fontSize:12}}>{live?'Live':'Idle'}</span>
          </div>
          {appUser&&<div style={{display:'flex',alignItems:'center',gap:8,borderLeft:'1px solid rgba(255,255,255,.2)',paddingLeft:10}}>
            <div style={{width:26,height:26,borderRadius:'50%',background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'white'}}>{(appUser.name||appUser.email).slice(0,2).toUpperCase()}</div>
            <span style={{fontSize:11,color:'rgba(255,255,255,.8)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{appUser.name||appUser.email}</span>
            <button onClick={handleLogout} title="Sign out" style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'rgba(255,255,255,.6)',background:'transparent',border:'1px solid rgba(255,255,255,.2)',borderRadius:5,padding:'4px 8px',cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.1)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <IcoLogout s={11}/> Sign out
            </button>
            {showReset&&<button onClick={handleReset} title="Reset all migration data" style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'rgba(255,180,180,.9)',background:'transparent',border:'1px solid rgba(255,100,100,.3)',borderRadius:5,padding:'4px 8px',cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,0,0,.15)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <IcoReset s={11}/> Reset
            </button>}
          </div>}
        </div>
      </div>

      {/* Draggable Split Panel */}
      {(()=>{
        /* Steps panel */
        const stepsPanel=(side)=>(
          <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden',background:'white'}}>
            {/* Header: CloudFuze Migration */}
            <div style={{padding:'10px 16px',borderBottom:`1px solid ${C.border}`,background:'white',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div onMouseDown={e=>handlePanelGripMouseDown(side,e)} style={{cursor:'grab',color:C.muted,display:'flex',padding:'3px 4px',borderRadius:4,userSelect:'none',transition:'color .15s',flexShrink:0}} title="Drag to swap panels" onMouseEnter={e=>e.currentTarget.style.color=C.primary} onMouseLeave={e=>e.currentTarget.style.color=C.muted}><IcoGrip s={14}/></div>
                <div onClick={()=>setStep(0)} style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.primaryL})`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2a4 4 0 014 4v2H8V6a4 4 0 014-4z"/><rect x="4" y="8" width="16" height="12" rx="2"/><circle cx="9" cy="14" r="1.5" fill="white"/><circle cx="15" cy="14" r="1.5" fill="white"/></svg>
                </div>
                <div onClick={()=>setStep(0)} style={{cursor:'pointer'}}>
                  <div style={{fontSize:13,fontWeight:600,lineHeight:1.2,color:C.dark}}>CloudFuze Migration</div>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                {/* batchId saved in backend — hidden from UI */}
{/* change direction available from completion screen */}
              </div>
            </div>
            {/* Step content */}
            {(()=>{
              const isMapStep=(step===3&&migDir==='gemini-copilot')||(step===2&&migDir==='copilot-gemini');
              return(
                <div style={{flex:1,overflowY:isMapStep?'hidden':'auto',padding:'16px 20px',display:isMapStep?'flex':'block',flexDirection:isMapStep?'column':undefined,minHeight:0}}>
                  {/* Fallback: if step > 1 but no direction chosen, show connect */}
                  {step>1&&!migDir&&<Step0 googleAuthed={googleAuthed} setGoogleAuthed={setGoogleAuthed} msAuthed={msAuthed} setMsAuthed={setMsAuthed} googleUsers={googleUsers} setGoogleUsers={setGoogleUsers} msUsers={msUsers} setMsUsers={setMsUsers} tenantId={config.tenantId} onComplete={()=>setStep(1)}/>}
                  {/* Step 0: Connect */}
                  {step===0&&<Step0 googleAuthed={googleAuthed} setGoogleAuthed={setGoogleAuthed} msAuthed={msAuthed} setMsAuthed={setMsAuthed} googleUsers={googleUsers} setGoogleUsers={setGoogleUsers} msUsers={msUsers} setMsUsers={setMsUsers} tenantId={config.tenantId} onComplete={()=>setStep(1)}/>}
                  {/* Step 1: Direction picker */}
                  {step===1&&<StepDirection onSelect={dir=>{
                    setMigDir(dir);
                    const needsMs=dir==='gemini-copilot'||dir==='copilot-gemini';
                    const missingGoogle=!googleAuthed;
                    const missingMs=needsMs&&!msAuthed;
                    if(missingGoogle||missingMs){
                      // Missing required auth — go back to connect clouds, agent will explain
                      setStep(0);
                      const missing=[missingGoogle&&'Google Workspace',missingMs&&'Microsoft 365'].filter(Boolean).join(' and ');
                      setTimeout(()=>sendToAgentRef.current&&sendToAgentRef.current(`I selected ${dir} but I'm missing ${missing}`),300);
                    }else{
                      setStep(2);
                    }
                  }} onBack={()=>setStep(0)} googleAuthed={googleAuthed} msAuthed={msAuthed}/>}
                  {/* Gemini → Copilot steps */}
                  {step===2&&migDir==='gemini-copilot'&&<Step1 googleUsers={googleUsers} googleAuthed={googleAuthed} onComplete={handleImportComplete} onBack={()=>setStep(1)} showToast={showToast} uploadData={uploadData}/>}
                  {step===3&&migDir==='gemini-copilot'&&<Step2 uploadData={uploadData} msUsers={msUsers} mappings={mappings} setMappings={setMappings} selectedUsers={selectedUsers} setSelectedUsers={setSelectedUsers} onNext={()=>{addLog('info',`User mappings ready — ${selectedUsers.size||Object.keys(mappings).length} users selected`);setStep(4);}} onBack={()=>setStep(2)} showToast={showToast}/>}
                  {step===4&&migDir==='gemini-copilot'&&<Step3 options={options} setOptions={setOptions} config={config} setConfig={setConfig} msAuthed={msAuthed} googleAuthed={googleAuthed} onRun={retryMode?(()=>retryFailed(config.filePath||undefined)):runMigration} onBack={()=>{setRetryMode(false);setStep(retryMode?5:3)}} retryMode={retryMode}/>}
                  {(step===5||step===6)&&migDir==='gemini-copilot'&&<StepMigrate stats={stats} done={migDone} live={live} lastRunWasDry={lastRunWasDry} batchId={currentBatchId} onStartLive={()=>runMigration(true)} onRunAnother={runAnotherBatch} onRetry={retryFailed} retrying={retrying} hasUploadData={!!uploadData} onGoToConnect={handleGoToConnect} onRetryWithPath={handleRetryWithPath} onChangeDirection={handleChangeDirection} totalExpected={(()=>{if(!uploadData?.users)return 0;const sel=selectedUsers.size>0?[...selectedUsers]:Object.keys(mappings);const emails=sel.length>0?new Set(sel):new Set(uploadData.users.map(u=>u.email));return uploadData.users.filter(u=>emails.has(u.email)).reduce((s,u)=>s+(u.conversation_count||0),0)})()}/>}
                  {/* Copilot → Gemini steps */}
                  {step===2&&migDir==='copilot-gemini'&&<StepC2GMap msUsers={msUsers} googleUsers={googleUsers} c2gMappings={c2gMappings} setC2gMappings={setC2gMappings} c2gSelectedUsers={c2gSelectedUsers} setC2gSelectedUsers={setC2gSelectedUsers} onNext={()=>setStep(3)} onBack={()=>setStep(1)} showToast={showToast}/>}
                  {step===3&&migDir==='copilot-gemini'&&<StepC2GOptions c2gOptions={c2gOptions} setC2gOptions={setC2gOptions} c2gConfig={c2gConfig} setC2gConfig={setC2gConfig} googleAuthed={googleAuthed} msAuthed={msAuthed} onRun={runC2GMigration} onBack={()=>setStep(2)}/>}
                  {(step===4||step===5)&&migDir==='copilot-gemini'&&<StepC2GMigrate c2gStats={c2gStats} c2gDone={c2gDone} c2gBatchId={null} onRunAnother={()=>{setC2gDone(false);setC2gStats({users:0,files:0,errors:0});setC2gOptions(p=>({...p,dryRun:true}));setStep(2);}} onBack={()=>setStep(3)} onStart={runC2GMigration} c2gLive={c2gLive} onChangeDirection={handleChangeDirection} lastRunWasDry={c2gLastDry} onStartLive={()=>runC2GMigration(true)} c2gTotal={c2gTotal} folderName={c2gConfig?.folderName||'CopilotChats'}/>}
                  {/* Claude → Gemini steps */}
                  {step===2&&migDir==='claude-gemini'&&<StepCL2GUpload cl2gUploadData={cl2gUploadData} setCl2gUploadData={setCl2gUploadData} onNext={()=>setStep(3)} onBack={()=>setStep(1)} showToast={showToast} onUploadComplete={(n)=>{if(agentMode==='guide')addAgentMsg('bot',`ZIP uploaded — **${n} user${n!==1?'s':''}** found. Want me to auto-map them by email?`,{quickReplies:['Yes, auto-map','I\'ll map manually','What is auto-map?']});}}/>}
                  {step===3&&migDir==='claude-gemini'&&<StepCL2GMap cl2gUploadData={cl2gUploadData} googleUsers={googleUsers} cl2gMappings={cl2gMappings} setCl2gMappings={setCl2gMappings} cl2gSelectedUuids={cl2gSelectedUuids} setCl2gSelectedUuids={setCl2gSelectedUuids} onNext={()=>setStep(4)} onBack={()=>setStep(2)} showToast={showToast}/>}
                  {step===4&&migDir==='claude-gemini'&&<StepCL2GOptions cl2gOptions={cl2gOptions} setCl2gOptions={setCl2gOptions} cl2gConfig={cl2gConfig} setCl2gConfig={setCl2gConfig} googleAuthed={googleAuthed} onRun={runCL2GMigration} onBack={()=>setStep(3)}/>}
                  {(step===5||step===6)&&migDir==='claude-gemini'&&<StepCL2GMigrate cl2gStats={cl2gStats} cl2gDone={cl2gDone} onRunAnother={()=>{setCl2gDone(false);setCl2gStats({users:0,files:0,errors:0});setCl2gOptions(p=>({...p,dryRun:true}));setStep(2);}} onBack={()=>setStep(4)} onStart={runCL2GMigration} cl2gLive={cl2gLive} onChangeDirection={handleChangeDirection} lastRunWasDry={cl2gLastDry} onStartLive={()=>runCL2GMigration(true)} cl2gTotal={cl2gTotal} folderName={cl2gConfig.folderName||'ClaudeChats'}/>}
                  {/* Claude → Copilot steps */}
                  {step===2&&migDir==='claude-copilot'&&<StepCL2CUpload cl2cUploadData={cl2cUploadData} setCl2cUploadData={setCl2cUploadData} onNext={()=>setStep(3)} onBack={()=>setStep(1)} showToast={showToast}/>}
                  {step===3&&migDir==='claude-copilot'&&<StepCL2CMap cl2cUploadData={cl2cUploadData} msUsers={msUsers} cl2cMappings={cl2cMappings} setCl2cMappings={setCl2cMappings} cl2cSelectedUuids={cl2cSelectedUuids} setCl2cSelectedUuids={setCl2cSelectedUuids} onNext={()=>setStep(4)} onBack={()=>setStep(2)} showToast={showToast}/>}
                  {step===4&&migDir==='claude-copilot'&&<StepCL2COptions cl2cOptions={cl2cOptions} setCl2cOptions={setCl2cOptions} cl2cConfig={cl2cConfig} setCl2cConfig={setCl2cConfig} msAuthed={msAuthed} onRun={runCL2CMigration} onBack={()=>setStep(3)}/>}
                  {(step===5||step===6)&&migDir==='claude-copilot'&&<StepCL2CMigrate cl2cStats={cl2cStats} cl2cDone={cl2cDone} onRunAnother={()=>{setCl2cDone(false);setCl2cStats({users:0,files:0,errors:0});setCl2cOptions(p=>({...p,dryRun:true}));setStep(2);}} onBack={()=>setStep(4)} onStart={runCL2CMigration} cl2cLive={cl2cLive} onChangeDirection={handleChangeDirection} lastRunWasDry={cl2cLastDry} onStartLive={()=>runCL2CMigration(true)} cl2cTotal={cl2cTotal} folderName={cl2cConfig.folderName||'ClaudeChats'}/>}
                </div>
              );
            })()}
          </div>
        );
        /* Chat panel */
        const chatPanel=(side)=>(
          <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden',background:C.bg}}>
            <div style={{padding:'10px 16px',borderBottom:`1px solid ${C.border}`,background:'white',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div onMouseDown={e=>handlePanelGripMouseDown(side,e)} style={{cursor:'grab',color:C.muted,display:'flex',padding:'3px 4px',borderRadius:4,userSelect:'none',transition:'color .15s'}} title="Drag to swap panels" onMouseEnter={e=>e.currentTarget.style.color=C.primary} onMouseLeave={e=>e.currentTarget.style.color=C.muted}><IcoGrip s={14}/></div>
                <div onClick={()=>setStep(0)} style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.primaryL})`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2a4 4 0 014 4v2H8V6a4 4 0 014-4z"/><rect x="4" y="8" width="16" height="12" rx="2"/><circle cx="9" cy="14" r="1.5" fill="white"/><circle cx="15" cy="14" r="1.5" fill="white"/></svg>
                </div>
                <div onClick={()=>setStep(0)} style={{cursor:'pointer'}}>
                  <div style={{fontSize:13,fontWeight:600,lineHeight:1.2,color:C.dark}}>Migration Agent</div>
                  {migDir&&<div style={{display:'flex',alignItems:'center',gap:4,marginTop:1}}>
                    {migDir==='gemini-copilot'&&<><GoogleIcon/><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg><MsIcon/><span style={{fontSize:10,color:C.muted,marginLeft:2}}>Google → Microsoft</span></>}
                    {migDir==='copilot-gemini'&&<><MsIcon/><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg><GoogleIcon/><span style={{fontSize:10,color:C.muted,marginLeft:2}}>Microsoft → Google</span></>}
                    {migDir==='claude-gemini'&&<><ClaudeIcon/><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg><GoogleIcon/><span style={{fontSize:10,color:C.muted,marginLeft:2}}>Claude → Gemini</span></>}
                    {migDir==='claude-copilot'&&<><ClaudeIcon/><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg><MsIcon/><span style={{fontSize:10,color:C.muted,marginLeft:2}}>Claude → Copilot</span></>}
                  </div>}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div className={live?'pulse-dot':''} style={{width:8,height:8,borderRadius:'50%',background:live?'#4ade80':'#d1d5db',transition:'background .3s'}}/>
                <span style={{fontSize:12,color:live?'#16a34a':C.muted,fontWeight:500}}>{live?'Migrating':'Ready'}</span>
              </div>
            </div>
            <AgentChat msgs={agentMsgs} typing={agentTyping} input={agentInput} onInput={setAgentInput} onSend={()=>sendToAgent()} onLogLineClick={handleLogLineClick} onQuickReply={handleAgentQuickReply} widgetProps={widgetProps} onShowReports={()=>setShowReports(true)} onClearChat={()=>setAgentMsgs([])}/>
          </div>
        );
        return(
          <div ref={containerRef} style={{display:'flex',flex:1,overflow:'hidden'}}>
            <div style={{width:`${splitPct}%`,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
              {panelSwapped?chatPanel('left'):stepsPanel('left')}
            </div>
            <div ref={dividerRef} className="drag-divider" onMouseDown={handleDividerMouseDown}/>
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              {panelSwapped?stepsPanel('right'):chatPanel('right')}
            </div>
          </div>
        );
      })()}

      {/* Reports side panel */}
      {showReports&&<ReportsPanel onClose={()=>setShowReports(false)} refreshKey={reportRefreshKey} liveStats={stats} liveBatchId={currentBatchId} isLive={live}/>}

      {/* Toast notification */}
      {toast&&<Toast message={toast.message} type={toast.type} onHide={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
