              {live&&<div style={{position:'absolute',top:-3,width:9,height:9,borderRadius:'50%',background:'white',border:`2px solid ${C.primary}`,animation:'connectorPulse .8s infinite',left:'50%',transform:'translateX(-50%)',boxShadow:`0 0 6px ${C.primary}`}}/>}
            </div>
            <div style={{fontSize:10,color:C.muted,display:'flex',alignItems:'center',gap:3,marginTop:3}}><IcoUser s={10}/>{userCount>0?`${userCount} users`:'No data yet'}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,flexShrink:0}}>
            <div style={{width:46,height:46,borderRadius:12,border:`2px solid ${msAuthed?'#22c55e':C.border}`,background:msAuthed?'#f0fdf4':'white',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .4s',boxShadow:msAuthed?'0 0 0 3px rgba(34,197,94,.12)':'none'}}><MsIcon/></div>
            <div style={{fontSize:10,color:C.muted,fontWeight:600}}>Microsoft</div>
            <div style={{fontSize:9,color:msAuthed?'#16a34a':'#ef4444',fontWeight:600}}>{msAuthed?'✓ Connected':'Not connected'}</div>
          </div>
        </div>
        {(live||migDone)&&(
          <div style={{marginTop:12}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.muted,marginBottom:3}}>
              <span>{migDone?'Complete':'In progress...'}</span>
              <span>{stats.pages} / {totalConvs||'?'} pages</span>
            </div>
            <div style={{height:4,background:C.border,borderRadius:99,overflow:'hidden'}}>
              <div style={{height:'100%',background:stats.errors>0?C.error:C.primary,borderRadius:99,transition:'width .6s',width:`${ringPct}%`}}/>
            </div>
          </div>
        )}
      </div>

      {/* Phase cards */}
      <div style={{padding:'14px 16px 10px',flexShrink:0}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>Migration Phases</div>
        <div style={{borderRadius:10,overflow:'hidden',border:`1px solid ${C.border}`,background:'white'}}>
          {PHASE_LABELS.map((label,i)=>{
            const done=(migDone&&i<=5)||(i<step);
            const cur=i===step&&!(migDone&&i>=4);
            return(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',background:cur?C.tint:'white',borderBottom:i<5?`1px solid ${C.border}`:'none',borderLeft:`3px solid ${done?C.success:cur?C.primary:'transparent'}`,transition:'all .3s'}}>
                <div style={{width:20,height:20,borderRadius:'50%',background:done?C.success:cur?C.primary:'#e5e7eb',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .3s'}}>
                  {done?<Check s={10} c="white"/>:<span style={{fontSize:9,fontWeight:700,color:cur?'white':'#9ca3af'}}>{i+1}</span>}
                </div>
                <span style={{fontSize:12,fontWeight:cur?600:400,color:cur?C.primary:done?C.dark:'#9ca3af',flex:1}}>{label}</span>
                {cur&&!done&&<div className="pulse-dot" style={{width:6,height:6,borderRadius:'50%',background:C.primary,flexShrink:0}}/>}
                {done&&<span style={{fontSize:10,color:'#22c55e',flexShrink:0}}>✓</span>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Loaded data summary */}
      {uploadData&&!live&&!migDone&&(
        <div style={{padding:'0 16px 12px',flexShrink:0}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>Loaded Data</div>
          <div style={{background:'white',border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <IcoZip s={18} c={C.primary}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{uploadData.original_name||uploadData.id}</div>
                <div style={{fontSize:11,color:C.muted}}>{uploadData.total_users} users · {uploadData.total_conversations} conversations</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
              <div style={{padding:'6px 0',background:C.bg,borderRadius:6,textAlign:'center'}}>
                <div style={{fontSize:16,fontWeight:700,color:C.success}}>{mappedCount}</div>
                <div style={{fontSize:10,color:C.muted}}>Mapped</div>
              </div>
              <div style={{padding:'6px 0',background:unmappedCount>0?'#FEF2F2':C.bg,borderRadius:6,textAlign:'center'}}>
                <div style={{fontSize:16,fontWeight:700,color:unmappedCount>0?C.error:C.muted}}>{unmappedCount}</div>
                <div style={{fontSize:10,color:C.muted}}>Unmapped</div>
              </div>
            </div>
            <button onClick={()=>onSetLeftMode('mapping')} style={{width:'100%',padding:'6px 0',borderRadius:6,border:`1px solid ${C.primary}`,background:'white',color:C.primary,fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}>Review Mapping →</button>
          </div>
        </div>
      )}

      {/* Live stats */}
      {(live||migDone)&&(
        <div style={{padding:'0 16px 16px',flexShrink:0}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>{live?'Live Stats':'Final Results'}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[{l:'Users',v:stats.users,c:C.primary},{l:'Pages',v:stats.pages,c:C.success},{l:'Errors',v:stats.errors,c:stats.errors>0?C.error:C.muted},{l:'Flagged',v:stats.flagged,c:C.primaryL}].map((s,i)=>(
              <div key={i} style={{background:'white',borderRadius:8,padding:'10px 12px',border:`1px solid ${C.border}`,borderLeft:`3px solid ${s.c}`,textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div>
                <div style={{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:.3,marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
          {migDone&&<div style={{marginTop:8,padding:'8px 12px',background:lastRunWasDry?'#FEF3C7':'#DCFCE7',borderRadius:8,textAlign:'center',fontSize:12,fontWeight:600,color:lastRunWasDry?'#92400E':'#166534'}}>{lastRunWasDry?'Dry run complete — no changes made':'Migration complete!'}</div>}
        </div>
      )}
    </div>
  );
};

/* Agent chat panel */
const AgentChat=({msgs,typing,input,onInput,onSend,onLogLineClick,onQuickReply,widgetProps={},onShowReports,onClearChat})=>{
  const endRef=useRef(null);
  const [plusOpen,setPlusOpen]=useState(false);
  const plusRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs,typing]);
  useEffect(()=>{
    if(!plusOpen)return;
    const h=(e)=>{if(plusRef.current&&!plusRef.current.contains(e.target))setPlusOpen(false)};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[plusOpen]);
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:C.bg}}>
      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:10}}>
        {msgs.length===0&&!typing&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:C.muted,textAlign:'center',padding:'40px 20px',gap:12}}>
            <BotAv s={52}/>
            <div style={{fontSize:14,fontWeight:500,color:C.dark}}>Migration Agent</div>
            <div style={{fontSize:12,color:C.muted,maxWidth:240}}>Your AI guide for migrating Google Gemini conversations to Microsoft Copilot. Ask me anything or let me guide you through the process.</div>
          </div>
        )}
        {msgs.filter(m=>!m.shellBlock).map(m=>{
          if(m.role==='user')return<UserMsg key={m.id}>{m.content}</UserMsg>;
          return(
            <div key={m.id}>
              <BotMsg quickReplies={m.quickReplies} onQuickReply={onQuickReply} statusCard={m.statusCard} chips={m.chips}>{m.content}</BotMsg>
              {m.widget&&<ChatWidget type={m.widget.type} widgetProps={widgetProps}/>}
            </div>
          );
        })}
        {typing&&<TypingDots/>}
        <div ref={endRef}/>
      </div>
      {/* Input */}
      <div style={{padding:'12px 16px',borderTop:`1px solid ${C.border}`,background:'white',flexShrink:0}}>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <div ref={plusRef} style={{position:'relative',flexShrink:0}}>
            <button onClick={()=>setPlusOpen(p=>!p)} title="More options" style={{width:36,height:36,borderRadius:8,border:`1px solid ${C.border}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,color:C.muted,fontFamily:'inherit',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.background=C.tint;e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.color=C.primary}} onMouseLeave={e=>{e.currentTarget.style.background='white';e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted}}>+</button>
            {plusOpen&&(
              <div style={{position:'absolute',bottom:'calc(100% + 6px)',left:0,background:'white',border:`1px solid ${C.border}`,borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,.1)',minWidth:160,zIndex:200,overflow:'hidden'}}>
                <button onClick={()=>{setPlusOpen(false);onShowReports&&onShowReports();}} style={{width:'100%',padding:'10px 14px',border:'none',background:'white',cursor:'pointer',fontSize:12,fontFamily:'inherit',color:C.dark,display:'flex',alignItems:'center',gap:8,textAlign:'left',transition:'background .12s'}} onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}>
                  <IcoReport s={13}/> View Reports
                </button>
                <button onClick={()=>{setPlusOpen(false);onClearChat&&onClearChat();}} style={{width:'100%',padding:'10px 14px',border:'none',background:'white',cursor:'pointer',fontSize:12,fontFamily:'inherit',color:'#ef4444',display:'flex',alignItems:'center',gap:8,textAlign:'left',transition:'background .12s'}} onMouseEnter={e=>e.currentTarget.style.background='#fff5f5'} onMouseLeave={e=>e.currentTarget.style.background='white'}>
                  <IcoReset s={13}/> Clear Chat
                </button>
              </div>
            )}
          </div>
          <input value={input} onChange={e=>onInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&onSend()} placeholder="Ask me anything or type a command..." style={{flex:1,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',fontSize:13,outline:'none',fontFamily:'inherit',transition:'border .2s'}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
          <button onClick={onSend} disabled={!input.trim()} style={{padding:'10px 18px',borderRadius:8,border:'none',background:C.primary,color:'white',fontSize:13,fontWeight:600,cursor:input.trim()?'pointer':'not-allowed',opacity:input.trim()?1:.5,fontFamily:'inherit',transition:'all .15s',flexShrink:0}} onMouseEnter={e=>{if(input.trim())e.currentTarget.style.background=C.primaryH}} onMouseLeave={e=>e.currentTarget.style.background=C.primary}>Send</button>
        </div>
      </div>
    </div>
  );
};

/* ═══  COPILOT→GEMINI: USER MAPPING STEP  ═══ */
/* ═══════════════════════════════════════════ */
const StepC2GMap=({msUsers,googleUsers,c2gMappings,setC2gMappings,c2gSelectedUsers,setC2gSelectedUsers,onNext,onBack,showToast})=>{
  const csvRef=useRef(null);
  const [search,setSearch]=useState('');
  const [csvUploading,setCsvUploading]=useState(false);
  const [csvEmails,setCsvEmails]=useState(null);
  const csvEmailsRef=useRef(null);

  const persistMappings=(m,csv)=>{
    fetch('/api/c2g/user-mappings',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mappings:m,csvEmails:csv??null})}).catch(()=>{});
  };

  const runAutoMap=(currentMappings,currentCsv)=>{
    if(currentCsv!==null)return; // don't overwrite CSV-sourced mappings
    if(!msUsers.length)return;
    const byLocal={};
    googleUsers.forEach(u=>{const em=(u.email||'').toLowerCase();const loc=em.split('@')[0];if(loc)byLocal[loc]=em});
    const m={...currentMappings};let changed=false;
    msUsers.forEach(u=>{
      const em=(u.mail||u.userPrincipalName||'').toLowerCase();
      if(!m[em]){const loc=em.split('@')[0];m[em]=byLocal[loc]||'';changed=true;}
    });
    if(changed)setC2gMappings(m);
    if(c2gSelectedUsers.size===0)setC2gSelectedUsers(new Set(msUsers.map(u=>(u.mail||u.userPrincipalName||'').toLowerCase())));
  };

  // On mount: load from DB first, then auto-map only if no CSV saved
  useEffect(()=>{
    fetch('/api/c2g/user-mappings').then(r=>r.ok?r.json():null).then(doc=>{
      if(doc?.csvEmails&&doc.csvEmails.length>0){
        setCsvEmails(doc.csvEmails);
        csvEmailsRef.current=doc.csvEmails;
        if(doc.mappings){
          const merged={...c2gMappings,...doc.mappings};
          setC2gMappings(merged);
        }
        setC2gSelectedUsers(new Set(doc.csvEmails.filter(e=>doc.mappings?.[e])));
      } else {
        csvEmailsRef.current=null;
        runAutoMap(c2gMappings,null);
      }
    }).catch(()=>{ csvEmailsRef.current=null; runAutoMap(c2gMappings,null); });
  },[]);

  const handleMappingChange=(email,val)=>{
    const m={...c2gMappings,[email]:val};
    setC2gMappings(m);
    persistMappings(m,csvEmailsRef.current);
  };

  const downloadCsv=()=>{
    const src=csvEmails||msUsers.map(u=>(u.mail||u.userPrincipalName||'').toLowerCase());
    const rows=src.map(e=>`"${e}","${c2gMappings[e]||''}"`);
    const csv='M365 Email,Google Email\n'+rows.join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='c2g-user-mappings.csv';a.click();
    showToast('CSV downloaded.');
  };

  const uploadCsv=file=>{
    setCsvUploading(true);
    const r=new FileReader();
    r.onload=e=>{
      const lines=e.target.result.split(/\r?\n/).slice(1);
      const m={};const csvKeys=[];
      for(const l of lines){
        if(!l.trim())continue;
        const c=parseCsvLine(l);
        if(c.length>=2&&c[0]){
          const src=c[0].trim().toLowerCase();
          const dst=c[1].trim();
          m[src]=dst;
          csvKeys.push(src);
        }
      }
      const merged={...c2gMappings,...m};
      setC2gMappings(merged);
      setC2gSelectedUsers(new Set(csvKeys.filter(k=>m[k])));
      setCsvEmails(csvKeys);
      csvEmailsRef.current=csvKeys;
      setCsvUploading(false);
      persistMappings(m,csvKeys);
      showToast(`CSV uploaded — ${csvKeys.length} user(s).`);
    };
    r.onerror=()=>{setCsvUploading(false);showToast('Failed to read CSV file.','error')};
    r.readAsText(file);
  };

  const clearCsv=()=>{
    setCsvEmails(null);
    csvEmailsRef.current=null;
    fetch('/api/c2g/user-mappings',{method:'DELETE'}).catch(()=>{});
    const byLocal={};
    googleUsers.forEach(u=>{const em=(u.email||'').toLowerCase();const loc=em.split('@')[0];if(loc)byLocal[loc]=em});
    const m={};
    msUsers.forEach(u=>{const em=(u.mail||u.userPrincipalName||'').toLowerCase();m[em]=byLocal[em.split('@')[0]]||''});
    setC2gMappings(m);
    setC2gSelectedUsers(new Set(msUsers.map(u=>(u.mail||u.userPrincipalName||'').toLowerCase())));
    showToast('CSV cleared — restored cloud auto-mapping.');
  };

  const displayUsers=csvEmails?msUsers.filter(u=>{const em=(u.mail||u.userPrincipalName||'').toLowerCase();return csvEmails.includes(em)}):msUsers;
  const filtered=displayUsers.filter(u=>{const em=(u.mail||u.userPrincipalName||'').toLowerCase();const q=search.toLowerCase();return em.includes(q)||(c2gMappings[em]||'').toLowerCase().includes(q)}).sort((a,b)=>{const ea=(a.mail||a.userPrincipalName||'').toLowerCase(),eb=(b.mail||b.userPrincipalName||'').toLowerCase();const ma=!!c2gMappings[ea],mb=!!c2gMappings[eb];if(ma!==mb)return ma?-1:1;return ea.localeCompare(eb)});
  const toggleUser=e=>setC2gSelectedUsers(p=>{const n=new Set(p);n.has(e)?n.delete(e):n.add(e);return n});
  const autoMapped=displayUsers.filter(u=>!!c2gMappings[u.mail||u.userPrincipalName||'']).length;
  const unmapped=displayUsers.filter(u=>!c2gMappings[u.mail||u.userPrincipalName||'']).length;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}} className="fade-up">
      <div style={{flexShrink:0,marginBottom:12}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
          <div>
            <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:2}}>User Mapping</div>
            <div style={{fontSize:13,color:C.muted}}>
              {csvEmails?<span style={{color:C.primary,fontWeight:500}}>{csvEmails.length} users from CSV</span>
              :<>Map M365 accounts to Google emails.{' '}
              {autoMapped>0&&<span style={{color:C.success,fontWeight:500}}>{autoMapped} auto-mapped</span>}
              {unmapped>0&&<span style={{color:C.error}}>{autoMapped>0?' · ':''}{unmapped} need mapping</span>}</>}
            </div>
          </div>
          <div style={{display:'flex',gap:4,flexShrink:0}}>
            <input ref={csvRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])uploadCsv(e.target.files[0]);e.target.value=''}}/>
            <button onClick={()=>csvRef.current.click()} disabled={csvUploading} title="Upload CSV" style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              {csvUploading?<Spinner s={12}/>:<IcoUpload s={13} c={C.muted}/>}
            </button>
            <button onClick={downloadCsv} title="Download CSV" style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.primary}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <IcoDownload s={13} c={C.primary}/>
            </button>
            {csvEmails&&<button onClick={clearCsv} title="Clear CSV — restore cloud mapping" style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.error}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} onMouseEnter={e=>e.currentTarget.style.background='#FEF2F2'} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <IcoTrash s={13}/>
            </button>}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:12,color:C.muted}}><span style={{fontWeight:600,color:C.primary}}>{c2gSelectedUsers.size}</span> of {displayUsers.length} selected</div>
        </div>
        <SearchBar value={search} onChange={setSearch} placeholder="Search by email..."/>
      </div>
      <div style={{flex:1,overflowY:'auto',minHeight:0,background:'white',border:`1px solid ${C.border}`,borderRadius:10}}>
        <div style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr',padding:'9px 14px',background:C.bg,borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.4,position:'sticky',top:0,zIndex:1}}>
          <input type="checkbox" checked={c2gSelectedUsers.size>0&&c2gSelectedUsers.size===displayUsers.length} onChange={()=>{if(c2gSelectedUsers.size===displayUsers.length)setC2gSelectedUsers(new Set());else setC2gSelectedUsers(new Set(displayUsers.map(u=>(u.mail||u.userPrincipalName||'').toLowerCase())))}} style={{accentColor:C.primary,width:15,height:15,cursor:'pointer'}}/><div>M365 Email</div><div>Google Email</div>
        </div>
        {filtered.map((u,i)=>{
          const em=(u.mail||u.userPrincipalName||'').toLowerCase();
          const mapped=!!c2gMappings[em];
          return(
            <div key={em} style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr',alignItems:'center',padding:'9px 14px',borderBottom:i<filtered.length-1?`1px solid ${C.bg}`:'none',background:c2gSelectedUsers.has(em)?C.tint:'white',transition:'background .15s',cursor:'pointer'}} onClick={()=>toggleUser(em)}>
              <input type="checkbox" checked={c2gSelectedUsers.has(em)} onChange={()=>toggleUser(em)} style={{accentColor:C.primary,width:15,height:15}} onClick={e=>e.stopPropagation()}/>
              <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}><Avatar name={u.displayName||em} email={em} size={26}/><span style={{fontSize:12,color:C.muted,fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{em}</span></div>
              <input value={c2gMappings[em]||''} onChange={e=>{e.stopPropagation();handleMappingChange(em,e.target.value)}}
                placeholder="Enter Google email..."
                style={{border:`1px solid ${mapped?C.primary+'50':C.border}`,borderRadius:5,padding:'5px 9px',fontSize:12,fontFamily:'inherit',outline:'none',marginRight:8,width:'100%',background:mapped?C.tint:'white'}}
                onFocus={e=>{e.stopPropagation();e.target.style.borderColor=C.primary}} onBlur={e=>e.target.style.borderColor=mapped?C.primary+'50':C.border} onClick={e=>e.stopPropagation()}/>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:'center',padding:'24px',fontSize:13,color:C.muted}}>No users found.</div>}
      </div>
      <div style={{flexShrink:0,display:'flex',gap:10,paddingTop:12}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={onNext} style={{flex:1,justifyContent:'center'}}>Continue →</Btn>
      </div>
    </div>
  );
};

const StepC2GOptions=({c2gOptions,setC2gOptions,c2gConfig,setC2gConfig,googleAuthed,msAuthed,onRun,onBack})=>{
  const Chk=({label,checked,onChange,hint})=>(
    <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer',padding:'8px 0'}}>
      <input type="checkbox" checked={checked} onChange={onChange} style={{accentColor:C.primary,width:16,height:16}}/>
      <div><span>{label}</span>{hint&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>{hint}</div>}</div>
    </label>
  );
  return(
    <div className="fade-up">
      <div style={{marginBottom:20}}>
        <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Migration Options</div>
        <div style={{fontSize:13,color:C.muted}}>Configure and start the Copilot → Gemini migration.</div>
      </div>

      <Field label="Folder Name *">
        <input type="text" value={c2gConfig.folderName||''} onChange={e=>setC2gConfig(p=>({...p,folderName:e.target.value}))} placeholder="CopilotChats" style={{width:'100%',border:`2px solid ${C.border}`,borderRadius:6,padding:'9px 12px',fontSize:13,outline:'none',transition:'border .2s',boxSizing:'border-box'}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
      </Field>

      <Card style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:4,color:C.dark}}>Behavior</div>
        <Chk label="Dry run (preview only — no files uploaded)" hint="Shows what would be migrated without uploading to Google Drive" checked={c2gOptions.dryRun} onChange={e=>setC2gOptions(p=>({...p,dryRun:e.target.checked}))}/>
      </Card>

      <Card style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:600,color:C.dark}}>Date Range</div>
          <span style={{fontSize:11,color:C.primaryL,fontStyle:'italic'}}>Optional — blank = migrate all data</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Field label="From Date"><Input type="date" value={c2gOptions.fromDate||''} onChange={e=>setC2gOptions(p=>({...p,fromDate:e.target.value}))}/></Field>
          <Field label="To Date"><Input type="date" value={c2gOptions.toDate||''} onChange={e=>setC2gOptions(p=>({...p,toDate:e.target.value}))}/></Field>
        </div>
        {(c2gOptions.fromDate||c2gOptions.toDate)&&<TextBtn onClick={()=>setC2gOptions(p=>({...p,fromDate:'',toDate:''}))} style={{fontSize:11,marginTop:2,color:C.muted}}>Clear date range</TextBtn>}
      </Card>

      {!c2gOptions.dryRun&&!googleAuthed&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:8,fontSize:13,color:'#991B1B',marginBottom:16}}>
          <IcoWarn s={15}/>Live migration requires Google sign-in (Step 1 — Connect Clouds).
        </div>
      )}

      <div style={{display:'flex',gap:10}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={()=>onRun()} disabled={!c2gConfig.folderName||(!c2gOptions.dryRun&&!googleAuthed)} style={{flex:1,justifyContent:'center'}}>
          {c2gOptions.dryRun?<><IcoSearch s={14}/>Start Dry Run</>:<><IcoRocket s={14}/>Start Migration</>}
        </Btn>
      </div>
    </div>
  );
};

    <div className="fade-up">
      {!c2gDone&&!c2gLive&&(

            <div style={{fontSize:13,color:C.muted}}>Copilot conversations will be uploaded to Google Drive as DOCX files.</div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <Btn variant="ghost" onClick={onBack}>← Back</Btn>
            <Btn onClick={onStart} style={{flex:1,justifyContent:'center'}}>Start Migration →</Btn>

      {!c2gDone&&c2gLive&&(
        <>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Migration in Progress</div>
            <div style={{fontSize:13,color:C.muted}}>Copilot conversations are being migrated to Google Drive. Watch the log →</div>

          <div style={{display:'flex',justifyContent:'center',padding:'28px 0 20px'}}>

          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:16}}>
            {[{label:'Users',val:c2gStats.users,c:'#0129AC'},{label:'Files Uploaded',val:c2gStats.files,c:'#20CC83'},{label:'Errors',val:c2gStats.errors,c:'#FF1F1F'}].map((e,i)=>(
              <div key={i} style={{background:'white',borderRadius:10,padding:'12px 14px',border:`1px solid ${C.border}`,borderLeft:`3px solid ${e.c}`,textAlign:'center'}}>
                <div style={{fontSize:22,fontWeight:700,color:e.c}}>{e.val}</div>

      {c2gDone&&(
        <>
          <div style={{marginBottom:20,textAlign:'center'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:8,color:C.success}}><IcoDone s={48}/></div>
            <div style={{fontSize:18,fontWeight:700,color:C.dark,marginBottom:4}}>{lastRunWasDry?'Dry Run Complete!':'Migration Complete!'}</div>
            <div style={{fontSize:13,color:C.muted}}>{lastRunWasDry?'Preview finished — no files were uploaded.':'Copilot conversations have been uploaded to Google Drive.'}</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:20}}>
            {[{label:'Users Processed',val:c2gStats.users,c:'#0129AC'},{label:lastRunWasDry?'Files (preview)':'Files Uploaded',val:c2gStats.files,c:'#20CC83'},{label:'Errors',val:c2gStats.errors,c:'#FF1F1F'}].map((e,i)=>(
              <div key={i} style={{background:'white',borderRadius:10,padding:'12px 14px',border:`1px solid ${C.border}`,borderLeft:`3px solid ${e.c}`,textAlign:'center'}}>
                <div style={{fontSize:22,fontWeight:700,color:e.c}}>{e.val}</div>
                <div style={{fontSize:11,color:C.muted,textTransform:'uppercase',letterSpacing:.3}}>{e.label}</div>

          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>

            <Btn variant="ghost" onClick={onBack} style={{flex:'1 1 100px',justifyContent:'center'}}>← Options</Btn>
            <Btn variant="ghost" onClick={()=>onRunAnother&&onRunAnother()} style={{flex:'1 1 120px',justifyContent:'center'}}>New Migration</Btn>
            {onChangeDirection&&<Btn variant="ghost" onClick={onChangeDirection} style={{flex:'1 1 120px',justifyContent:'center'}}>⇄ Change Direction</Btn>}
          </div>
        </>
      )}

};

/* ═══  CLAUDE→GEMINI: UPLOAD ZIP STEP    ═══ */
/* ══════════════════════════════════════════ */
const StepCL2GUpload=({cl2gUploadData,setCl2gUploadData,onNext,onBack,showToast})=>{
  const fileRef=useRef(null);
  const menuRef=useRef(null);
  const [uploading,setUploading]=useState(false);
  const [dragOver,setDragOver]=useState(false);
  const [uploads,setUploads]=useState([]);
  const [showMenu,setShowMenu]=useState(false);

  const loadUploads=async()=>{
    try{
      const r=await fetch('/api/cl2g/uploads');const d=await r.json();
      const list=Array.isArray(d)?d:[];
      setUploads(list);
      // Bug 1 fix: auto-select the most recent upload if nothing is selected yet
      if(!cl2gUploadData&&list.length>0){
        const u=list[0];
        setCl2gUploadData({uploadId:u._id,users:u.users||[],totalConversations:u.totalConversations||0,totalMemories:u.totalMemories||0,totalProjects:u.totalProjects||0,fileName:u.fileName});
      }
    }catch{}
  };
  useEffect(()=>{loadUploads()},[]);

  // Close menu when clicking outside
  useEffect(()=>{
    const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setShowMenu(false)};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  const uploadZip=async(file)=>{
    if(!file||!file.name.toLowerCase().endsWith('.zip')){showToast('Only ZIP files accepted.','error');return}
    setUploading(true);
    const fd=new FormData();fd.append('file',file);
    try{
      const r=await fetch('/api/cl2g/upload',{method:'POST',body:fd});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||'Upload failed');
      setCl2gUploadData({uploadId:d.uploadId,users:d.users||[],totalConversations:d.totalConversations||0,totalMemories:d.totalMemories||0,totalProjects:d.totalProjects||0,fileName:file.name});
      await loadUploads();
      showToast(`Uploaded — ${d.totalConversations} conversations, ${d.users?.length||0} users found.`);
    }catch(e){showToast(e.message,'error')}
    finally{setUploading(false)}
  };

  const deleteUpload=async(id,e)=>{
    e.stopPropagation();
    try{
      await fetch(`/api/cl2g/uploads/${id}`,{method:'DELETE'});
      if(cl2gUploadData?.uploadId===id)setCl2gUploadData(null);
      setUploads(p=>p.filter(u=>u._id!==id));
      showToast('Upload deleted.');
    }catch(err){showToast(err.message,'error')}
  };

  const selectUpload=doc=>{
    setCl2gUploadData({uploadId:doc._id,users:doc.users||[],totalConversations:doc.totalConversations||0,totalMemories:doc.totalMemories||0,totalProjects:doc.totalProjects||0,fileName:doc.fileName});
    setShowMenu(false);
  };

  return(
    <div className="fade-up">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:4}}>Upload Claude Export</div>
          <div style={{fontSize:13,color:C.muted}}>Download your Claude data export (ZIP) and upload it here.</div>
        </div>
        {/* Previous uploads hamburger */}
        <div ref={menuRef} style={{position:'relative',flexShrink:0}}>
          <button onClick={()=>{setShowMenu(p=>!p);loadUploads()}} title="Previous uploads"
            style={{width:36,height:36,borderRadius:8,border:`1px solid ${C.border}`,background:'white',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:C.muted,transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.color=C.primary}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted}}>
            <IcoMenu s={16}/>
          </button>
          {showMenu&&(
            <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',width:320,background:'white',border:`1px solid ${C.border}`,borderRadius:10,boxShadow:'0 8px 30px rgba(0,0,0,.12)',zIndex:100,overflow:'hidden'}}>
              <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.bg}`,fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>Previous Uploads</div>
              {uploads.length===0
                ?<div style={{padding:'20px 14px',fontSize:13,color:C.muted,textAlign:'center'}}>No uploads yet</div>
                :uploads.map((u,i)=>{
                  const isActive=cl2gUploadData?.uploadId===u._id;
                  return(
                    <div key={u._id} onClick={()=>selectUpload(u)}
                      style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',cursor:'pointer',borderBottom:i<uploads.length-1?`1px solid ${C.bg}`:'none',background:isActive?C.tint:'white',transition:'background .15s'}}
                      onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background=C.bg}}
                      onMouseLeave={e=>{e.currentTarget.style.background=isActive?C.tint:'white'}}>
                      <IcoZip s={20} c={isActive?C.primary:C.primaryL}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',display:'flex',alignItems:'center',gap:6}}>
                          <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{u.fileName}</span>
                          {isActive&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:10,background:C.primary,color:'white',flexShrink:0}}>active</span>}
                        </div>
                        <div style={{fontSize:11,color:C.muted}}>{u.totalConversations} convs · {u.users?.length||0} users · {new Date(u.uploadTime).toLocaleDateString()}</div>
                      </div>
                      <button onClick={e=>deleteUpload(u._id,e)} title="Delete"
                        style={{padding:'4px 6px',border:'none',background:'none',cursor:'pointer',color:C.muted,borderRadius:4,flexShrink:0,display:'flex',alignItems:'center',transition:'all .15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.background='#FEF2F2';e.currentTarget.style.color=C.error}}
                        onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color=C.muted}}>
                        <IcoTrash s={13}/>
                      </button>
                    </div>
                  );
                })
              }
            </div>
          )}
        </div>
      </div>

      <div onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)uploadZip(f)}}
        onClick={()=>!uploading&&fileRef.current.click()}
        style={{border:`2px dashed ${dragOver?C.primary:C.border}`,borderRadius:12,padding:'36px',textAlign:'center',cursor:'pointer',background:dragOver?C.tint:'white',transition:'all .2s',marginBottom:16}}>
        <input ref={fileRef} type="file" accept=".zip" style={{display:'none'}} onChange={e=>{if(e.target.files[0])uploadZip(e.target.files[0]);e.target.value=''}}/>
        {uploading
          ?<><Spinner s={28}/><div style={{fontSize:13,color:C.muted,marginTop:10}}>Uploading & parsing ZIP…</div></>
          :<><IcoZip s={28} c={dragOver?C.primary:C.muted}/><div style={{fontSize:13,color:C.muted,marginTop:8}}>Drag & drop your Claude export ZIP here</div><div style={{fontSize:11,color:C.primaryL,marginTop:4}}>or click to browse</div></>}
      </div>

      {cl2gUploadData&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:C.tint,borderRadius:8,border:`1px solid ${C.primary}30`,marginBottom:16}}>
          <IcoZip s={18} c={C.primary}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:C.primary,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cl2gUploadData.fileName}</div>
            <div style={{fontSize:11,color:C.muted}}>{cl2gUploadData.totalConversations} conversations · {cl2gUploadData.users?.length||0} users{cl2gUploadData.totalMemories>0?` · ${cl2gUploadData.totalMemories} memory`:''}{cl2gUploadData.totalProjects>0?` · ${cl2gUploadData.totalProjects} project${cl2gUploadData.totalProjects>1?'s':''}`:''}</div>
          </div>
          <Check s={16} c={C.success}/>
        </div>
      )}

      <div style={{display:'flex',gap:10}}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={onNext} disabled={!cl2gUploadData} style={{flex:1,justifyContent:'center'}}>Continue →</Btn>
      </div>
    </div>
  );
};

/* ═══  CLAUDE→GEMINI: USER MAPPING STEP   ═══ */
/* ═══════════════════════════════════════════ */
const StepCL2GMap=({cl2gUploadData,googleUsers,cl2gMappings,setCl2gMappings,cl2gSelectedUuids,setCl2gSelectedUuids,onNext,onBack,showToast})=>{
  const csvRef=useRef(null);
  const [search,setSearch]=useState('');
  const [csvUploading,setCsvUploading]=useState(false);
  const [csvEmails,setCsvEmails]=useState(null); // null = cloud users; array = CSV-sourced emails
  const users=cl2gUploadData?.users||[];

  // Load saved mappings + CSV from DB on mount
  useEffect(()=>{
    fetch('/api/cl2g/user-mappings').then(r=>r.ok?r.json():null).then(doc=>{
      if(doc?.mappings)setCl2gMappings(prev=>({...prev,...doc.mappings}));
      if(doc?.csvEmails){
        setCsvEmails(doc.csvEmails);
        if(doc.csvEmails.length>0)setCl2gSelectedUuids(new Set(doc.csvEmails.filter(uuid=>doc.mappings?.[uuid])));
      }
    }).catch(()=>{});
  },[]);

  // Auto-map by email local-part when users + google users are available
  useEffect(()=>{
    if(!users.length||!googleUsers.length)return;
    const byLocal={};
    googleUsers.forEach(u=>{const em=(u.email||'').toLowerCase();const loc=em.split('@')[0];if(loc)byLocal[loc]=em});
    const m={...cl2gMappings};let changed=false;
    users.forEach(u=>{
      if(!m[u.uuid]){const loc=(u.email_address||'').toLowerCase().split('@')[0];m[u.uuid]=byLocal[loc]||'';changed=true}
    });
    if(changed)setCl2gMappings(m);
    if(cl2gSelectedUuids.size===0)setCl2gSelectedUuids(new Set(users.map(u=>u.uuid)));
  },[users,googleUsers]);

  const persistMappings=(mappings,csv)=>{
    fetch('/api/cl2g/user-mappings',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mappings,csvEmails:csv||null})}).catch(()=>{});
  };

  const handleMappingChange=(uuid,val)=>{
    const m={...cl2gMappings,[uuid]:val};
    setCl2gMappings(m);
    persistMappings(m,csvEmails);
  };

  const downloadCsv=()=>{
    const src=csvEmails?users.filter(u=>csvEmails.includes(u.uuid)):users;
    const rows=src.map(u=>`"${u.email_address||''}","${cl2gMappings[u.uuid]||''}","${u.full_name||''}"`);
    const csv='Claude Email,Google Email,Display Name\n'+rows.join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='cl2g-user-mappings.csv';a.click();
    showToast('CSV downloaded.');
  };

  const uploadCsv=file=>{
    setCsvUploading(true);
    const r=new FileReader();
    r.onload=e=>{
      const lines=e.target.result.split(/\r?\n/).slice(1);
      const emailToUuid={};
      users.forEach(u=>{if(u.email_address)emailToUuid[u.email_address.toLowerCase()]=u.uuid});
      const m={...cl2gMappings};const csvUuids=[];
      for(const l of lines){
        if(!l.trim())continue;
        const c=parseCsvLine(l);
        if(c.length>=2&&c[0]){
          const srcEmail=c[0].trim().toLowerCase();
          const dstEmail=c[1].trim();
          const uuid=emailToUuid[srcEmail];
          if(uuid){m[uuid]=dstEmail;csvUuids.push(uuid);}
        }
      }
      setCl2gMappings(m);setCsvEmails(csvUuids);
      setCl2gSelectedUuids(new Set(csvUuids.filter(id=>m[id])));
      persistMappings(m,csvUuids);
      setCsvUploading(false);
      showToast(`CSV uploaded — ${csvUuids.length} user(s) mapped.`);
    };
    r.onerror=()=>{setCsvUploading(false);showToast('Failed to read CSV.','error')};
    r.readAsText(file);
  };

  const clearCsv=()=>{
    setCsvEmails(null);
    // Restore auto-mapping
    const byLocal={};
    googleUsers.forEach(u=>{const em=(u.email||'').toLowerCase();const loc=em.split('@')[0];if(loc)byLocal[loc]=em});
    const m={};
    users.forEach(u=>{const loc=(u.email_address||'').toLowerCase().split('@')[0];m[u.uuid]=byLocal[loc]||''});
    setCl2gMappings(m);
    setCl2gSelectedUuids(new Set(users.map(u=>u.uuid)));
    persistMappings(m,null);
    showToast('CSV cleared — restored auto-mapping.');
  };

  const displayUsers=csvEmails?users.filter(u=>csvEmails.includes(u.uuid)):users;
  const filtered=displayUsers.filter(u=>{
    const q=search.toLowerCase();
    return (u.full_name||'').toLowerCase().includes(q)||(u.email_address||'').toLowerCase().includes(q)||(cl2gMappings[u.uuid]||'').toLowerCase().includes(q);
  }).sort((a,b)=>{const ma=!!cl2gMappings[a.uuid],mb=!!cl2gMappings[b.uuid];if(ma!==mb)return ma?-1:1;return (a.email_address||'').localeCompare(b.email_address||'')});

  const toggleUser=uuid=>setCl2gSelectedUuids(p=>{const n=new Set(p);n.has(uuid)?n.delete(uuid):n.add(uuid);return n});
  const autoMapped=displayUsers.filter(u=>!!cl2gMappings[u.uuid]).length;
  const unmapped=displayUsers.filter(u=>!cl2gMappings[u.uuid]).length;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}} className="fade-up">
      <div style={{flexShrink:0,marginBottom:12}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
          <div>
            <div style={{fontSize:18,fontWeight:600,color:C.primary,marginBottom:2}}>User Mapping</div>
            <div style={{fontSize:13,color:C.muted}}>
              {csvEmails?<span style={{color:C.primary,fontWeight:500}}>{csvEmails.length} users from CSV</span>
              :<>Map Claude accounts to Google destination emails.{' '}
              {autoMapped>0&&<span style={{color:C.success,fontWeight:500}}>{autoMapped} auto-mapped</span>}
              {unmapped>0&&<span style={{color:C.error}}>{autoMapped>0?' · ':''}{unmapped} need mapping</span>}</>}
            </div>
          </div>
          <div style={{display:'flex',gap:4,flexShrink:0}}>
            <input ref={csvRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])uploadCsv(e.target.files[0]);e.target.value=''}}/>
            <button onClick={()=>csvRef.current.click()} disabled={csvUploading} title="Upload CSV"

              onMouseEnter={e=>e.currentTarget.style.background='#FEF2F2'} onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <IcoTrash s={13}/>

        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:8}}><span style={{fontWeight:600,color:C.primary}}>{cl2gSelectedUuids.size}</span> of {displayUsers.length} selected</div>
        <SearchBar value={search} onChange={setSearch} placeholder="Search by name or email..."/>

          <div>Claude Account</div><div>Google Destination</div>
        </div>
        {filtered.map((u,i)=>{

const GEM_INSTRUCTIONS=`You are my personal Claude conversation assistant. The uploaded document(s) contain my complete Claude conversation history, with each conversation clearly labeled by number and title.

How to answer my questions:
1. ALWAYS search the uploaded documents thoroughly before responding.
2. When I ask about a topic — find all conversations related to it in the document and summarize what was discussed.
3. When I ask "what did I ask about X?" or "find my conversation about X" — locate it in the document and return the exact Human and Claude message exchanges.
4. When I ask to continue or follow up on a past conversation — find that conversation in the document, read the full message thread, then continue responding as Claude would, staying consistent with the context and conclusions already reached in that conversation.
5. Answer from the document content directly. Do not rephrase from your own training memory when the topic is in the documents.
6. If a topic is not found anywhere in the documents, say: "This topic was not in your migrated conversation history." Then answer from general knowledge if helpful.
7. Never fabricate conversation content that is not in the documents.

Document structure: Each conversation starts with "Conversation N: Title" followed by [Human] and [Claude] labeled messages in chronological order.`;

const GemSetupInstructions=()=>{
  const [copied,setCopied]=useState(false);
  const [open,setOpen]=useState(true);
  const copy=()=>{navigator.clipboard.writeText(GEM_INSTRUCTIONS).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500)}).catch(()=>{})};
  const steps=[
    {n:1,icon:'🌐',title:'Open Gemini Gems',desc:'Go to gemini.google.com → click Gems in the left sidebar → New Gem'},
    {n:2,icon:'📁',title:'Add Knowledge from Google Drive',desc:'Under Knowledge, click "Add from Google Drive" → navigate to your ClaudeChats folder → select it → Insert'},
    {n:3,icon:'📋',title:'Paste the Gem Instructions',desc:'Copy the instructions below and paste them into the Instructions box of the Gem'},
    {n:4,icon:'💾',title:'Name & Save the Gem',desc:'Give the Gem a name (e.g. "My Claude History") → click Save — the Gem is now ready to use'},
  ];
  return(
    <div style={{border:`1px solid #BFDBFE`,borderRadius:12,background:'#EFF6FF',marginBottom:16,overflow:'hidden'}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',cursor:'pointer',userSelect:'none'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:18}}>💎</span>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:'#1E3A5F'}}>Set Up Your Gemini Gem</div>
            <div style={{fontSize:11,color:'#3B82F6'}}>Follow these steps so each user gets accurate answers from their migrated history</div>
          </div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transition:'transform .2s',transform:open?'rotate(180deg)':'none'}}><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      {open&&(
        <div style={{padding:'0 16px 16px'}}>
          {/* Steps */}
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
            {steps.map(s=>(
              <div key={s.n} style={{display:'flex',gap:12,alignItems:'flex-start',background:'white',borderRadius:10,padding:'10px 14px',border:'1px solid #DBEAFE'}}>
                <div style={{minWidth:28,height:28,borderRadius:'50%',background:'#1D4ED8',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{s.n}</div>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:'#1E3A5F',marginBottom:2}}>{s.icon} {s.title}</div>
                  <div style={{fontSize:11,color:'#4B5563',lineHeight:1.5}}>{s.desc}</div>
                </div>
              </div>
            ))}
          </div>
          {/* Instructions copy box */}
          <div style={{background:'white',border:'1px solid #BFDBFE',borderRadius:10,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'#DBEAFE',borderBottom:'1px solid #BFDBFE'}}>
              <span style={{fontSize:11,fontWeight:700,color:'#1E40AF',textTransform:'uppercase',letterSpacing:.5}}>📋 Gem Instructions — copy & paste into Gemini</span>
              <button onClick={copy} style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,color:copied?'#16a34a':'#1D4ED8',background:copied?'#DCFCE7':'#EFF6FF',border:`1px solid ${copied?'#86EFAC':'#93C5FD'}`,borderRadius:6,padding:'4px 10px',cursor:'pointer',fontFamily:'inherit',transition:'all .2s'}}>
                {copied?<><IcoDone s={11}/>Copied!</>:<><IcoUpload s={11}/>Copy</>}
              </button>
            </div>
            <pre style={{margin:0,padding:'12px 14px',fontSize:11,lineHeight:1.6,color:'#1E293B',whiteSpace:'pre-wrap',wordBreak:'break-word',fontFamily:'Consolas,monospace',maxHeight:220,overflowY:'auto'}}>{GEM_INSTRUCTIONS}</pre>
          </div>
          <div style={{marginTop:10,padding:'8px 12px',background:'#FEF9C3',border:'1px solid #FDE68A',borderRadius:8,fontSize:11,color:'#713F12'}}>
            <strong>Tip:</strong> The migrated folder contains max 3 files per user (All Conversations, Memory, Projects). Add them all to the Gem knowledge for best results.
          </div>
        </div>
      )}

  );
};

/* ═══     REPORTS PANEL      ═══ */
/* ══════════════════════════════ */
const ReportsPanel=({onClose,refreshKey=0,liveStats=null,liveBatchId=null,isLive=false})=>{
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(true);
  const [agg,setAgg]=useState(null);
  const [expanded,setExpanded]=useState({});
  const [batchDetails,setBatchDetails]=useState({});
  const pollRef=useRef(null);

  const loadReports=useCallback(()=>{
    Promise.all([
      fetch('/api/reports').then(r=>r.json()).catch(()=>[]),
      fetch('/api/reports/aggregate').then(r=>r.json()).catch(()=>null)
    ]).then(([list,aggData])=>{
      setReports(Array.isArray(list)?list:[]);
      setAgg(aggData);
      setLoading(false);
    });
  },[]);

  // Re-fetch whenever panel opens (refreshKey changes) or migration completes
  useEffect(()=>{ setLoading(true); loadReports(); },[refreshKey]);

  // Auto-poll every 3s while any batch is running
  useEffect(()=>{
    const hasRunning=reports.some(r=>r.status==='running')||isLive;
    if(hasRunning){
      pollRef.current=setInterval(loadReports,3000);
    } else {
      clearInterval(pollRef.current);
    }
    return()=>clearInterval(pollRef.current);
  },[reports,isLive,loadReports]);

  const toggleDetail=async(id)=>{
    setExpanded(p=>({...p,[id]:!p[id]}));
    if(!batchDetails[id]){
      fetch(`/api/reports/${id}`).then(r=>r.ok?r.json():null).then(d=>{
        if(d?.users)setBatchDetails(p=>({...p,[id]:d.users}));
      }).catch(()=>{});
    }
  };

  const dlBatch=id=>{
    const a=document.createElement('a');a.href=`/api/reports/${id}/csv`;a.download=`batch_${id}.csv`;a.click();
  };

  const fmtDate=ts=>{try{const d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})}catch{return ts}};
  const fmtDur=(s,e)=>{try{const sec=Math.round((new Date(e)-new Date(s))/1000);return sec<60?`${sec}s`:`${Math.floor(sec/60)}m ${sec%60}s`}catch{return ''}};
  const statusStyle=(r)=>{
    if(r.status==='running')return{bg:'#EFF6FF',color:'#1D4ED8',label:'In Progress'};
    if(r.dryRun)return{bg:'#FEF3C7',color:'#92400E',label:'Dry Run'};
    if(r.status==='failed')return{bg:'#FEE2E2',color:'#991B1B',label:'Failed'};
    if(r.totalErrors>0)return{bg:'#FEF3C7',color:'#92400E',label:'Partial'};
    return{bg:'#DCFCE7',color:'#166534',label:'Success'};
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'flex-end'}} onClick={onClose}>
      <div style={{width:'100%',maxWidth:680,height:'100vh',background:'white',display:'flex',flexDirection:'column',boxShadow:'-4px 0 30px rgba(0,0,0,.15)',animation:'slideRight .3s ease'}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <div style={{fontSize:18,fontWeight:600,color:C.primary}}>Migration Reports</div>
            <div style={{fontSize:12,color:C.muted}}>All migration batches across sessions</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={loadReports} title="Refresh" style={{width:32,height:32,borderRadius:'50%',border:`1px solid ${C.border}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:C.primary}} onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}><IcoReset s={13}/></button>
            <button onClick={onClose} style={{width:32,height:32,borderRadius:'50%',border:`1px solid ${C.border}`,background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:C.muted}}>✕</button>
          </div>
        </div>

        {/* Aggregate Summary Bar */}
        {agg&&(
          <div style={{padding:'12px 24px',background:C.tint,borderBottom:`1px solid ${C.primary}20`,flexShrink:0}}>
            <div style={{fontSize:10,fontWeight:700,color:C.primary,textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Overall Summary</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
              {[['Total Batches',agg.totalBatches,C.primary],['Live Batches',agg.liveBatches,C.primary],['Pages Created',agg.totalPages,C.success],['Total Errors',agg.totalErrors,agg.totalErrors>0?C.error:C.muted]].map(([lbl,val,col],i)=>(
                <div key={i} style={{background:'white',borderRadius:8,padding:'8px 12px',textAlign:'center',border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:18,fontWeight:700,color:col}}>{val??0}</div>
                  <div style={{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:.3,marginTop:2}}>{lbl}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{flex:1,overflowY:'auto',padding:'16px 24px'}}>
          {loading&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'20px 0',color:C.muted}}><Spinner s={16}/> Loading...</div>}
          {!loading&&reports.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:C.muted,fontSize:13}}>No migration reports yet. Run a migration to see results here.</div>}
          {reports.map((r,i)=>{
            const ss=statusStyle(r);
            const isExp=expanded[r._id];
            const details=batchDetails[r._id];
            return(
              <Card key={i} className="fade-up" style={{marginBottom:12,animationDelay:`${i*40}ms`}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                      <span style={{fontSize:13,fontWeight:600,color:C.dark}}>{r.customerName||'Migration'}</span>
                      <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,fontWeight:600,background:ss.bg,color:ss.color}}>{ss.label}</span>
                      {(r.direction==='c2g'||r.direction==='copilot-gemini')&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#EFF6FF',color:'#1D4ED8',fontWeight:600}}>C2G</span>}
                      {r.direction==='claude-gemini'&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#FFF7ED',color:'#C2410C',fontWeight:600}}>CL2G</span>}
                      {(!r.direction||r.direction==='gemini-copilot')&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#F0FDF4',color:'#166534',fontWeight:600}}>G2C</span>}
                    </div>
                    <div style={{fontSize:12,color:C.muted,display:'flex',gap:12}}>
                      <span>{fmtDate(r.startTime)}</span>
                      {r.endTime&&<span>⏱ {fmtDur(r.startTime,r.endTime)}</span>}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6,flexShrink:0,marginLeft:8,alignItems:'center'}}>
                    {r.status==='running'&&<span style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'#1D4ED8'}}><Spinner s={12}/>Running...</span>}
                    {r.status!=='running'&&!r.dryRun&&<button onClick={()=>dlBatch(r._id)} title="Download CSV" style={{display:'flex',alignItems:'center',gap:4,padding:'5px 9px',borderRadius:6,border:`1px solid ${C.primary}`,background:'white',fontSize:11,color:C.primary,cursor:'pointer',fontFamily:'inherit',fontWeight:500}} onMouseEnter={e=>e.currentTarget.style.background=C.tint} onMouseLeave={e=>e.currentTarget.style.background='white'}><IcoDownload s={11} c={C.primary}/> CSV</button>}
                  </div>
                </div>

                <div style={{display:'flex',gap:16,borderTop:`1px solid ${C.bg}`,paddingTop:8,marginTop:4,justifyContent:'space-between',alignItems:'flex-end'}}>
                  <div style={{display:'flex',gap:16}}>
                    {(()=>{
                      const isRunningBatch=r.status==='running';
                      const live=isRunningBatch&&liveStats&&r._id===liveBatchId;
                      const doneUsers=live?liveStats.users:(isRunningBatch?r.progressUsers:r.totalUsers);
                      const donePages=live?liveStats.pages:(isRunningBatch?r.progressPages:r.migratedConversations);
                      const doneErrors=live?liveStats.errors:(isRunningBatch?r.progressErrors:r.totalErrors);
                      const totalUsers=r.totalUsers||0;
                      const filesLabel=(r.direction==='c2g'||r.direction==='copilot-gemini'||r.direction==='claude-gemini')?'Files':'Pages';
                      return[
                        ['Users',isRunningBatch?`${doneUsers??0}/${totalUsers}`:doneUsers,false],
                        [filesLabel,donePages,false],
                        ['Errors',doneErrors,doneErrors>0]
                      ].map(([lbl,val,isErr],j)=>(
                        <div key={j} style={{textAlign:'center'}}>
                          <div style={{fontSize:16,fontWeight:700,color:isErr?C.error:C.primary}}>{val??0}</div>
                          <div style={{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:.3}}>{lbl}</div>
                        </div>
                      ));
                    })()}
                  </div>
                  {!r.dryRun&&r.status!=='running'&&<button onClick={()=>toggleDetail(r._id)} style={{fontSize:11,color:C.primaryL,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:'0 4px'}}>{isExp?'▲ Hide Details':'▼ View Details'}</button>}
                </div>

                {/* Per-user detail expand */}
                {isExp&&(
                  <div style={{marginTop:12,border:`1px solid ${C.border}`,borderRadius:6,overflow:'hidden'}}>
                    <div style={{display:'grid',gridTemplateColumns:(r.direction==='c2g'||r.direction==='copilot-gemini'||r.direction==='claude-gemini')?'1fr 1fr 70px 50px 50px':'1fr 80px 60px 60px',padding:'6px 12px',background:C.bg,fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.4}}>
                      {(r.direction==='c2g'||r.direction==='copilot-gemini'||r.direction==='claude-gemini')?<><div>Source</div><div>Destination</div><div style={{textAlign:'center'}}>Status</div><div style={{textAlign:'center'}}>Files</div><div style={{textAlign:'center'}}>Errors</div></>
                      :<><div>User</div><div style={{textAlign:'center'}}>Status</div><div style={{textAlign:'center'}}>Pages</div><div style={{textAlign:'center'}}>Errors</div></>}
                    </div>
                    {!details&&<div style={{padding:'12px',textAlign:'center',fontSize:12,color:C.muted}}><Spinner s={14}/></div>}
                    {details&&details.map((u,k)=>(
                      (r.direction==='c2g'||r.direction==='copilot-gemini'||r.direction==='claude-gemini')?
                      <div key={k} style={{display:'grid',gridTemplateColumns:'1fr 1fr 70px 50px 50px',alignItems:'center',padding:'7px 12px',borderTop:`1px solid ${C.bg}`,background:'white'}}>
                        <div style={{fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.dark}}>{u.email}</div>
                        <div style={{fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.muted}}>{u.destEmail||''}</div>
                        <div style={{textAlign:'center'}}><span style={{fontSize:10,padding:'2px 6px',borderRadius:20,fontWeight:600,background:u.status==='success'?'#dcfce7':u.status==='partial'?'#fef3c7':'#fee2e2',color:u.status==='success'?'#166534':u.status==='partial'?'#92400e':'#991b1b'}}>{u.status}</span></div>
                        <div style={{textAlign:'center',fontSize:13,fontWeight:600,color:C.primary}}>{u.pages_created}</div>
                        <div style={{textAlign:'center',fontSize:13,fontWeight:600,color:u.error_count>0?C.error:C.muted}}>{u.error_count}</div>
                      </div>
                      :<div key={k} style={{display:'grid',gridTemplateColumns:'1fr 80px 60px 60px',alignItems:'center',padding:'7px 12px',borderTop:`1px solid ${C.bg}`,background:'white'}}>
                        <div style={{fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.dark}}>{u.email}</div>
                        <div style={{textAlign:'center'}}><span style={{fontSize:10,padding:'2px 6px',borderRadius:20,fontWeight:600,background:u.status==='success'?'#dcfce7':u.status==='partial'?'#fef3c7':'#fee2e2',color:u.status==='success'?'#166534':u.status==='partial'?'#92400e':'#991b1b'}}>{u.status}</span></div>
                        <div style={{textAlign:'center',fontSize:13,fontWeight:600,color:C.primary}}>{u.pages_created}</div>
                        <div style={{textAlign:'center',fontSize:13,fontWeight:600,color:u.error_count>0?C.error:C.muted}}>{u.error_count}</div>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════ */
/* ═══            MAIN APP            ═══ */
/* ══════════════════════════════════════ */
function App(){
  // Read stored userId synchronously so state initializers use the right scoped keys
  const storedUid=(()=>{try{return localStorage.getItem('gem_active_user')||''}catch{return ''}})();
  const K=LS(storedUid); // scoped key map for current user

  const [step,setStep]=useState(()=>lsGet(K.step,0));
  const [uploadData,setUploadData]=useState(()=>lsGet(K.uploadData,null));
  const [config,setConfig]=useState(()=>{const s=lsGet(K.config,{});return{filePath:s.filePath||s.fileName||s.customerName||'GeminiChats',tenantId:s.tenantId||'807d6772-847c-40e2-9bec-e2c930b3a42e'}});
  const [mappings,setMappings]=useState(()=>lsGet(K.mappings,{}));
  const [selectedUsers,setSelectedUsers]=useState(()=>{const s=lsGet(K.selUsers,null);return s?new Set(s):new Set()});
  const [options,setOptions]=useState({dryRun:true,skipFollowups:false,skipAiResponse:false,fromDate:'',toDate:''});
  const [googleAuthed,setGoogleAuthed]=useState(()=>lsGet(K.authG,{signedIn:false}).signedIn||false);
  const [msAuthed,setMsAuthed]=useState(()=>lsGet(K.authMs,{signedIn:false}).signedIn||false);
  const [googleUsers,setGoogleUsers]=useState([]);
  const [msUsers,setMsUsers]=useState([]);
  const [logs,setLogs]=useState(()=>lsGet(K.logs,[]));
  const [live,setLive]=useState(false);
  const [migDone,setMigDone]=useState(()=>lsGet(K.migDone,false));
  const [stats,setStats]=useState(()=>lsGet(K.stats,{users:0,pages:0,errors:0,flagged:0}));
  const [lastRunWasDry,setLastRunWasDry]=useState(()=>lsGet(K.lastDry,false));
  const [currentBatchId,setCurrentBatchId]=useState(()=>lsGet(K.batchId,null));
  const [retrying,setRetrying]=useState(false);
  const [retryMode,setRetryMode]=useState(false);
  const [toast,setToast]=useState(null); // {message, type}
  const [showReports,setShowReports]=useState(false);
  const [appUser,setAppUser]=useState(null);
  const [showReset,setShowReset]=useState(false);
  const [reportRefreshKey,setReportRefreshKey]=useState(0); // increments to force reports re-fetch
  const [wsLoaded,setWsLoaded]=useState(false); // true after DB workspace hydration
  const KRef=useRef(K); // mutable ref so persist effects always use current scoped keys
  KRef.current=K;
  const wsSaveTimer=useRef(null); // debounce timer for workspace saves
  const sseRef=useRef(null);
  const silenceTimer=useRef(null);
  const cl2gLiveRef=useRef(false);
  const [splitPct,setSplitPct]=useState(50);
  const [panelSwapped,setPanelSwapped]=useState(false);
  const [agentMsgs,setAgentMsgs]=useState(()=>lsGet(K.agentMsgs,[]));
  const [agentTyping,setAgentTyping]=useState(false);
  const [agentInput,setAgentInput]=useState('');
  const [leftMode,setLeftMode]=useState('viz'); // 'viz' | 'mapping'
  const [migDir,setMigDir]=useState(()=>lsGet(K.migDir,null)); // 'gemini-copilot' | 'copilot-gemini' | null
  const [c2gMappings,setC2gMappings]=useState(()=>lsGet(K.c2gMappings,{}));
  const [c2gSelectedUsers,setC2gSelectedUsers]=useState(()=>{const s=lsGet(K.c2gSelUsers,null);return s?new Set(s):new Set()});
  const [c2gStats,setC2gStats]=useState({users:0,files:0,errors:0});
  const [c2gTotal,setC2gTotal]=useState(0);
  const [c2gDone,setC2gDone]=useState(false);
  const [c2gLive,setC2gLive]=useState(false);
  const [c2gOptions,setC2gOptions]=useState({dryRun:true,fromDate:'',toDate:''});
  const [c2gConfig,setC2gConfig]=useState({folderName:'CopilotChats'});
  const [c2gLastDry,setC2gLastDry]=useState(false);
  // CL2G (Claude → Gemini) state
  const [cl2gUploadData,setCl2gUploadData]=useState(null);
  const [cl2gMappings,setCl2gMappings]=useState({});
  const [cl2gSelectedUuids,setCl2gSelectedUuids]=useState(new Set());
  const [cl2gOptions,setCl2gOptions]=useState({dryRun:true,fromDate:'',toDate:'',includeMemory:true,includeProjects:true});
  const [cl2gConfig,setCl2gConfig]=useState({folderName:'ClaudeChats'});
  const [cl2gStats,setCl2gStats]=useState({users:0,files:0,errors:0});
  const [cl2gTotal,setCl2gTotal]=useState(0);
  const [cl2gDone,setCl2gDone]=useState(false);
  const [cl2gLive,setCl2gLive]=useState(false);
  const [cl2gLastDry,setCl2gLastDry]=useState(false);
  const [chatGLoading,setChatGLoading]=useState(false);
  const [chatMLoading,setChatMLoading]=useState(false);
  const [chatUploading,setChatUploading]=useState(false);
  const containerRef=useRef(null);
  const dividerRef=useRef(null);
  const panelDragRef=useRef(null);
  const greetedRef=useRef(false);
  const sendToAgentRef=useRef(null);

  const showToast=useCallback((message,type='success')=>{
    setToast({message,type});
  },[]);

  const handleDividerMouseDown=useCallback(e=>{
    e.preventDefault();
    if(dividerRef.current)dividerRef.current.classList.add('active');
    const onMove=ev=>{
      if(!containerRef.current)return;
      const rect=containerRef.current.getBoundingClientRect();
      setSplitPct(Math.max(20,Math.min(80,((ev.clientX-rect.left)/rect.width)*100)));
    };
    const onUp=()=>{if(dividerRef.current)dividerRef.current.classList.remove('active');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  },[]);

  // Load app config (reset button, feature flags)
  useEffect(()=>{fetch('/api/app-config').then(r=>r.ok?r.json():null).then(cfg=>{if(cfg?.showReset)setShowReset(true);}).catch(()=>{});},[]);

  // Auth check on mount — verify app session, hydrate state from DB (cross-device), check cloud auth
  useEffect(()=>{
    fetch('/api/me').then(r=>{
      if(!r.ok){window.location.href='/login.html';return null}
      return r.json();
    }).then(u=>{
      if(!u)return;
      setAppUser(u);
      // Handle user switching — clear old localStorage if different user
      const prevUid=localStorage.getItem('gem_active_user')||'';
      if(prevUid && prevUid!==u._id){ lsClearAll(); }
      localStorage.setItem('gem_active_user',u._id);

      // Hydrate from MongoDB — DB is authoritative for cross-device state
      fetch('/api/workspace').then(r=>r.ok?r.json():null).then(ws=>{
        if(ws){
          // Override localStorage-initialized state with DB values
          if(ws.step!=null){setStep(ws.step);lsSet(KRef.current.step,ws.step)}
          if(ws.uploadData!==undefined){setUploadData(ws.uploadData);lsSet(KRef.current.uploadData,ws.uploadData)}
          if(ws.config){setConfig(ws.config);lsSet(KRef.current.config,ws.config)}
          if(ws.mappings){setMappings(ws.mappings);lsSet(KRef.current.mappings,ws.mappings)}
          if(ws.selectedUsers){const s=new Set(ws.selectedUsers);setSelectedUsers(s);lsSet(KRef.current.selUsers,ws.selectedUsers)}
          if(ws.options){setOptions(ws.options)}
          if(ws.migDone!=null){setMigDone(ws.migDone);lsSet(KRef.current.migDone,ws.migDone)}
          if(ws.stats){setStats(ws.stats);lsSet(KRef.current.stats,ws.stats)}
          if(ws.currentBatchId!==undefined){setCurrentBatchId(ws.currentBatchId);lsSet(KRef.current.batchId,ws.currentBatchId)}
          if(ws.lastRunWasDry!=null){setLastRunWasDry(ws.lastRunWasDry);lsSet(KRef.current.lastDry,ws.lastRunWasDry)}
          if(ws.agentMsgs?.length){setAgentMsgs(ws.agentMsgs);lsSet(KRef.current.agentMsgs,ws.agentMsgs)}
        }
        setWsLoaded(true);

        // Validate cloud auth status from server
        fetch('/auth/status').then(r=>r.json()).then(d=>{
          // Server is authoritative — sync UI state to match
          if(d.googleConnected!==undefined){setGoogleAuthed(!!d.googleConnected);}
          if(d.msConnected!==undefined){setMsAuthed(!!d.msConnected);}
        }).catch(()=>{});
      }).catch(()=>setWsLoaded(true));
    }).catch(()=>{window.location.href='/login.html'});
  },[]);


  // Persist state (always use KRef.current so keys stay scoped to the right user)
  useEffect(()=>{lsSet(KRef.current.step,step)},[step]);
  useEffect(()=>{lsSet(KRef.current.uploadData,uploadData)},[uploadData]);
  useEffect(()=>{lsSet(KRef.current.config,config)},[config]);
  useEffect(()=>{lsSet(KRef.current.mappings,mappings)},[mappings]);
  useEffect(()=>{lsSet(KRef.current.logs,logs.slice(-500))},[logs]);
  useEffect(()=>{lsSet(KRef.current.authG,{signedIn:googleAuthed})},[googleAuthed]);
  useEffect(()=>{lsSet(KRef.current.authMs,{signedIn:msAuthed})},[msAuthed]);

  // Load users at App level as soon as auth is confirmed — not dependent on Step0 being visible
  useEffect(()=>{
    if(!googleAuthed||googleUsers.length>0)return;
    fetch('/api/google/users').then(r=>r.ok?r.json():null).then(d=>{if(d?.users)setGoogleUsers(d.users)}).catch(()=>{});
  },[googleAuthed]);
  useEffect(()=>{
    if(!msAuthed||msUsers.length>0)return;
    fetch('/api/ms/users').then(r=>r.ok?r.json():null).then(d=>{if(d?.users)setMsUsers(d.users)}).catch(()=>{});
  },[msAuthed]);
  useEffect(()=>{lsSet(KRef.current.selUsers,[...selectedUsers])},[selectedUsers]);
  useEffect(()=>{lsSet(KRef.current.migDone,migDone)},[migDone]);
  useEffect(()=>{lsSet(KRef.current.stats,stats)},[stats]);
  useEffect(()=>{lsSet(KRef.current.batchId,currentBatchId)},[currentBatchId]);
  useEffect(()=>{lsSet(KRef.current.lastDry,lastRunWasDry)},[lastRunWasDry]);
  useEffect(()=>{lsSet(KRef.current.agentMsgs,agentMsgs.slice(-100))},[agentMsgs]);
  useEffect(()=>{lsSet(KRef.current.migDir,migDir)},[migDir]);
  useEffect(()=>{lsSet(KRef.current.c2gMappings,c2gMappings)},[c2gMappings]);
  useEffect(()=>{lsSet(KRef.current.c2gSelUsers,[...c2gSelectedUsers])},[c2gSelectedUsers]);

  // Cross-device workspace save (debounced 800ms) — only after initial DB hydration
  const saveWorkspace=useCallback(()=>{
    if(!wsLoaded)return;
    clearTimeout(wsSaveTimer.current);
    wsSaveTimer.current=setTimeout(()=>{
      fetch('/api/workspace',{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({step,uploadData,config,mappings,selectedUsers:[...selectedUsers],
          options,migDone,stats,currentBatchId,lastRunWasDry,agentMsgs:agentMsgs.filter(m=>!m.shellBlock).slice(-50)})
      }).catch(()=>{});
    },800);
  },[wsLoaded,step,uploadData,config,mappings,selectedUsers,options,migDone,stats,currentBatchId,lastRunWasDry]);
  useEffect(()=>{saveWorkspace()},[saveWorkspace]);

  // ── Bidirectional sync: Steps panel events → Agent ──────────────────────────
  const prevStepRef=useRef(null);
  // Step change → agent guidance (guard: only after wsLoaded + genuine navigation)
  useEffect(()=>{
    if(!wsLoaded)return;
    if(prevStepRef.current===null){prevStepRef.current=step;return;} // skip first render
    if(prevStepRef.current===step)return;
    prevStepRef.current=step;
    const gc=[
      null,
      null,
      uploadData
        ? `Vault loaded — **${uploadData.total_users} users** ready. Want me to auto-map by email match, or would you prefer to set mappings manually?`
        : `Ready to import. Upload a **Vault ZIP** or pull directly from Google Drive — which works better for you?`,
      Object.keys(mappings).length>0
        ? `**${Object.keys(mappings).length} user${Object.keys(mappings).length!==1?'s':''} mapped**. Head to Options to configure a dry run or live migration.`
        : `Time to map users. I can auto-match by email — want me to explain what this step does?`,
      options?.dryRun
        ? `Dry run mode is on — no data will be changed. Ready to preview the migration?`
        : `Options set. Starting with a **dry run** is recommended to catch issues before going live. Want to do that?`,
      null,null
    ];
    const c2g=[
      null,null,
      `Map each Microsoft 365 user to their Google destination. I can suggest matches — just ask.`,
      `Set your migration options. A **dry run** first is a good idea to preview what will be migrated.`,
      null,null
    ];
    const triggers=migDir==='copilot-gemini'?c2g:gc;
    const msg=triggers[step];
    if(msg)sendToAgent(msg,true);
  },[step,wsLoaded,migDir,uploadData,mappings,options]);

  // Google auth → agent
  const prevGoogleRef=useRef(null);
  useEffect(()=>{
    if(!wsLoaded)return;
    if(prevGoogleRef.current===null){prevGoogleRef.current=googleAuthed;return;}
    if(prevGoogleRef.current===googleAuthed)return;
    prevGoogleRef.current=googleAuthed;
    if(googleAuthed)sendToAgent(`Google Workspace connected — **${googleUsers.length} users** found. Connect Microsoft 365 next to continue.`,true);
  },[googleAuthed,wsLoaded]);

  // Microsoft auth → agent
  const prevMsRef=useRef(null);
  useEffect(()=>{
    if(!wsLoaded)return;
    if(prevMsRef.current===null){prevMsRef.current=msAuthed;return;}
    if(prevMsRef.current===msAuthed)return;
    prevMsRef.current=msAuthed;
    if(msAuthed&&googleAuthed)sendToAgent('Both clouds are connected. What migration direction should we use — Gemini to Copilot, or Copilot to Gemini?',true);
    else if(msAuthed)sendToAgent('Microsoft 365 connected. Still need to connect **Google Workspace** to continue.',true);
  },[msAuthed,wsLoaded]);

  // Data loaded → agent
  const prevUploadRef=useRef(null);
  useEffect(()=>{
    if(!wsLoaded)return;
    const id=uploadData?.id||null;
    if(prevUploadRef.current===null){prevUploadRef.current=id;return;}
    if(prevUploadRef.current===id)return;
    prevUploadRef.current=id;
    if(uploadData)sendToAgent(`Data loaded: **${uploadData.total_users} users**, ${uploadData.total_conversations||'?'} conversations. Want me to auto-map users by email, or review them manually?`,true);
  },[uploadData,wsLoaded]);

  // Recover migration state after page refresh / laptop shutdown
  useEffect(()=>{
    const savedBatchId=lsGet(K.batchId,null);
    const savedDone=lsGet(K.migDone,false);
    const savedStep=lsGet(K.step,0);
    if(savedBatchId&&!savedDone&&savedStep>=4){
      // Migration was in-progress when browser closed — check MongoDB for actual status
      fetch(`/api/reports/${savedBatchId}?summary=true`)
        .then(r=>r.ok?r.json():null)
        .then(doc=>{
          if(!doc)return;
          if(doc.status==='completed'&&doc.summary){
            setStats({users:doc.summary.total_users||0,pages:doc.summary.total_pages_created||0,errors:doc.summary.total_errors||0,flagged:doc.summary.total_visual_assets_flagged||0});
            setLastRunWasDry(doc.dryRun||false);
            setMigDone(true);setStep(6);

    if(sseRef.current)sseRef.current.close();
    sseRef.current=new EventSource('/api/migration-log');
    sseRef.current.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.type==='success'&&d.message.includes('Page created'))curStats.pages++;

          gcMilestones.firstUser=true;

        }
        if((d.type==='error'||d.type==='warn')&&!gcMilestones.firstError){
          gcMilestones.firstError=true;
          setTimeout(()=>addAgentMsg('bot','Hit an issue with one item — migration continues with the rest. I\'ll summarize at the end.'),200);
        }
        if(d.type==='done'){
          if(d.batch_id)setCurrentBatchId(d.batch_id);
          sseRef.current.close();setLive(false);setMigDone(true);setRetrying(false);setStep(6);
          setReportRefreshKey(p=>p+1);

    const payload={extract_path:uploadData.extract_path,tenant_id:config.tenantId,customer_name:config.filePath||'Gemini',user_mappings:fm,dry_run:isDry,skip_followups:false,skip_ai_response:true,from_date:options.fromDate||null,to_date:options.toDate||null,upload_id:uploadData.id};
