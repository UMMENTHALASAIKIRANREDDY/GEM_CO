function App(){
  // Read stored userId synchronously so state initializers use the right scoped keys
  const storedUid=(()=>{try{return localStorage.getItem('gem_active_user')||''}catch{return ''}})();
  const K=LS(storedUid); // scoped key map for current user

  const [step,setStep]=useState(()=>lsGet(K.step,0));
  const [uploadData,setUploadData]=useState(()=>lsGet(K.uploadData,null));
  const [config,setConfig]=useState(()=>{const s=lsGet(K.config,{});return{filePath:s.filePath||s.fileName||s.customerName||'',tenantId:s.tenantId||'807d6772-847c-40e2-9bec-e2c930b3a42e'}});
  const [mappings,setMappings]=useState(()=>lsGet(K.mappings,{}));
  const [selectedUsers,setSelectedUsers]=useState(()=>{const s=lsGet(K.selUsers,null);return s?new Set(s):new Set()});
  const [options,setOptions]=useState({dryRun:true,skipFollowups:false,skipAiResponse:false,fromDate:'',toDate:''});
  const [googleAuthed,setGoogleAuthed]=useState(()=>lsGet(K.authG,{signedIn:false}).signedIn||false);
  const [msAuthed,setMsAuthed]=useState(()=>lsGet(K.authMs,{signedIn:false}).signedIn||false);
  const [googleUsers,setGoogleUsers]=useState([]);
  const [msUsers,setMsUsers]=useState([]);
  const [logs,setLogs]=useState(()=>lsGet(K.logs,[]));
  const [live,setLive]=useState(false);
  const [migDone,setMigDone]=useState(()=>lsGet(K.migDone,false));
  const [stats,setStats]=useState(()=>lsGet(K.stats,{users:0,pages:0,errors:0,flagged:0}));
  const [lastRunWasDry,setLastRunWasDry]=useState(()=>lsGet(K.lastDry,false));
  const [currentBatchId,setCurrentBatchId]=useState(()=>lsGet(K.batchId,null));
  const [retrying,setRetrying]=useState(false);
  const [toast,setToast]=useState(null); // {message, type}
  const [showReports,setShowReports]=useState(false);
  const [appUser,setAppUser]=useState(null);
  const [reportRefreshKey,setReportRefreshKey]=useState(0); // increments to force reports re-fetch
  const [wsLoaded,setWsLoaded]=useState(false); // true after DB workspace hydration
  const KRef=useRef(K); // mutable ref so persist effects always use current scoped keys
  KRef.current=K;
  const wsSaveTimer=useRef(null); // debounce timer for workspace saves
  const sseRef=useRef(null);
  const [splitPct,setSplitPct]=useState(50);
  const containerRef=useRef(null);
  const dividerRef=useRef(null);

  const showToast=useCallback((message,type='success')=>{
    setToast({message,type});
  },[]);

  const handleDividerMouseDown=useCallback(e=>{
    e.preventDefault();
    if(dividerRef.current)dividerRef.current.classList.add('active');
    const onMove=ev=>{
      if(!containerRef.current)return;
      const rect=containerRef.current.getBoundingClientRect();
      setSplitPct(Math.max(20,Math.min(80,((ev.clientX-rect.left)/rect.width)*100)));
    };
    const onUp=()=>{if(dividerRef.current)dividerRef.current.classList.remove('active');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  },[]);

  // Auth check on mount — verify app session, hydrate state from DB (cross-device), check cloud auth
  useEffect(()=>{
    fetch('/api/me').then(r=>{
      if(!r.ok){window.location.href='/login.html';return null}
      return r.json();
    }).then(u=>{
      if(!u)return;
      setAppUser(u);
      // Handle user switching — clear old localStorage if different user
      const prevUid=localStorage.getItem('gem_active_user')||'';
      if(prevUid && prevUid!==u._id){ lsClearAll(); }
      localStorage.setItem('gem_active_user',u._id);

      // Hydrate from MongoDB — DB is authoritative for cross-device state
      fetch('/api/workspace').then(r=>r.ok?r.json():null).then(ws=>{
        if(ws){
          // Override localStorage-initialized state with DB values
          if(ws.step!=null){setStep(ws.step);lsSet(KRef.current.step,ws.step)}
          if(ws.uploadData!==undefined){setUploadData(ws.uploadData);lsSet(KRef.current.uploadData,ws.uploadData)}
          if(ws.config){setConfig(ws.config);lsSet(KRef.current.config,ws.config)}
          if(ws.mappings){setMappings(ws.mappings);lsSet(KRef.current.mappings,ws.mappings)}
          if(ws.selectedUsers){const s=new Set(ws.selectedUsers);setSelectedUsers(s);lsSet(KRef.current.selUsers,ws.selectedUsers)}
          if(ws.options){setOptions(ws.options)}
          if(ws.migDone!=null){setMigDone(ws.migDone);lsSet(KRef.current.migDone,ws.migDone)}
          if(ws.stats){setStats(ws.stats);lsSet(KRef.current.stats,ws.stats)}
          if(ws.currentBatchId!==undefined){setCurrentBatchId(ws.currentBatchId);lsSet(KRef.current.batchId,ws.currentBatchId)}
          if(ws.lastRunWasDry!=null){setLastRunWasDry(ws.lastRunWasDry);lsSet(KRef.current.lastDry,ws.lastRunWasDry)}
        }
        setWsLoaded(true);

        // Validate cloud auth status
        Promise.all([
          fetch('/auth/google/status').then(r=>r.json()).then(d=>d.authenticated).catch(()=>false),
          fetch('/auth/status').then(r=>r.json()).then(d=>d.authenticated).catch(()=>false),
        ]).then(([gOk,mOk])=>{
          if(!gOk&&googleAuthed)setGoogleAuthed(false);
          if(!mOk&&msAuthed)setMsAuthed(false);
        });
      }).catch(()=>setWsLoaded(true));
    }).catch(()=>{window.location.href='/login.html'});
  },[]);

  // Persist state (always use KRef.current so keys stay scoped to the right user)
  useEffect(()=>{lsSet(KRef.current.step,step)},[step]);
  useEffect(()=>{lsSet(KRef.current.uploadData,uploadData)},[uploadData]);
  useEffect(()=>{lsSet(KRef.current.config,config)},[config]);
  useEffect(()=>{lsSet(KRef.current.mappings,mappings)},[mappings]);
  useEffect(()=>{lsSet(KRef.current.logs,logs.slice(-500))},[logs]);
  useEffect(()=>{lsSet(KRef.current.authG,{signedIn:googleAuthed})},[googleAuthed]);
  useEffect(()=>{lsSet(KRef.current.authMs,{signedIn:msAuthed})},[msAuthed]);
  useEffect(()=>{lsSet(KRef.current.selUsers,[...selectedUsers])},[selectedUsers]);
  useEffect(()=>{lsSet(KRef.current.migDone,migDone)},[migDone]);
  useEffect(()=>{lsSet(KRef.current.stats,stats)},[stats]);
  useEffect(()=>{lsSet(KRef.current.batchId,currentBatchId)},[currentBatchId]);
  useEffect(()=>{lsSet(KRef.current.lastDry,lastRunWasDry)},[lastRunWasDry]);

  // Cross-device workspace save (debounced 800ms) — only after initial DB hydration
  const saveWorkspace=useCallback(()=>{
    if(!wsLoaded)return;
    clearTimeout(wsSaveTimer.current);
    wsSaveTimer.current=setTimeout(()=>{
      fetch('/api/workspace',{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({step,uploadData,config,mappings,selectedUsers:[...selectedUsers],
          options,migDone,stats,currentBatchId,lastRunWasDry})
      }).catch(()=>{});
    },800);
  },[wsLoaded,step,uploadData,config,mappings,selectedUsers,options,migDone,stats,currentBatchId,lastRunWasDry]);
  useEffect(()=>{saveWorkspace()},[saveWorkspace]);

  // Recover migration state after page refresh / laptop shutdown
  useEffect(()=>{
    const savedBatchId=lsGet(K.batchId,null);
    const savedDone=lsGet(K.migDone,false);
    const savedStep=lsGet(K.step,0);
    if(savedBatchId&&!savedDone&&savedStep>=4){
      // Migration was in-progress when browser closed — check MongoDB for actual status
      fetch(`/api/reports/${savedBatchId}?summary=true`)
        .then(r=>r.ok?r.json():null)
        .then(doc=>{
          if(!doc)return;
          if(doc.status==='completed'&&doc.summary){
            setStats({users:doc.summary.total_users||0,pages:doc.summary.total_pages_created||0,errors:doc.summary.total_errors||0,flagged:doc.summary.total_visual_assets_flagged||0});
            setLastRunWasDry(doc.dryRun||false);
            setMigDone(true);setStep(5);
          } else if(doc.status==='failed'){
            // Server died mid-migration — show done screen with whatever completed
            const s=doc.summary||{};
            setStats({users:s.total_users||0,pages:s.total_pages_created||0,errors:s.total_errors||0,flagged:s.total_visual_assets_flagged||0});
            setLastRunWasDry(doc.dryRun||false);
            setMigDone(true);setStep(5);
          }
          // If status==='running', server may still be active — leave SSE to handle it
        }).catch(()=>{});
    }
  },[]);

  const addLog=(type,message)=>{const ts=new Date().toTimeString().slice(0,8);setLogs(p=>[...p,{type,message,ts}])};

  const handleImportComplete=data=>{
    setUploadData(data);
    addLog('success',`Imported — ${data.total_users} users, ${data.total_conversations} conversations`);
    // Reset mappings for fresh import so auto-map runs again
    setMappings({});
    setSelectedUsers(new Set());
    setTimeout(()=>setStep(2),400);
  };

  const runMigration=async(forceLive=false)=>{
    const isDry=forceLive===true?false:options.dryRun;
    setLastRunWasDry(isDry);
    // If running live after dry-run, update options too
    if(forceLive)setOptions(p=>({...p,dryRun:false}));
    setStep(4);setMigDone(false);setStats({users:0,pages:0,errors:0,flagged:0});setLogs([]);
    addLog('info',isDry?'Starting dry run...':'Starting live migration...');
    setLive(true);
    const curStats={users:0,pages:0,errors:0,flagged:0};

    if(sseRef.current)sseRef.current.close();
    sseRef.current=new EventSource('/api/migration-log');
    sseRef.current.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.type==='success'&&d.message.includes('Page created'))curStats.pages++;
        if(d.type==='error')curStats.errors++;
        if(d.type==='info'&&d.message.includes('Processing:'))curStats.users++;
        if(d.type==='warn'&&d.message.includes('flagged')){const m=d.message.match(/(\d+) conversations flagged/);if(m)curStats.flagged+=parseInt(m[1])}
        setStats({...curStats});addLog(d.type,d.message);
        if(d.type==='done'){
          if(d.batch_id)setCurrentBatchId(d.batch_id);
          sseRef.current.close();setLive(false);setMigDone(true);setRetrying(false);setStep(5);
          setReportRefreshKey(p=>p+1); // trigger reports panel to re-fetch
        }
      }catch{}
    };
    sseRef.current.onerror=()=>{if(sseRef.current){sseRef.current.close();setLive(false)}};

    const fm={};const keys=selectedUsers.size>0?[...selectedUsers]:Object.keys(mappings);
    keys.forEach(k=>{if(mappings[k]!==undefined)fm[k]=mappings[k]});
    const payload={extract_path:uploadData.extract_path,tenant_id:config.tenantId,customer_name:config.filePath||'Gemini',user_mappings:fm,dry_run:isDry,skip_followups:false,skip_ai_response:options.skipAiResponse,from_date:options.fromDate||null,to_date:options.toDate||null,upload_id:uploadData.id};
    try{
      const res=await fetch('/api/migrate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!res.ok){const d=await res.json();addLog('error',d.error);setLive(false)}
    }catch(err){addLog('error',err.message);setLive(false)}
  };

  // Run Another Batch: two modes
  // keepData=true → same vault, different users (go to Step 2)
  // keepData=false → new import (clear everything, go to Step 1)
  const runAnotherBatch=(keepData=true)=>{
    setMigDone(false);setStats({users:0,pages:0,errors:0,flagged:0});setLogs([]);setCurrentBatchId(null);
    setOptions(p=>({...p,dryRun:true,fromDate:'',toDate:''}));
    if(keepData){
      setMappings({});setSelectedUsers(new Set());setStep(2);
    } else {
      setUploadData(null);setMappings({});setSelectedUsers(new Set());setStep(1);
    }
  };

  const retryFailed=async()=>{
    if(!currentBatchId||retrying)return;
    setRetrying(true);
    setMigDone(false);
    addLog('info',`Retrying ${stats.errors} failed conversation(s)...`);
    try{
      const res=await fetch('/api/migrate/retry',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({batchId:currentBatchId})});
      const data=await res.json();
      if(!res.ok||!data.started){addLog('error',data.error||data.message||'Retry failed');setMigDone(true);setRetrying(false);}
      // SSE stream picks up logs automatically — retrying state cleared when 'done' event fires
    }catch(e){addLog('error','Retry request failed: '+e.message);setMigDone(true);setRetrying(false);}
  };

  const resetSession=()=>{if(confirm('Reset all session data?')){lsClear(appUser?._id);location.reload()}};
  // Logout: destroy session only — DO NOT clear localStorage so user returns to their last state
  const handleLogout=async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login.html'};
  const handleStepClick=i=>{if(i<step&&!live)setStep(i)};

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',fontFamily:'Poppins,system-ui,sans-serif'}}>
      {/* Header */}
      <div style={{background:C.primary,height:52,display:'flex',alignItems:'center',padding:'0 24px',gap:12,flexShrink:0,boxShadow:'0 2px 8px rgba(1,41,172,.2)'}}>
        <img src="/assets/logo.png" alt="CloudFuze" style={{height:32,objectFit:'contain'}}/>
        <div style={{width:1,height:24,background:'rgba(255,255,255,.25)',margin:'0 4px'}}/>
        <div><div style={{color:'white',fontSize:14,fontWeight:600,lineHeight:1.2}}>Gemini → Copilot Migration</div><div style={{color:'rgba(255,255,255,.6)',fontSize:11}}>powered by CloudFuze</div></div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div className={live?'pulse-dot':''} style={{width:8,height:8,borderRadius:'50%',background:live?'#4ade80':'rgba(255,255,255,.3)',transition:'background .3s'}}/>
            <span style={{color:'rgba(255,255,255,.7)',fontSize:12}}>{live?'Live':'Idle'}</span>
          </div>
          <button onClick={()=>setShowReports(true)} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'rgba(255,255,255,.8)',background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.25)',borderRadius:5,padding:'4px 10px',cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.2)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.12)'}>
            <IcoReport s={12}/> Reports
          </button>
          <button onClick={resetSession} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'rgba(255,255,255,.6)',background:'transparent',border:'1px solid rgba(255,255,255,.2)',borderRadius:5,padding:'4px 9px',cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.1)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <IcoReset s={11}/> Reset
          </button>
          {appUser&&<div style={{display:'flex',alignItems:'center',gap:8,borderLeft:'1px solid rgba(255,255,255,.2)',paddingLeft:10}}>
            <div style={{width:26,height:26,borderRadius:'50%',background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'white'}}>{(appUser.name||appUser.email).slice(0,2).toUpperCase()}</div>
            <span style={{fontSize:11,color:'rgba(255,255,255,.8)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{appUser.name||appUser.email}</span>
            <button onClick={handleLogout} title="Sign out" style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'rgba(255,255,255,.6)',background:'transparent',border:'1px solid rgba(255,255,255,.2)',borderRadius:5,padding:'4px 8px',cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.1)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <IcoLogout s={11}/> Sign out
            </button>
          </div>}
        </div>
      </div>

      {/* Step Tracker — clickable backward only, disabled during migration */}
      <StepTracker active={Math.min(step,5)} onStepClick={handleStepClick} live={live}/>

      {/* Draggable Split Panel */}
      <div ref={containerRef} style={{display:'flex',flex:1,overflow:'hidden'}}>
        {/* Left Panel */}
        <div style={{width:`${splitPct}%`,display:'flex',flexDirection:'column',overflow:'hidden',background:'white',flexShrink:0}}>
          <div style={{padding:'10px 24px',borderBottom:`1px solid ${C.bg}`,background:'white',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>Step {Math.min(step+1,6)} of 6</span>
            {migDone&&step===5&&currentBatchId&&<span style={{fontSize:10,color:C.primaryL}}>Batch #{currentBatchId.slice(-6)}</span>}
          </div>
          <div style={{flex:1,overflowY:step===2?'hidden':'auto',padding:'20px 24px',display:step===2?'flex':'block',flexDirection:step===2?'column':undefined}}>
            {/* Render steps inline to avoid component recreation issues */}
            {step===0&&<Step0 googleAuthed={googleAuthed} setGoogleAuthed={setGoogleAuthed} msAuthed={msAuthed} setMsAuthed={setMsAuthed} googleUsers={googleUsers} setGoogleUsers={setGoogleUsers} msUsers={msUsers} setMsUsers={setMsUsers} tenantId={config.tenantId} onComplete={()=>setStep(1)}/>}
            {step===1&&<Step1 googleUsers={googleUsers} googleAuthed={googleAuthed} onComplete={handleImportComplete} onBack={()=>setStep(0)} showToast={showToast} uploadData={uploadData}/>}
            {step===2&&<Step2 uploadData={uploadData} msUsers={msUsers} mappings={mappings} setMappings={setMappings} selectedUsers={selectedUsers} setSelectedUsers={setSelectedUsers} onNext={()=>{addLog('info',`User mappings ready — ${selectedUsers.size||Object.keys(mappings).length} users selected`);setStep(3)}} onBack={()=>setStep(1)} showToast={showToast}/>}
            {step===3&&<Step3 options={options} setOptions={setOptions} config={config} setConfig={setConfig} msAuthed={msAuthed} onRun={runMigration} onBack={()=>setStep(2)}/>}
            {(step===4||step===5)&&<StepMigrate stats={stats} done={migDone} lastRunWasDry={lastRunWasDry} batchId={currentBatchId} onStartLive={()=>runMigration(true)} onRunAnother={runAnotherBatch} onRetry={retryFailed} retrying={retrying} hasUploadData={!!uploadData}/>}
          </div>
        </div>

        {/* Drag Handle */}
        <div ref={dividerRef} className="drag-divider" onMouseDown={handleDividerMouseDown}/>

        {/* Right Panel */}
        <div style={{flex:1,display:'flex',flexDirection:'column',background:C.bg,overflow:'hidden'}}>
          <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,background:'white',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:14,fontWeight:600}}>Migration Log</span>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div className={live?'pulse-dot':''} style={{width:8,height:8,borderRadius:'50%',background:live?'#4ade80':'#d1d5db',transition:'background .3s'}}/>
              <span style={{fontSize:12,color:live?C.success:C.muted,fontWeight:500}}>{live?'Running':'Waiting'}</span>
            </div>
          </div>
          <LogFeed logs={logs} live={live}/>
        </div>
      </div>

      {/* Reports side panel */}
      {showReports&&<ReportsPanel onClose={()=>setShowReports(false)} refreshKey={reportRefreshKey} liveStats={stats} liveBatchId={currentBatchId} isLive={live}/>}

      {/* Toast notification */}
      {toast&&<Toast message={toast.message} type={toast.type} onHide={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
