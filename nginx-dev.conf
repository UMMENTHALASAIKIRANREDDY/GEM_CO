# nginx config for aimigration.cftools.live → dev container on port 4000.
# Symlink this into /etc/nginx/sites-enabled/ on the server (the deploy
# workflow does this automatically after first manual setup).
server {
    listen 80;
    listen [::]:80;
    server_name aimigration.cftools.live;

    # Allow large uploads (Vault ZIPs can be hundreds of MB)
    client_max_body_size 500M;

    # Forward to the dev container (running on host port 4000)
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;     # long migrations can take minutes
        proxy_send_timeout 600s;
    }
}
