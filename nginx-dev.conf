# nginx config for aimigration.cftools.live → dev container on port 4001.
# Symlinked into /etc/nginx/sites-enabled/ by the deploy workflow.
#
# SSL: certificate issued by Let's Encrypt via certbot (Jun 9 2026). The
# cert files live at /etc/letsencrypt/live/aimigration.cftools.live/ and
# auto-renew via the certbot.timer systemd unit. Keep this file in sync
# with whatever certbot rewrites — every deploy copies this version over.

# HTTPS server — terminates SSL and reverse-proxies to the dev container.
server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name aimigration.cftools.live;

    ssl_certificate     /etc/letsencrypt/live/aimigration.cftools.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aimigration.cftools.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large uploads (Vault ZIPs can be hundreds of MB)
    client_max_body_size 500M;

    # Forward to the dev container (host port 4001 → container port 4000)
    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;   # long migrations can take minutes
        proxy_send_timeout 600s;
    }
}

# HTTP → HTTPS redirect (Let's Encrypt's HTTP-01 ACME challenge still works
# because certbot puts a separate snippet under /.well-known/acme-challenge/).
server {
    listen 80;
    listen [::]:80;
    server_name aimigration.cftools.live;
    return 301 https://$host$request_uri;
}
