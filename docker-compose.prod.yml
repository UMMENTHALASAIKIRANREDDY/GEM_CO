services:
  gem-co:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gem-co-migration-prod
    ports:
      - "127.0.0.1:4006:4000"
    env_file:
      - .env.prod
    volumes:
      - ./uploads:/app/uploads
      - ./customers:/app/customers
      - ./service_account.json:/app/service_account.json:ro
    networks:
      - migration-combinations_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  migration-combinations_default:
    external: true
